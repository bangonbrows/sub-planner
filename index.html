<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useId } = React;
const PLAYERS_DB = [
  { jersey: 4,  name: "Lola",      rating: 2.7, asthma: false, foulProne: false, color: "#4A90E2", pos: ["PF", "C",  "SF"], skills: ["Passing", "Interior", "Perimeter"] },
  { jersey: 8,  name: "Aanya",     rating: 3.1, asthma: false, foulProne: false, color: "#7B68EE", pos: ["SG", "PG", "SF"], skills: ["Scoring", "BallHandle", "Passing"] },
  { jersey: 10, name: "Katyayani", rating: 3.4, asthma: false, foulProne: false, color: "#27AE60", pos: ["SF", "SG", "PG"], skills: ["BallHandle", "Passing", "Perimeter"] },
  { jersey: 14, name: "Rosalie",   rating: 2.6, asthma: false, foulProne: false, color: "#E74C3C", pos: ["SF", "PF", "SG"], skills: ["Passing", "Interior", "Perimeter"] },
  { jersey: 25, name: "Alannah",   rating: 3.1, asthma: false, foulProne: false, color: "#F39C12", pos: ["PG", "SF", "PF"], skills: ["Scoring", "BallHandle", "Passing"] },
  { jersey: 31, name: "Mihika",    rating: 1.8, asthma: false, foulProne: false, color: "#1ABC9C", pos: ["C",  "PF"],       skills: ["Interior"] },
  { jersey: 32, name: "Layla",     rating: 2.9, asthma: false, foulProne: true,  color: "#E91E63", pos: ["SF", "PG", "SG"], skills: ["Scoring", "BallHandle", "Perimeter"] },
  { jersey: 35, name: "Naisha",    rating: 1.6, asthma: false, foulProne: false, color: "#9C27B0", pos: ["PF", "C"],        skills: ["Interior", "Perimeter"] },
  { jersey: 40, name: "Armelle",   rating: 2.1, asthma: false, foulProne: false, color: "#FF5722", pos: ["SG", "SF"],       skills: ["Passing", "Perimeter"] },
];

// Minimum skill coverage required on court at all times
// Skills: Scoring, BallHandle, Passing, Interior, Perimeter
const SKILL_MINIMUMS = [
  { skill: "Scoring",    min: 1 },
  { skill: "BallHandle", min: 1 },
  { skill: "Passing",    min: 1 },
  { skill: "Interior",   min: 1 },
  { skill: "Perimeter",  min: 1 },
];

// Short labels + colours for skill badges shown on player cards.
const SKILL_BADGE = {
  Scoring:    { label: "S", color: "#f59e0b" },
  BallHandle: { label: "B", color: "#3b82f6" },
  Passing:    { label: "P", color: "#8b5cf6" },
  Interior:   { label: "R", color: "#ef4444" },
  Perimeter:  { label: "D", color: "#10b981" },
};

function meetsSkillRequirements(lineup) {
  return SKILL_MINIMUMS.every(({ skill, min }) =>
    lineup.filter(p => p.skills.includes(skill)).length >= min
  );
}

// Return the three lowest-rated jerseys from a player pool. The rotation rule:
// no more than 2 of them on court at once (soft — the sub pickers fall back to
// allowing 3 when skill minimums demand it, or when fairness demands it).
function weakestThreeJerseys(players) {
  const sorted = [...players].sort((a, b) => a.rating - b.rating);
  return sorted.slice(0, Math.min(3, sorted.length)).map(p => p.jersey);
}

// True if all three weakest jerseys appear in the lineup (more than 2 on court).
function violatesWeakestThree(lineup, weakest3) {
  if (weakest3.length < 3) return false;
  const setOn = new Set(lineup.map(p => p.jersey));
  return weakest3.every(j => setOn.has(j));
}

// True if the weakest-3 distribution is imbalanced: either all 3 on court
// (too many weak) OR all 3 on bench (too many strong / all weak sitting
// together). A healthy rotation keeps 1 or 2 of the weakest-3 on court at
// all times.
function violatesWeakestBalance(lineup, weakest3) {
  if (weakest3.length < 3) return false;
  const setOn = new Set(lineup.map(p => p.jersey));
  const onCount = weakest3.filter(j => setOn.has(j)).length;
  return onCount === 3 || onCount === 0;
}

// ── Cadence-first rotation engine ───────────────────────────────────────────
// Fairness subs fire ONLY at scheduled rotation windows. Mandatory triggers
// (stint cap, skill violation, all-3-weakest-on-court) stay live every second.
// 0-weakest-on-court is handled at windows only (not mandatory).
// Window cadence scales inversely with bench size: fewer bench = more
// frequent but simpler (1-for-1) subs; more bench = less frequent but
// bundled (2-3 swap) subs. Total coaching load stays roughly constant.
const START_BLOCK_SECS   = 4 * 60; // H1: first 4 min — starters locked, no subs
const CLOSE_BLOCK_SECS   = 4 * 60; // last 4 min of game — starter-restore subs
// Closer cleanup threshold is now computed dynamically inside getWindowSchedule()
// based on config.minStintSecs so that fairness windows too close to the closer
// block are cancelled — preventing players from being subbed in only to be
// immediately pulled out by the closer restore.

// Returns cadence, bundle cap, stint caps, and elastic window bounds for a
// given roster size. This is the foundation of the entire rotation system.
function getRotationConfig(rosterSize) {
  const benchCount = Math.max(0, rosterSize - 5);
  if (benchCount <= 1) return {
    benchCount,
    cadenceSecs: 135,              // 2:15 normal cadence
    firstCycleCadenceSecs: 105,    // 1:45 faster first cycle (everyone gets 1 rest)
    firstCycleCount: 5,            // first 5 windows use fast cadence
    bundleCap: 1,                  // 1 swap per window
    hardStintCapSecs: 11 * 60,     // relaxed — only 1 bench player
    minStintSecs: 90,              // min time on court before pulling
    windowOpenEarlySecs: 15,
    windowSoftLateSecs: 30,
    windowHardLateSecs: 60,
  };
  if (benchCount === 2) return {
    benchCount,
    cadenceSecs: 150,              // 2:30
    firstCycleCadenceSecs: 150,
    firstCycleCount: 0,
    bundleCap: 2,
    hardStintCapSecs: 10 * 60,
    minStintSecs: 2 * 60,
    windowOpenEarlySecs: 20,
    windowSoftLateSecs: 45,
    windowHardLateSecs: 75,
  };
  if (benchCount === 3) return {
    benchCount,
    cadenceSecs: 180,              // 3:00
    firstCycleCadenceSecs: 180,
    firstCycleCount: 0,
    bundleCap: 2,
    hardStintCapSecs: 9 * 60,
    minStintSecs: 150,             // 2:30
    windowOpenEarlySecs: 25,
    windowSoftLateSecs: 60,
    windowHardLateSecs: 90,
  };
  // benchCount >= 4
  return {
    benchCount,
    cadenceSecs: 210,              // 3:30
    firstCycleCadenceSecs: 210,
    firstCycleCount: 0,
    bundleCap: 3,                  // max 3 live swaps (4 only at halftime)
    hardStintCapSecs: 8 * 60,
    minStintSecs: 3 * 60,
    windowOpenEarlySecs: 30,
    windowSoftLateSecs: 75,
    windowHardLateSecs: 120,
  };
}

// Generate rotation window schedule for the full game. Returns an array of
// window objects with timing bounds. Fairness rotation happens ONLY at these
// windows. The closer-restore is the final window.
function getWindowSchedule(rosterSize, halfMins, startBlockSecs, closeBlockSecs) {
  const config = getRotationConfig(rosterSize);
  const totalSecs = halfMins * 2 * 60;
  const halfSecs = halfMins * 60;
  const closeStart = totalSecs - closeBlockSecs;
  // Cancel fairness windows that fall within one minimum stint of the closer
  // block — otherwise players get subbed in then immediately pulled back out.
  const cleanUpThreshold = closeStart - config.minStintSecs;
  const windows = [];

  // ── H1 windows: after start lock, before halftime ──
  // Cancel windows within one minimum stint of halftime to avoid pointless
  // revolving-door subs right before the break.
  const h1CleanUpThreshold = halfSecs - config.minStintSecs;
  let t = startBlockSecs;
  let count = 0;
  while (t < h1CleanUpThreshold) {
    windows.push({
      targetSecs: t,
      openSecs: t - config.windowOpenEarlySecs,
      softLateSecs: t + config.windowSoftLateSecs,
      hardLateSecs: t + config.windowHardLateSecs,
      half: 1,
      isFirstCycle: count < config.firstCycleCount,
    });
    const cad = (count < config.firstCycleCount)
      ? config.firstCycleCadenceSecs
      : config.cadenceSecs;
    t += cad;
    count++;
  }

  // ── H2 windows: after halftime, before closer ──
  const firstH2Cad = (config.firstCycleCount > 0)
    ? config.firstCycleCadenceSecs
    : config.cadenceSecs;
  t = halfSecs + firstH2Cad;
  count = 0;
  while (t < cleanUpThreshold) {
    windows.push({
      targetSecs: t,
      openSecs: t - config.windowOpenEarlySecs,
      softLateSecs: t + config.windowSoftLateSecs,
      hardLateSecs: t + config.windowHardLateSecs,
      half: 2,
      isFirstCycle: count < config.firstCycleCount,
    });
    const cad = (count < config.firstCycleCount)
      ? config.firstCycleCadenceSecs
      : config.cadenceSecs;
    t += cad;
    count++;
  }

  // ── Closer-restore window ──
  windows.push({
    targetSecs: closeStart,
    openSecs: closeStart - 30,
    softLateSecs: closeStart + 30,
    hardLateSecs: closeStart + 60,
    half: 2,
    isCloser: true,
  });

  return windows;
}

function fmt(secs) {
  const m = Math.floor(Math.abs(secs) / 60);
  const s = Math.abs(secs) % 60;
  return `${m}:${s.toString().padStart(2, "0")}`;
}

function pickStarting5(players) {
  const byRating = [...players].sort((a, b) => b.rating - a.rating);
  let on = byRating.slice(0, 5);
  let off = byRating.slice(5);

  // For each skill requirement, keep swapping in bench players until minimum is met
  for (const { skill, min } of SKILL_MINIMUMS) {
    let count = on.filter(p => p.skills.includes(skill)).length;
    while (count < min) {
      const candidate = [...off]
        .filter(p => p.skills.includes(skill))
        .sort((a, b) => b.rating - a.rating)[0];
      if (!candidate) break;
      // Swap out the lowest-rated on-court player who doesn't have this skill
      const out = [...on]
        .filter(p => !p.skills.includes(skill))
        .sort((a, b) => a.rating - b.rating)[0];
      if (!out) break;
      on  = on.filter(p => p.jersey !== out.jersey).concat([candidate]);
      off = off.filter(p => p.jersey !== candidate.jersey).concat([out]);
      count++;
    }
  }

  return on;
}

function generatePlan(players, halfMins, manualStarting5 = null) {
  const n = players.length;
  if (n === 0) return { starting: [], h1Events: [], h2Events: [], targetMins: {} };
  if (n <= 5) {
    return {
      starting: manualStarting5 || players,
      h1Events: [],
      h2Events: [],
      targetMins: Object.fromEntries(players.map(p => [p.jersey, halfMins * 2])),
    };
  }

  const totalSecs = halfMins * 2 * 60;

  // Target seconds per player: equal fair share for everyone.
  const fairSecs = (5 * totalSecs) / n;
  const targetSecs = {};
  players.forEach(p => { targetSecs[p.jersey] = Math.round(fairSecs); });

  const starting5 = manualStarting5 || pickStarting5(players);

  const targetMins = Object.fromEntries(
    Object.entries(targetSecs).map(([j, s]) => [j, Math.round(s / 6) / 10])
  );

  // Rule-driven engine: no pre-computed sub events. h1Events / h2Events kept
  // as empty arrays so the existing persistence / plan-screen code still
  // renders without errors.
  return { starting: starting5, h1Events: [], h2Events: [], targetMins };
}

      <text x="50" y="72" textAnchor="middle" fontSize="62" fontWeight="900" fill="#fff"

        fontFamily="Arial Black, Helvetica, sans-serif">K</text>

function App() {
  const [screen, setScreen] = useState("setup");
  const [halfMins, setHalfMins] = useState(20);
  const [selected, setSelected] = useState(new Set(PLAYERS_DB.map(p => p.jersey)));
  const [starters, setStarters] = useState(new Set());
  const [plan, setPlan] = useState(null);

  // Live state
  const [gameSecs, setGameSecs] = useState(0);
  const [running, setRunning] = useState(false);
  const [onCourt, setOnCourt] = useState([]);
  const [accumulated, setAccumulated] = useState({});
  const [stintStart, setStintStart] = useState({});
  const [halftimeDone, setHalftimeDone] = useState(false);
  const [showHalftime, setShowHalftime] = useState(false);

  // Foul tracking (0-5, auto-foul-out at 5)
  const [fouls, setFouls] = useState({}); // {jersey: count}

  // Foul out / injury
  const [fouledOut, setFouledOut] = useState(new Set()); // permanent
  const [injured, setInjured] = useState(new Set());     // temporary
  const [activeMenu, setActiveMenu] = useState(null);    // jersey with open menu (on court)
  const [benchMenu, setBenchMenu] = useState(null);      // jersey with open menu (bench)
  const [replacingJersey, setReplacingJersey] = useState(null); // jersey needing replacement

  // Adjusted target minutes (redistributed when player fouls out)
  const [adjustedTargetMins, setAdjustedTargetMins] = useState({});

  // Sub log — all actual subs that happened during the game
  const [subLog, setSubLog] = useState([]);


  // ── Rule engine state ─────────────────────────────────────────────────────
  // lastSubTime: game seconds when the most recent sub happened (manual or
  // app-confirmed). Used to enforce the cooldown gap between suggestions.
  const [lastSubTime, setLastSubTime] = useState(-120);
  // pendingSub: when the rule evaluator has identified a sub the coach should
  // make, this holds { out, in, reason, mandatory }. Null = rotation stable.
  const [pendingSub, setPendingSub] = useState(null);
  // handledWindows: set of roster-aware window keys that have been confirmed/skipped.
  // Keys are "rosterSize:targetSecs" so a roster change (injury/foul-out)
  // doesn't collide with old schedule's handled entries.
  // Reset at game start and halftime.
  const [handledWindows, setHandledWindows] = useState(new Set());
  const wKey = (roster, tgt) => `${roster}:${tgt}`;

  // restedThisHalf: tracks which jerseys have had at least one rest this half.
  // Critical for 6-player carousel to avoid yo-yo subs (pulling the just-entered
  // bench player straight back off because they're the weakest).
  const [restedThisHalf, setRestedThisHalf] = useState(new Set());

  // offSince: for bench players, the game-seconds when they most recently left
  // the court (or game-start for players who began on the bench). Used for
  // bench-stint tracking.
  const [offSince, setOffSince] = useState({});

  // Injury accounting — for each injured jersey, records the game clock at injury
  // time and how many minutes of the injured player's remaining target were
  // redistributed to each active teammate. On return we pull back the unused
  // share proportional to how much of the injury window elapsed.
  // Shape: { [jersey]: { startSecs, remainingMins, perOtherMins, others: [jersey, ...] } }
  const [injuryInfo, setInjuryInfo] = useState({});

  // Foul-out accounting — same shape as injuryInfo so Undo can do the symmetric
  // partial clawback if a player is restored to the game after having sat for
  // some real time.
  const [fouloutInfo, setFouloutInfo] = useState({});

  const timerRef = useRef(null);
  const clockBaseRef = useRef({ wallMs: 0, secs: 0 }); // timestamp-based clock anchor

  // Action lock — prevents double-tap race conditions on destructive actions.
  // A single ref guards confirm sub, manual sub out, emergency in, start 2nd
  // half, mark injury, and mark foul-out. Cleared after React has flushed.
  const actionLockRef = useRef(false);
  const withActionLock = (fn) => {
    if (actionLockRef.current) return;
    actionLockRef.current = true;
    try {
      fn();
    } finally {
      setTimeout(() => { actionLockRef.current = false; }, 300);
    }
  };

  // ── PERSISTENCE ─────────────────────────────────────────────────────────────
  // Save / restore full game state across browser refresh, tab close, mobile memory flush, etc.
  const STORAGE_KEY = "coachk-subplanner-v9";
  const hydratedRef = useRef(false); // blocks save effect until after restore
  const [hasSavedGame, setHasSavedGame] = useState(false); // whether restore found a live game
  const [confirmDiscard, setConfirmDiscard] = useState(false); // two-tap confirm for discard button

  useEffect(() => {
    try {
      const raw = typeof localStorage !== "undefined" ? localStorage.getItem(STORAGE_KEY) : null;
      if (raw) {
        const s = JSON.parse(raw);

        // Validate critical fields before restoring — corrupted storage can
        // put the app into impossible states (negative gameSecs, unknown
        // jersey numbers on court, etc.)
        const validJerseys = new Set(PLAYERS_DB.map(p => p.jersey));
        const sanitizeJerseyArray = (arr) =>
          Array.isArray(arr) ? arr.filter(j => validJerseys.has(j)) : [];
        const sanitizeNumSecs = (v) =>
          typeof v === "number" && v >= 0 && isFinite(v) ? v : 0;

        // A saved game is only meaningful if we got past setup
        if (s.plan && s.screen && s.screen !== "setup") setHasSavedGame(true);
        if (s.screen) setScreen(s.screen);
        if (typeof s.halfMins === "number" && s.halfMins > 0) setHalfMins(s.halfMins);
        if (Array.isArray(s.selected)) setSelected(new Set(sanitizeJerseyArray(s.selected)));
        if (Array.isArray(s.starters)) setStarters(new Set(sanitizeJerseyArray(s.starters)));
        if (s.plan) setPlan(s.plan);
        if (typeof s.gameSecs === "number") setGameSecs(sanitizeNumSecs(s.gameSecs));
        if (Array.isArray(s.onCourt)) setOnCourt(sanitizeJerseyArray(s.onCourt));
        if (s.accumulated && typeof s.accumulated === "object") setAccumulated(s.accumulated);
        if (s.stintStart && typeof s.stintStart === "object") setStintStart(s.stintStart);
        if (typeof s.halftimeDone === "boolean") setHalftimeDone(s.halftimeDone);
        if (s.fouls && typeof s.fouls === "object") setFouls(s.fouls);
        if (Array.isArray(s.fouledOut)) setFouledOut(new Set(sanitizeJerseyArray(s.fouledOut)));
        if (Array.isArray(s.injured)) setInjured(new Set(sanitizeJerseyArray(s.injured)));
        if (s.adjustedTargetMins && typeof s.adjustedTargetMins === "object") setAdjustedTargetMins(s.adjustedTargetMins);
        if (Array.isArray(s.subLog)) setSubLog(s.subLog);
        if (s.injuryInfo) setInjuryInfo(s.injuryInfo);
        if (s.fouloutInfo) setFouloutInfo(s.fouloutInfo);
        if (typeof s.lastSubTime === "number") setLastSubTime(sanitizeNumSecs(s.lastSubTime));
        if (s.offSince) setOffSince(s.offSince);
        if (Array.isArray(s.handledWindows)) setHandledWindows(new Set(s.handledWindows));
        if (Array.isArray(s.restedThisHalf)) setRestedThisHalf(new Set(s.restedThisHalf));
        if (typeof s.replacingJersey === "number" && validJerseys.has(s.replacingJersey)) setReplacingJersey(s.replacingJersey);
        // pendingSub is NOT persisted — always recomputed from current state
        // Always start paused — never auto-resume the clock after a refresh
      }
    } catch (e) { /* ignore corrupted storage */ }
    hydratedRef.current = true;
  }, []);

  useEffect(() => {
    if (!hydratedRef.current) return; // don't overwrite saved state during initial restore
    // Save every tick — state is small, reliability beats battery savings.
    try {
      const snapshot = {
        screen, halfMins,
        selected: [...selected], starters: [...starters],
        plan,
        gameSecs, onCourt, accumulated, stintStart,
        halftimeDone,
        fouls,
        fouledOut: [...fouledOut], injured: [...injured],
        adjustedTargetMins, subLog, injuryInfo, fouloutInfo,
        lastSubTime, offSince,
        handledWindows: [...handledWindows],
        restedThisHalf: [...restedThisHalf],
        replacingJersey,
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(snapshot));
    } catch (e) { /* quota or serialization issue */ }
  }, [screen, halfMins, selected, starters, plan, gameSecs, onCourt, accumulated, stintStart,
      halftimeDone, fouls, fouledOut, injured, adjustedTargetMins, subLog, injuryInfo, fouloutInfo,
      lastSubTime, offSince, handledWindows, restedThisHalf, replacingJersey]);

  function discardSavedGame() {
    try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
    // Reset to clean setup state
    setScreen("setup");
    setPlan(null);
    setStarters(new Set());
    setGameSecs(0); setRunning(false);
    setOnCourt([]); setAccumulated({}); setStintStart({});
    setHalftimeDone(false); setShowHalftime(false);
    setFouls({}); setFouledOut(new Set()); setInjured(new Set());
    setAdjustedTargetMins({}); setSubLog([]);
    setInjuryInfo({});
    setFouloutInfo({});
    setLastSubTime(-120);
    setPendingSub(null);
    setOffSince({});
    setHandledWindows(new Set());
    setRestedThisHalf(new Set());
    setReplacingJersey(null);
    setHasSavedGame(false);
  }

  useEffect(() => {
    if (running) {
      // Anchor: record wall-clock time and current gameSecs when play starts.
      // Subsequent ticks compute elapsed from this anchor, preventing drift.
      clockBaseRef.current = { wallMs: Date.now(), secs: gameSecs };
      timerRef.current = setInterval(() => {
        const base = clockBaseRef.current; // read dynamically so ±10s updates are picked up
        const elapsed = Math.floor((Date.now() - base.wallMs) / 1000);
        setGameSecs(base.secs + elapsed);
      }, 250); // poll 4×/sec for responsive UI, but only advances on whole seconds
    } else {
      clearInterval(timerRef.current);
    }
    return () => clearInterval(timerRef.current);
  }, [running]); // eslint-disable-line react-hooks/exhaustive-deps

  // Halftime detection — triggers even when paused (e.g. coach taps +10s past boundary)
  useEffect(() => {
    if (!halftimeDone && gameSecs >= halfMins * 60) {
      setRunning(false);
      setShowHalftime(true);
    }
  }, [gameSecs, halftimeDone, halfMins]);

  // Full-time detection — clamp the clock, stop the timer, and bank final stints
  // so accumulated court-time for everyone on court is accurate.
  useEffect(() => {
    const fullSecs = halfMins * 2 * 60;
    if (gameSecs >= fullSecs) {
      if (running) setRunning(false);
      if (gameSecs > fullSecs) setGameSecs(fullSecs);
      // Flush any active stints to accumulated so final totals are frozen
      if (onCourt.some(j => stintStart[j] != null)) {
        setAccumulated(prev => {
          const next = { ...prev };
          onCourt.forEach(j => {
            if (stintStart[j] != null) {
              next[j] = (next[j] || 0) + (fullSecs - stintStart[j]);
            }
          });
          return next;
        });
        setStintStart({});
      }
    }
  }, [gameSecs, halfMins, running, onCourt, stintStart]);

  const available = useMemo(() => PLAYERS_DB.filter(p => selected.has(p.jersey)), [selected]);
  const totalGameSecs = halfMins * 2 * 60;
  // Clock adjustment helper — updates both gameSecs AND the timestamp anchor
  // so the running interval doesn't snap the clock back to its old position.
  const setClockSecs = (nextSecs) => {
    const clamped = Math.max(0, Math.min(totalGameSecs, nextSecs));
    setGameSecs(clamped);
    if (running) {
      clockBaseRef.current = { wallMs: Date.now(), secs: clamped };
    }
  };
  const half = gameSecs < halfMins * 60 ? 1 : 2;
  const timeInHalf = half === 1 ? gameSecs : gameSecs - halfMins * 60;
  const gameOver = gameSecs >= totalGameSecs;

  const unavailableJerseys = useMemo(() => new Set([...fouledOut, ...injured]), [fouledOut, injured]);
  const activeWeakest3 = useMemo(
    () => weakestThreeJerseys(available.filter(p => !unavailableJerseys.has(p.jersey))),
    [available, unavailableJerseys]
  );

  function togglePlayer(jersey) {
    setSelected(prev => {
      const next = new Set(prev);
      next.has(jersey) ? next.delete(jersey) : next.add(jersey);
      return next;
    });
  }

  function handlePickStarters() {
    setStarters(new Set());
    setScreen("start5");
  }

  function toggleStarter(jersey) {
    setStarters(prev => {
      const next = new Set(prev);
      if (next.has(jersey)) { next.delete(jersey); return next; }
      if (next.size >= 5) return prev;
      next.add(jersey);
      return next;
    });
  }

  function handleGeneratePlan() {
    const manualStarting5 = available.filter(p => starters.has(p.jersey));
    const newPlan = generatePlan(available, halfMins, manualStarting5);
    setPlan(newPlan);
    setAdjustedTargetMins({ ...newPlan.targetMins });
    setScreen("plan");
  }

  function handleStartGame() {
    const courtJerseys = plan.starting.map(p => p.jersey);
    const acc = {}, stint = {};
    const off = {};
    available.forEach(p => {
      acc[p.jersey] = 0;
      if (courtJerseys.includes(p.jersey)) stint[p.jersey] = 0;
      else off[p.jersey] = 0; // bench-sitting since tip-off
    });
    setOnCourt(courtJerseys);
    setAccumulated(acc);
    setStintStart(stint);
    setOffSince(off);
    setGameSecs(0);
    setRunning(false);
    setHalftimeDone(false);
    setShowHalftime(false);
    setFouledOut(new Set());
    setInjured(new Set());
    setFouls({});
    setActiveMenu(null);
    setBenchMenu(null);
    setReplacingJersey(null);
    setAdjustedTargetMins({ ...plan.targetMins });
    setSubLog([]);
    setLastSubTime(-120);
    setPendingSub(null);
    setHandledWindows(new Set());
    // Seed carousel: bench players have already "rested" relative to starters,
    // so mark them to prevent the first-cycle carousel from pulling them right
    // back off after they enter (especially critical for 6-player / 1-bench).
    const initialBench = available
      .filter(p => !courtJerseys.includes(p.jersey))
      .map(p => p.jersey);
    setRestedThisHalf(new Set(initialBench));
    setScreen("game");
  }

  // Shared H2 lineup computation — used by both the halftime overlay preview
  // and handleStartSecondHalf so the coach sees the actual lineup before tapping.
  function computeSecondHalfLineup() {
    const now = halfMins * 60;
    const unavail = jersey => fouledOut.has(jersey) || injured.has(jersey);

    // Compute end-of-H1 court time per player inline (no state flush needed).
    const endOfH1Court = (jersey) =>
      (accumulated[jersey] || 0) +
      (stintStart[jersey] !== undefined ? now - stintStart[jersey] : 0);
    const underBy = (jersey) => -endOfH1Court(jersey);

    const pool = available
      .filter(p => !unavail(p.jersey))
      .sort((a, b) => underBy(b.jersey) - underBy(a.jersey));

    let courtObjs = pool.slice(0, 5);
    let courtJerseys = courtObjs.map(p => p.jersey);

    // Skill top-up
    for (const { skill, min } of SKILL_MINIMUMS) {
      while (courtObjs.filter(p => p.skills.includes(skill)).length < min) {
        const bench = pool.filter(p => !courtJerseys.includes(p.jersey));
        const candidate = bench.find(p => p.skills.includes(skill));
        if (!candidate) break;
        const outP = [...courtObjs]
          .filter(p => !p.skills.includes(skill))
          .sort((a, b) => underBy(a.jersey) - underBy(b.jersey))[0];
        if (!outP) break;
        courtObjs = courtObjs.filter(p => p.jersey !== outP.jersey).concat([candidate]);
        courtJerseys = courtObjs.map(p => p.jersey);
      }
    }

    // Weakest-three balance
    const activeForWeak = available.filter(p => !unavail(p.jersey));
    const weakest3 = weakestThreeJerseys(activeForWeak);
    const H2_UNDER_PACE_EXEMPT_SECS = 2 * 60;
    // Fair share: each player should have played this much court time by halftime
    const fairShareAtHalf = pool.length > 0 ? (5 * now) / pool.length : 0;
    const underPace = (jersey) => fairShareAtHalf - endOfH1Court(jersey);

    // Symmetric rule: if 0 of weakest-3 on court, swap one in
    if (weakest3.length === 3) {
      const setOnH2 = new Set(courtJerseys);
      const weakOnCount = weakest3.filter(j => setOnH2.has(j)).length;
      if (weakOnCount === 0) {
        const weakBench = pool
          .filter(p => weakest3.includes(p.jersey) && !courtJerseys.includes(p.jersey))
          .sort((a, b) => underBy(b.jersey) - underBy(a.jersey));
        for (const swapIn of weakBench) {
          const strongOn = [...courtObjs]
            .filter(p => !weakest3.includes(p.jersey))
            .sort((a, b) => underBy(a.jersey) - underBy(b.jersey));
          let placed = false;
          for (const swapOut of strongOn) {
            const newOn = courtObjs.filter(p => p.jersey !== swapOut.jersey).concat([swapIn]);
            if (meetsSkillRequirements(newOn)) {
              courtObjs = newOn;
              courtJerseys = courtObjs.map(p => p.jersey);
              placed = true;
              break;
            }
          }
          if (placed) break;
        }
      }
    }

    // If all 3 weakest on court, swap least-under-pace one out (unless exemption applies)
    if (violatesWeakestThree(courtObjs, weakest3)) {
      const trioOnCourt = courtObjs
        .filter(p => weakest3.includes(p.jersey))
        .sort((a, b) => underBy(a.jersey) - underBy(b.jersey));
      const anyTrioUnder = trioOnCourt.some(p => underPace(p.jersey) >= H2_UNDER_PACE_EXEMPT_SECS);
      if (!anyTrioUnder) {
        const swapOut = trioOnCourt[0];
        const bench = pool.filter(p => !courtJerseys.includes(p.jersey) && !weakest3.includes(p.jersey));
        const swapIn = bench.find(cand => {
          const newOn = courtObjs.filter(p => p.jersey !== swapOut.jersey).concat([cand]);
          return meetsSkillRequirements(newOn);
        });
        if (swapIn) {
          courtObjs = courtObjs.filter(p => p.jersey !== swapOut.jersey).concat([swapIn]);
          courtJerseys = courtObjs.map(p => p.jersey);
        }
      }
    }

    return { courtObjs, courtJerseys };
  }

  function handleStartSecondHalf() {
    withActionLock(() => {
    const now = halfMins * 60;
    const unavail = jersey => fouledOut.has(jersey) || injured.has(jersey);

    // Flush stints so courtTime reflects end-of-H1 totals
    setAccumulated(prev => {
      const next = { ...prev };
      Object.keys(stintStart).forEach(j => {
        next[j] = (next[j] || 0) + (now - (stintStart[j] ?? now));
      });
      return next;
    });

    const { courtJerseys } = computeSecondHalfLineup();

    const stint = {};
    courtJerseys.forEach(j => { stint[j] = now; });
    const off = {};
    available.forEach(p => {
      if (!courtJerseys.includes(p.jersey) && !unavail(p.jersey)) off[p.jersey] = now;
    });
    setStintStart(stint);
    setOffSince(off);
    setOnCourt(courtJerseys);
    setGameSecs(now);
    setHalftimeDone(true);
    setShowHalftime(false);
    setRunning(false);
    setLastSubTime(now - 120);
    setPendingSub(null);
    setHandledWindows(new Set());
    // Seed carousel for H2: bench players start as "rested"
    const h2Bench = available
      .filter(p => !courtJerseys.includes(p.jersey) && !unavail(p.jersey))
      .map(p => p.jersey);
    setRestedThisHalf(new Set(h2Bench));
    }); // withActionLock
  }

  function courtTime(jersey) {
    const base = accumulated[jersey] || 0;
    if (stintStart[jersey] !== undefined) return base + (gameSecs - stintStart[jersey]);
    return base;
  }

  function doSubs(subList) {
    // Double-tap guard: validate each sub against current court state
    const courtSet = new Set(onCourt);
    const safeSubs = [];
    for (const sub of subList) {
      if (!courtSet.has(sub.outJersey)) continue; // already off
      if (courtSet.has(sub.inJersey)) continue;   // already on
      if (unavailableJerseys.has(sub.inJersey)) continue; // injured/fouled out since suggestion
      courtSet.delete(sub.outJersey);
      courtSet.add(sub.inJersey);
      safeSubs.push(sub);
    }
    if (safeSubs.length === 0) return 0;
    subList = safeSubs;

    const now = gameSecs;
    setAccumulated(prev => {
      const next = { ...prev };
      subList.forEach(({ outJersey }) => {
        next[outJersey] = (next[outJersey] || 0) + (now - (stintStart[outJersey] ?? now));
      });
      return next;
    });
    setStintStart(prev => {
      const next = { ...prev };
      subList.forEach(({ outJersey, inJersey }) => {
        delete next[outJersey];
        next[inJersey] = now;
      });
      return next;
    });
    setOnCourt(prev => {
      let next = [...prev];
      subList.forEach(({ outJersey, inJersey }) => {
        next = next.filter(j => j !== outJersey).concat([inJersey]);
      });
      return next;
    });
    // Track bench-stint start for departing players; clear for arriving.
    setOffSince(prev => {
      const next = { ...prev };
      subList.forEach(({ outJersey, inJersey }) => {
        next[outJersey] = now;
        delete next[inJersey];
      });
      return next;
    });
    setActiveMenu(null);
    setBenchMenu(null);
    // Track which players have rested this half (for 6-player carousel)
    setRestedThisHalf(prev => {
      const next = new Set(prev);
      subList.forEach(({ outJersey }) => next.add(outJersey));
      return next;
    });
    // Rule engine: sub resets cooldown, clears pending suggestion.
    setLastSubTime(now);
    setPendingSub(null);
    // Log the sub
    const logEntry = {
      time: gameSecs,
      half,
      timeInHalf,
      subs: subList.map(({ outJersey, inJersey }) => ({
        out: pObj(outJersey), in: pObj(inJersey),
      })),
    };
    setSubLog(prev => [...prev, logEntry]);
    return subList.length;
  }

  // (Legacy redistributeMinutes helper removed — markFouledOut / markInjured
  //  now handle their own redistribution inline, and record the info needed for
  //  time-aware clawback on Undo / Return.)


  // Mark player fouled out. Same minutes model as injury: take remaining target
  // and split it across active teammates, freeze player's target at played time,
  // and store a fouloutInfo record so Undo can do a time-aware partial clawback.
  function markFouledOut(jersey) {
    if (fouledOut.has(jersey) || injured.has(jersey)) return;
    withActionLock(() => {
    setActiveMenu(null);
    setBenchMenu(null);

    const wasOnCourt = onCourt.includes(jersey);
    const now = gameSecs;
    const playedSecs = (accumulated[jersey] || 0) +
      (wasOnCourt ? (now - (stintStart[jersey] ?? now)) : 0);
    const baseTargetMins =
      adjustedTargetMins[jersey] ??
      plan?.targetMins?.[jersey] ?? 0;
    const remainingMins = Math.max(0, baseTargetMins - playedSecs / 60);

    // Active others = available roster, minus this jersey, minus anyone already out
    const others = available
      .map(p => p.jersey)
      .filter(j => j !== jersey && !fouledOut.has(j) && !injured.has(j));

    if (remainingMins > 0 && others.length > 0) {
      const perOtherMins = remainingMins / others.length;
      setAdjustedTargetMins(prev => {
        const base = { ...(plan?.targetMins || {}), ...prev };
        base[jersey] = playedSecs / 60; // freeze target at minutes already played
        others.forEach(j => { base[j] = (base[j] || 0) + perOtherMins; });
        return base;
      });
      setFouloutInfo(prev => ({
        ...prev,
        [jersey]: { startSecs: now, remainingMins, perOtherMins, others },
      }));
    } else {
      setFouloutInfo(prev => ({
        ...prev,
        [jersey]: { startSecs: now, remainingMins: 0, perOtherMins: 0, others: [] },
      }));
    }

    setFouledOut(prev => new Set([...prev, jersey]));
    // Fouled-out players are unavailable, not on the bench — clear offSince
    // so they don't count in "longest bench stint" fairness calcs.
    setOffSince(prev => { const n = { ...prev }; delete n[jersey]; return n; });

    if (wasOnCourt) {
      setOnCourt(prev => prev.filter(j => j !== jersey));
      setAccumulated(prev => ({
        ...prev,
        [jersey]: (prev[jersey] || 0) + (now - (stintStart[jersey] ?? now)),
      }));
      setStintStart(prev => { const n = { ...prev }; delete n[jersey]; return n; });
      setReplacingJersey(jersey);
    }
    }); // withActionLock
  }

  // Mark player injured.
  // Minutes model: take the injured player's REMAINING target minutes and split
  // them evenly across players who are still active (not injured, not fouled out,
  // not this one). Record the redistribution so we can partially reverse it when
  // / if the player returns.
  function markInjured(jersey) {
    if (injured.has(jersey) || fouledOut.has(jersey)) return;
    withActionLock(() => {
    setActiveMenu(null);
    setBenchMenu(null);

    // Bank played seconds up to now if they were on court
    const wasOnCourt = onCourt.includes(jersey);
    const now = gameSecs;
    const playedSecs = (accumulated[jersey] || 0) +
      (wasOnCourt ? (now - (stintStart[jersey] ?? now)) : 0);

    // Figure out remaining target minutes to redistribute
    const baseTargetMins =
      adjustedTargetMins[jersey] ??
      plan?.targetMins?.[jersey] ?? 0;
    const remainingMins = Math.max(0, baseTargetMins - playedSecs / 60);

    // Other players who will absorb the minutes — active roster minus this jersey
    // and minus anyone already out
    const others = available
      .map(p => p.jersey)
      .filter(j => j !== jersey && !fouledOut.has(j) && !injured.has(j));

    if (remainingMins > 0 && others.length > 0) {
      const perOtherMins = remainingMins / others.length;
      setAdjustedTargetMins(prev => {
        // Establish a working base: whatever's already in adjustedTargetMins,
        // falling back to plan.targetMins for any missing jersey
        const base = { ...(plan?.targetMins || {}), ...prev };
        base[jersey] = playedSecs / 60; // freeze their target at minutes already played
        others.forEach(j => { base[j] = (base[j] || 0) + perOtherMins; });
        return base;
      });
      setInjuryInfo(prev => ({
        ...prev,
        [jersey]: {
          startSecs: now,
          remainingMins,
          perOtherMins,
          others,
        },
      }));
    } else {
      // No redistribution possible — still record the start for UI elapsed timer
      setInjuryInfo(prev => ({
        ...prev,
        [jersey]: { startSecs: now, remainingMins: 0, perOtherMins: 0, others: [] },
      }));
    }

    setInjured(prev => new Set([...prev, jersey]));
    // Injured players are unavailable — clear offSince.
    setOffSince(prev => { const n = { ...prev }; delete n[jersey]; return n; });

    if (wasOnCourt) {
      setOnCourt(prev => prev.filter(j => j !== jersey));
      setAccumulated(prev => ({
        ...prev,
        [jersey]: (prev[jersey] || 0) + (now - (stintStart[jersey] ?? now)),
      }));
      setStintStart(prev => { const n = { ...prev }; delete n[jersey]; return n; });
      setReplacingJersey(jersey);
    }
    }); // withActionLock
  }

  // Mark the currently active rotation window (if any) as handled.
  // Called after manual/emergency subs so the window doesn't reappear
  // after the 45s quiet period expires.
  function markActiveWindowHandled() {
    const rosterForCadence = available.length - fouledOut.size - injured.size;
    if (rosterForCadence <= 5) return;
    const schedule = getWindowSchedule(rosterForCadence, halfMins, START_BLOCK_SECS, CLOSE_BLOCK_SECS);
    const activeWindow = schedule.find(w =>
      gameSecs >= w.openSecs && gameSecs <= w.hardLateSecs &&
      !w.isCloser && !handledWindows.has(wKey(rosterForCadence, w.targetSecs))
    );
    if (activeWindow) {
      setHandledWindows(prev => new Set([...prev, wKey(rosterForCadence, activeWindow.targetSecs)]));
    }
  }

  // Manual sub out — take a player off court and open replacement picker
  function manualSubOut(jersey) {
    if (!onCourt.includes(jersey)) return;
    withActionLock(() => {
      const now = gameSecs;
      setAccumulated(prev => ({
        ...prev,
        [jersey]: (prev[jersey] || 0) + (now - (stintStart[jersey] ?? now)),
      }));
      setStintStart(prev => { const n = { ...prev }; delete n[jersey]; return n; });
      setOffSince(prev => ({ ...prev, [jersey]: now }));
      setOnCourt(prev => prev.filter(j => j !== jersey));
      setActiveMenu(null);
      setBenchMenu(null);
      setReplacingJersey(jersey);
      // Manual sub resets the cooldown, clears pending, marks active window,
      // and adds the player to carousel memory.
      setLastSubTime(now);
      setPendingSub(null);
      markActiveWindowHandled();
      setRestedThisHalf(prev => { const next = new Set(prev); next.add(jersey); return next; });
    });
  }

  // Foul add / remove
  function addFoul(jersey) {
    const cur = fouls[jersey] || 0;
    if (cur >= 5) return;
    if (cur === 4) {
      // 5th foul — ask BEFORE mutating any state
      const p = PLAYERS_DB.find(pl => pl.jersey === jersey);
      const name = p ? `#${p.jersey} ${p.name}` : `#${jersey}`;
      if (window.confirm(`5th foul for ${name}. Foul out this player?`)) {
        setFouls(prev => ({ ...prev, [jersey]: Math.max(prev[jersey] || 0, 5) }));
        setTimeout(() => markFouledOut(jersey), 0);
      }
    } else {
      // Use functional updater to avoid stale closure under rapid taps
      setFouls(prev => {
        const c = prev[jersey] || 0;
        if (c >= 4) return prev; // 5th foul handled above with confirm
        return { ...prev, [jersey]: c + 1 };
      });
    }
  }
  function removeFoul(jersey) {
    setFouls(prev => {
      const cur = prev[jersey] || 0;
      if (cur <= 0) return prev;
      return { ...prev, [jersey]: cur - 1 };
    });
  }

  // Clear injury — reverse the unused portion of the redistribution.
  // If injury was expected to cover `remainingMins` of the player's share and
  // Δ minutes have elapsed, `unusedMins = remainingMins - Δ` is the amount NOT
  // yet consumed by teammates. Pull that back per teammate (unused/N each) and
  // give it to the returning player so they don't need a huge catch-up stint.
  function clearInjury(jersey) {
    if (!injured.has(jersey)) return;
    withActionLock(() => {
      const info = injuryInfo[jersey];
      setInjured(prev => { const n = new Set(prev); n.delete(jersey); return n; });
      // Returning player has been resting — add to carousel memory
      setRestedThisHalf(prev => { const next = new Set(prev); next.add(jersey); return next; });
      // Returning player goes to bench: start their bench-stint clock now.
      setOffSince(prev => ({ ...prev, [jersey]: gameSecs }));

      if (!info || info.remainingMins <= 0 || info.others.length === 0) {
        setInjuryInfo(prev => { const n = { ...prev }; delete n[jersey]; return n; });
        return;
      }

      const elapsedMins = Math.max(0, (gameSecs - info.startSecs) / 60);
      const unusedMins = Math.max(0, info.remainingMins - elapsedMins);
      const N = info.others.length;
      const pullBackPerOther = unusedMins / N;

      if (unusedMins > 0) {
        setAdjustedTargetMins(prev => {
          const next = { ...prev };
          // Give the unused chunk back to the returning player
          next[jersey] = (next[jersey] || 0) + unusedMins;
          // Pull the same share back from each teammate who received it
          info.others.forEach(j => {
            next[j] = Math.max(0, (next[j] || 0) - pullBackPerOther);
          });
          return next;
        });
      }

      setInjuryInfo(prev => { const n = { ...prev }; delete n[jersey]; return n; });
    });
  }

  // Undo foul-out — restore player to bench, drop foul count to 4, and roll back
  // the UNUSED portion of their remaining-minutes redistribution (same math as
  // the injury Return path). If the player has been out for most of their share
  // already, little or nothing is clawed back — teammates keep what they earned.
  function undoFoulOut(jersey) {
    if (!fouledOut.has(jersey)) return;
    withActionLock(() => {
      const info = fouloutInfo[jersey];

      setFouledOut(prev => { const n = new Set(prev); n.delete(jersey); return n; });
      // Returning player has been resting — add to carousel memory
      setRestedThisHalf(prev => { const next = new Set(prev); next.add(jersey); return next; });
      setFouls(prev => ({ ...prev, [jersey]: 4 }));
      setOffSince(prev => ({ ...prev, [jersey]: gameSecs }));

      if (!info || info.remainingMins <= 0 || info.others.length === 0) {
        setFouloutInfo(prev => { const n = { ...prev }; delete n[jersey]; return n; });
        return;
      }

      const elapsedMins = Math.max(0, (gameSecs - info.startSecs) / 60);
      const unusedMins = Math.max(0, info.remainingMins - elapsedMins);
      const N = info.others.length;
      const pullBackPerOther = unusedMins / N;

      if (unusedMins > 0) {
        setAdjustedTargetMins(prev => {
          const next = { ...prev };
          next[jersey] = (next[jersey] || 0) + unusedMins;
          info.others.forEach(j => {
            next[j] = Math.max(0, (next[j] || 0) - pullBackPerOther);
          });
          return next;
        });
      }

      setFouloutInfo(prev => { const n = { ...prev }; delete n[jersey]; return n; });
    });
  }

  // Bring someone on as emergency replacement
  function doEmergencyIn(inJersey) {
    if (inJersey === replacingJersey) return; // can't replace yourself
    if (onCourt.includes(inJersey)) return;
    if (onCourt.length >= 5) return;
    if (unavailableJerseys.has(inJersey)) return;
    withActionLock(() => {
      const now = gameSecs;
      setStintStart(prev => ({ ...prev, [inJersey]: now }));
      setOffSince(prev => { const n = { ...prev }; delete n[inJersey]; return n; });
      setOnCourt(prev => [...prev, inJersey]);
      setSubLog(prev => [...prev, {
        time: now, half, timeInHalf,
        subs: [{ out: pObj(replacingJersey), in: pObj(inJersey) }],
        emergency: true,
      }]);
      setReplacingJersey(null);
      setLastSubTime(now);
      setPendingSub(null);
      markActiveWindowHandled();
      // Carousel memory: the incoming player just rested on the bench, so mark
      // them in restedThisHalf to prevent the engine from yo-yoing them right off.
      setRestedThisHalf(prev => { const next = new Set(prev); next.add(inJersey); return next; });
    });
  }

  // Current events list (plan + dynamically-appended events), sorted by time
  // ── RULE-DRIVEN SUB ENGINE (lookahead + bundled) ──────────────────────────
  // Each tick: evaluate the current state AND project 60 s ahead. If any
  // trigger would fire now OR within the lookahead window, bundle all those
  // subs into a single suggestion so the coach makes one tap instead of three
  // separate stoppages 30 seconds apart.
  //
  // Bundle cap = benchAvail.length (can't sub more players than you have
  // sitting). With 6 players (1 bench) every sub is a straight 1-for-1.
  //
  // Cooldown scales with bench depth (cooldownFor): fewer subs → faster
  // rotations so the single bench player doesn't sit forever.
  //
  // pendingSub shape: { subs: [{ out, in }], reason: string, mandatory: bool }

  // ── Alert: vibrate + beep when a sub suggestion appears ───────────────
  // Reuse a single AudioContext. Resume it before every beep because
  // mobile browsers suspend it after inactivity or between games.
  const audioCtxRef = useRef(null);
  const getAudioCtx = () => {
    if (!audioCtxRef.current || audioCtxRef.current.state === "closed") {
      try { audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)(); }
      catch (e) { /* audio not available */ }
    }
    return audioCtxRef.current;
  };
  // Warm up the AudioContext on any user tap (required by mobile browsers).
  // Re-listen after each game reset so the context stays alive.
  useEffect(() => {
    const warmUp = () => {
      const ctx = getAudioCtx();
      if (ctx && ctx.state === "suspended") ctx.resume();
    };
    document.addEventListener("touchstart", warmUp);
    document.addEventListener("click", warmUp);
    return () => {
      document.removeEventListener("touchstart", warmUp);
      document.removeEventListener("click", warmUp);
    };
  }, []);

  const notifySub = () => {
    // Vibrate (Android only — not supported on iPhone)
    if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
    // Short beep via reusable AudioContext
    try {
      const ctx = getAudioCtx();
      if (ctx) {
        // Resume if suspended (happens after inactivity / between games)
        if (ctx.state === "suspended") ctx.resume();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 880;
        gain.gain.value = 0.3;
        osc.start();
        osc.stop(ctx.currentTime + 0.25);
      }
    } catch (e) { /* audio not available */ }
  };

  // Track whether a game is currently live (clock has started at least once)
  const gameIsLive = screen === "game" || (gameSecs > 0 && !gameOver);

  // ── CADENCE-FIRST ROTATION ENGINE ──────────────────────────────────────────
  // Architecture:
  //   1. Mandatory triggers (always live, every second): hard stint cap, skill
  //      violation, weakest-3 balance → fire immediately.
  //   2. Window-based fairness rotation: subs fire ONLY at scheduled rotation
  //      windows. Cadence scales inversely with bench size.
  //   3. Closer-restore: dedicated window near end of game.
  //
  // This replaces the old continuous-trigger engine. The coach sees fewer,
  // more predictable stoppages while maintaining fairness.
  useEffect(() => {
    if (!plan || gameOver || showHalftime) {
      if (pendingSub !== null) setPendingSub(null);
      return;
    }
    if (screen !== "game") {
      if (pendingSub !== null) setPendingSub(null);
      return;
    }
    // Suppress while the emergency replacement overlay is open — the coach
    // is already handling a player-off-court event, don't stack suggestions.
    if (replacingJersey != null) {
      if (pendingSub !== null) setPendingSub(null);
      return;
    }

    // For cadence: exclude both fouled-out AND injured (reflects actual bench depth NOW)
    const rosterForCadence = available.length - fouledOut.size - injured.size;

    const config = rosterForCadence > 5 ? getRotationConfig(rosterForCadence) : getRotationConfig(6); // fallback config for mandatory checks
    const inStartBlock = half === 1 && gameSecs < START_BLOCK_SECS;

    const onCourtPlayers = onCourt
      .map(j => PLAYERS_DB.find(p => p.jersey === j))
      .filter(Boolean);
    const benchAvail = available.filter(p =>
      !onCourt.includes(p.jersey) && !unavailableJerseys.has(p.jersey));

    // Even with no bench, check if we're short-handed (fewer than 5 on court)
    if (onCourtPlayers.length === 0) {
      if (pendingSub !== null) setPendingSub(null);
      return;
    }

    const benchCount = benchAvail.length;
    const activePlayers = available.filter(p => !unavailableJerseys.has(p.jersey));
    const weakest3 = weakestThreeJerseys(activePlayers);
    const starterJerseys = new Set((plan?.starting || []).map(p => p.jersey));

    // ── Time helpers ──────────────────────────────────────────────────────
    const stintLen = (j) => stintStart[j] != null ? gameSecs - stintStart[j] : 0;
    const courtSecsOf = (j) => {
      const base = accumulated[j] || 0;
      return stintStart[j] != null ? base + (gameSecs - stintStart[j]) : base;
    };
    // Budget-aware: starters have CLOSE_BLOCK_SECS banked for the closer.
    const effectiveCourtSecs = (j) => {
      const base = courtSecsOf(j);
      return starterJerseys.has(j) ? base + CLOSE_BLOCK_SECS : base;
    };

    // ── Legality helpers ─────────────────────────────────────────────────
    const legalSkillSim = (court, pOut, pIn) => {
      const newOn = court.filter(p => p.jersey !== pOut.jersey).concat([pIn]);
      return meetsSkillRequirements(newOn);
    };
    const legalStrictSim = (court, pOut, pIn) => {
      const newOn = court.filter(p => p.jersey !== pOut.jersey).concat([pIn]);
      return meetsSkillRequirements(newOn) && !violatesWeakestBalance(newOn, weakest3);
    };
    const pickInSim = (court, pOut, bench) => {
      return bench.find(pIn => legalStrictSim(court, pOut, pIn))
        || bench.find(pIn => legalSkillSim(court, pOut, pIn))
        || null; // never fall back to an illegal sub
    };
    // Search all OUT/IN combinations to find the best legal pair.
    // outCandidates should be pre-sorted by priority (longest stint, lowest rating, etc).
    // benchSorted should be pre-sorted by least effective court time.
    const findLegalPair = (court, outCandidates, benchSorted) => {
      // First pass: strict legality (skill + weakest balance)
      for (const out of outCandidates) {
        const inP = benchSorted.find(pIn => legalStrictSim(court, out, pIn));
        if (inP) return { out, in: inP };
      }
      // Second pass: skill-only legality
      for (const out of outCandidates) {
        const inP = benchSorted.find(pIn => legalSkillSim(court, out, pIn));
        if (inP) return { out, in: inP };
      }
      return null;
    };

    // Compare two pendingSub objects to avoid useless re-renders.
    const subsEq = (a, b) => {
      if (!a || !b) return false;
      if (a.mandatory !== b.mandatory || a.reason !== b.reason) return false;
      if (a.windowTarget !== b.windowTarget || a.windowSoftLate !== b.windowSoftLate || a.windowRoster !== b.windowRoster) return false;
      if (a.subs.length !== b.subs.length) return false;
      return a.subs.every((s, i) =>
        s.out?.jersey === b.subs[i].out?.jersey && s.in.jersey === b.subs[i].in.jersey);
    };

    // ── 0. SHORT-HANDED REPAIR: add player when fewer than 5 on court ───
    if (!inStartBlock && onCourtPlayers.length < 5 && benchAvail.length > 0) {
      // Prefer players that fix a skill violation, then by least court time
      const courtNow = [...onCourtPlayers];
      const hasSkillVio = !meetsSkillRequirements(courtNow);
      const sorted = [...benchAvail].sort((a, b) => {
        if (hasSkillVio) {
          const aFixes = meetsSkillRequirements([...courtNow, a]);
          const bFixes = meetsSkillRequirements([...courtNow, b]);
          if (aFixes !== bFixes) return aFixes ? -1 : 1;
        }
        return effectiveCourtSecs(a.jersey) - effectiveCourtSecs(b.jersey);
      });
      const inP = sorted[0];
      const next = {
        subs: [{ out: null, in: inP }],
        reason: "⚠ Add player — fewer than 5 on court",
        mandatory: true,
        addOnly: true,
      };
      if (!subsEq(pendingSub, next)) { setPendingSub(next); notifySub(); }
      return;
    }

    // ── 1. MANDATORY TRIGGERS (always live, every second) ────────────────
    // Note: only all-3-weakest-ON-court is mandatory (too many weak at once).
    // 0-on-court (all weak on bench) is a fairness issue handled at windows.
    if (!inStartBlock) {
      // Exempt starters from hard stint cap during (and 60s before) the closer
      // block — the closer restore is supposed to keep them on court to finish.
      const totalGameSecs = halfMins * 2 * 60;
      const closeStart = totalGameSecs - CLOSE_BLOCK_SECS;
      const nearOrInClose = half === 2 && gameSecs >= closeStart - 60;
      const overStint = onCourtPlayers.filter(p => {
        if (nearOrInClose && starterJerseys.has(p.jersey)) return false;
        return stintLen(p.jersey) >= config.hardStintCapSecs;
      });
      const skillVio = !meetsSkillRequirements(onCourtPlayers);
      const weakVio = violatesWeakestThree(onCourtPlayers, weakest3);

      if (overStint.length > 0 || skillVio || weakVio) {
        let simCourt = [...onCourtPlayers];
        let simBench = [...benchAvail];
        const subPairs = [];
        const usedOut = new Set();
        const usedIn = new Set();

        for (let pass = 0; pass < Math.min(3, benchCount); pass++) {
          const osNow = simCourt.filter(p => {
            if (nearOrInClose && starterJerseys.has(p.jersey)) return false;
            return stintLen(p.jersey) >= config.hardStintCapSecs && !usedOut.has(p.jersey);
          });
          const svNow = !meetsSkillRequirements(simCourt);
          const wvNow = violatesWeakestThree(simCourt, weakest3);
          if (osNow.length === 0 && !svNow && !wvNow) break;

          const skip = new Set([...usedOut, ...usedIn]);
          let out = null, reason = "";

          if (osNow.length > 0) {
            out = [...osNow].sort((a, b) => stintLen(b.jersey) - stintLen(a.jersey))[0];
            reason = `Stint cap (${fmt(config.hardStintCapSecs)})`;
          } else if (wvNow) {
            // All 3 weakest are on court — pull the longest-stint one off
            out = [...simCourt]
              .filter(p => weakest3.includes(p.jersey) && !skip.has(p.jersey))
              .sort((a, b) => stintLen(b.jersey) - stintLen(a.jersey))[0];
            reason = "Dev balance (3 weakest on court)";
          } else if (svNow) {
            out = [...simCourt]
              .filter(p => !skip.has(p.jersey))
              .sort((a, b) => a.rating - b.rating)[0];
            reason = "Skill minimums";
          }

          if (!out) break;
          const excluded = new Set([...usedIn, ...usedOut]);
          const freeBench = simBench.filter(p => !excluded.has(p.jersey));
          const sorted = [...freeBench].sort((a, b) => effectiveCourtSecs(a.jersey) - effectiveCourtSecs(b.jersey));
          let inP = pickInSim(simCourt, out, sorted);
          if (!inP) {
            // Out-first failed — restrict fallback to candidates that fix the trigger.
            // For stint cap: must remove an over-stint player.
            // For dev balance: must remove a weakest-3 player.
            // For skill: any court player is fair game.
            let outCandidates;
            if (osNow.length > 0) {
              outCandidates = osNow.filter(p => !skip.has(p.jersey));
            } else if (wvNow) {
              outCandidates = simCourt.filter(p =>
                weakest3.includes(p.jersey) && !skip.has(p.jersey));
            } else {
              outCandidates = simCourt.filter(p => !skip.has(p.jersey));
            }
            const pair = findLegalPair(simCourt, outCandidates, sorted);
            if (!pair) break;
            out = pair.out;
            inP = pair.in;
          }

          subPairs.push({ out, in: inP, reason });
          usedOut.add(out.jersey);
          usedIn.add(inP.jersey);
          simCourt = simCourt.filter(p => p.jersey !== out.jersey).concat([inP]);
          simBench = simBench.filter(p => p.jersey !== inP.jersey).concat([out]);
        }

        if (subPairs.length > 0) {
          const reasons = [...new Set(subPairs.map(s => s.reason))];
          const next = { subs: subPairs, reason: "⚠ " + reasons.join(" + "), mandatory: true };
          if (!subsEq(pendingSub, next)) { setPendingSub(next); notifySub(); }
          return;
        }
      }
    }

    // ── START BLOCK (H1 only): no subs ──────────────────────────────────
    if (inStartBlock) {
      if (pendingSub !== null) setPendingSub(null);
      return;
    }

    // ── NO BENCH: skip fairness windows (mandatory checks already ran above) ─
    if (benchAvail.length === 0 || rosterForCadence <= 5) {
      if (pendingSub !== null) setPendingSub(null);
      return;
    }

    // ── QUIET PERIOD after recent sub ─────────────────────────────────
    // Suppress window-based suggestions for 45s after any manual/confirmed sub
    // to prevent double-prompting the coach. Mandatory triggers above still fire.
    const QUIET_PERIOD_SECS = 45;
    if (gameSecs - lastSubTime < QUIET_PERIOD_SECS) {
      if (pendingSub !== null && !pendingSub.mandatory) setPendingSub(null);
      return;
    }

    // ── 2. WINDOW-BASED ROTATION ────────────────────────────────────────
    const schedule = getWindowSchedule(rosterForCadence, halfMins, START_BLOCK_SECS, CLOSE_BLOCK_SECS);

    // Find the current active window: first unhandled window whose time range
    // includes gameSecs. Expired windows (past hardLateSecs) are simply skipped.
    const activeWindow = schedule.find(w =>
      gameSecs >= w.openSecs &&
      gameSecs <= w.hardLateSecs &&
      !handledWindows.has(wKey(rosterForCadence, w.targetSecs))
    );

    if (!activeWindow) {
      // No active window — rotation stable
      if (pendingSub !== null) setPendingSub(null);
      return;
    }

    // ── 3. CLOSER-RESTORE WINDOW ────────────────────────────────────────
    if (activeWindow.isCloser) {
      let simCourt = [...onCourtPlayers];
      let simBench = [...benchAvail];
      const pairs = [];
      // Closer is a special event — allow ALL non-starters to be swapped off,
      // not limited by normal bundleCap. Ensures all available starters return.
      const closerMax = benchCount;
      for (let pass = 0; pass < closerMax && simBench.length > 0; pass++) {
        const nonStartersOn = simCourt.filter(p => !starterJerseys.has(p.jersey));
        const startersOff = simBench.filter(p => starterJerseys.has(p.jersey));
        if (nonStartersOn.length === 0 || startersOff.length === 0) break;
        const out = [...nonStartersOn].sort((a, b) => stintLen(b.jersey) - stintLen(a.jersey))[0];
        const sorted = [...startersOff].sort((a, b) => b.rating - a.rating);
        const inP = pickInSim(simCourt, out, sorted);
        if (!inP) break;
        pairs.push({ out, in: inP });
        simCourt = simCourt.filter(p => p.jersey !== out.jersey).concat([inP]);
        simBench = simBench.filter(p => p.jersey !== inP.jersey).concat([out]);
      }
      if (pairs.length === 0) {
        // Starters already on court — auto-handle window
        if (!handledWindows.has(wKey(rosterForCadence, activeWindow.targetSecs))) {
          setHandledWindows(prev => new Set([...prev, wKey(rosterForCadence, activeWindow.targetSecs)]));
        }
        if (pendingSub !== null) setPendingSub(null);
        return;
      }
      // Check if any starters are unavailable (fouled out / injured)
      const unavailableStarters = (plan?.starting || []).filter(p => unavailableJerseys.has(p.jersey));
      const reason = unavailableStarters.length > 0
        ? `Closer: partial restore (${unavailableStarters.map(p => `#${p.jersey}`).join(", ")} unavailable)`
        : "Closer: restore starters";
      const next = {
        subs: pairs,
        reason,
        mandatory: true,
        windowTarget: activeWindow.targetSecs,
        windowSoftLate: activeWindow.softLateSecs,
        windowRoster: rosterForCadence,
      };
      if (!subsEq(pendingSub, next)) { setPendingSub(next); notifySub(); }
      return;
    }

    // ── 4. FAIRNESS ROTATION WINDOW ─────────────────────────────────────
    let simCourt = [...onCourtPlayers];
    let simBench = [...benchAvail];
    const subPairs = [];
    const usedOut = new Set();
    const usedIn = new Set();
    const isFirstCycle = activeWindow.isFirstCycle;

    // 85% floor-risk projection: don't bench a player if they can't recover
    // to 85% of fair-share minutes given remaining game time. Only matters in
    // H2 or late H1 when time is actually tight.
    const totalGS = halfMins * 2 * 60;
    const remainingGameSecs = totalGS - gameSecs;
    const fairShareSecs = (5 * totalGS) / rosterForCadence;
    const floorSecs = 0.85 * fairShareSecs;
    const floorRiskApplies = remainingGameSecs < totalGS * 0.55; // kicks in past 45% of game

    for (let pass = 0; pass < Math.min(config.bundleCap, benchCount); pass++) {
      const freeBench = simBench.filter(p => !usedIn.has(p.jersey) && !usedOut.has(p.jersey));
      if (freeBench.length === 0) break;

      const skip = new Set([...usedOut, ...usedIn]);
      // Pick OUT — eligible players who've met minimum stint
      let eligible = simCourt.filter(p => {
        if (skip.has(p.jersey)) return false;
        return stintLen(p.jersey) >= config.minStintSecs;
      });

      // Floor-risk guard: exclude players who can't reach 85% of fair-share
      // if benched now. Projected max = current court time + (remaining - cadence),
      // since they'd sit at least one full cadence cycle before returning.
      if (floorRiskApplies && eligible.length > 1) {
        const safe = eligible.filter(p => {
          const projected = courtSecsOf(p.jersey) + Math.max(0, remainingGameSecs - config.cadenceSecs);
          return projected >= floorSecs;
        });
        // Only apply if we still have someone to sub out
        if (safe.length > 0) eligible = safe;
      }

      if (eligible.length === 0) break;

      let out;
      if (isFirstCycle) {
        // Priority-rest carousel: only pick players who haven't rested yet
        // this half. This prevents the yo-yo bug where the just-entered bench
        // player gets pulled right back off (common with 6 players / 1 bench).
        const unrested = eligible.filter(p => !restedThisHalf.has(p.jersey));
        const pool = unrested.length > 0 ? unrested : eligible;
        // Within the pool, sub out weaker players first so strongest play longest
        out = [...pool].sort((a, b) => a.rating - b.rating)[0];
      } else {
        // Normal fairness: sub out player with most effective court time
        out = [...eligible].sort((a, b) => effectiveCourtSecs(b.jersey) - effectiveCourtSecs(a.jersey))[0];
      }

      // Pick IN — least effective court time (bench players look under-served)
      const excluded = new Set([...usedIn, ...usedOut]);
      const simSet = new Set(simCourt.map(p => p.jersey));
      const weakOnCount = weakest3.filter(j => simSet.has(j)).length;
      let sorted;
      if (weakOnCount === 0 && weakest3.length === 3) {
        // All weak on bench — prefer bringing one in
        const weakB = freeBench.filter(p => weakest3.includes(p.jersey))
          .sort((a, b) => effectiveCourtSecs(a.jersey) - effectiveCourtSecs(b.jersey));
        const strongB = freeBench.filter(p => !weakest3.includes(p.jersey))
          .sort((a, b) => effectiveCourtSecs(a.jersey) - effectiveCourtSecs(b.jersey));
        sorted = [...weakB, ...strongB];
      } else {
        sorted = [...freeBench]
          .sort((a, b) => effectiveCourtSecs(a.jersey) - effectiveCourtSecs(b.jersey));
      }

      let inP = pickInSim(simCourt, out, sorted);
      if (!inP) {
        // Out-first failed — search all eligible pairs
        const pair = findLegalPair(simCourt, eligible, sorted);
        if (!pair) break;
        out = pair.out;
        inP = pair.in;
      }

      subPairs.push({ out, in: inP });
      usedOut.add(out.jersey);
      usedIn.add(inP.jersey);
      simCourt = simCourt.filter(p => p.jersey !== out.jersey).concat([inP]);
      simBench = simBench.filter(p => p.jersey !== inP.jersey).concat([out]);
    }

    if (subPairs.length === 0) {
      // Window active but no eligible sub (min stint not met, or balanced).
      // Don't auto-handle if we're still in the early-open phase — a player
      // may become eligible by the target time. Only auto-handle once past
      // the target time.
      if (gameSecs >= activeWindow.targetSecs) {
        const k = wKey(rosterForCadence, activeWindow.targetSecs);
        if (!handledWindows.has(k)) {
          setHandledWindows(prev => new Set([...prev, k]));
        }
      }
      if (pendingSub !== null) setPendingSub(null);
      return;
    }

    const next = {
      subs: subPairs,
      reason: `Rotation${isFirstCycle ? " (first cycle)" : ""}`,
      mandatory: false,
      windowTarget: activeWindow.targetSecs,
      windowSoftLate: activeWindow.softLateSecs,
      windowRoster: rosterForCadence,
    };
    if (!subsEq(pendingSub, next)) {
      // Only beep/vibrate when window is due or overdue, not when just opening
      const shouldAlert = gameSecs >= activeWindow.targetSecs;
      setPendingSub(next);
      if (shouldAlert) notifySub();
    }
  }, [plan, gameSecs, half, halfMins, onCourt, available, stintStart, accumulated, offSince,
      unavailableJerseys, showHalftime, gameOver, screen, pendingSub, handledWindows, fouledOut,
      lastSubTime, restedThisHalf, replacingJersey]);

  const benchPlayers = available.filter(
    p => !onCourt.includes(p.jersey) && !unavailableJerseys.has(p.jersey) && p.jersey !== replacingJersey
  );

  // ── DYNAMIC MINUTES DISTRIBUTION ───────────────────────────────────────────
  // Fair share recalculates continuously based on who is still available. Each
  // available player's target = (total court-minutes in game) ÷ (available players),
  // excluding anyone fouled out. Injured players still count (they'll return).
  // "Over/under" = actual court-time minus the pace they SHOULD be on at gameSecs.
  const activeCount = Math.max(1, available.length - fouledOut.size);
  const liveTargetSecs = (totalGameSecs * 5) / activeCount; // per-player total target, seconds
  const liveTargetMins = Math.round((liveTargetSecs / 60) * 10) / 10;
  // Per-player target (respects injury redistribution / foul-out adjustments).
  // Falls back to the pure fair-share number if nothing has been adjusted yet.
  function targetMinsFor(jersey) {
    const adj = adjustedTargetMins[jersey];
    if (typeof adj === "number") return adj;
    const base = plan?.targetMins?.[jersey];
    if (typeof base === "number") return base;
    return liveTargetMins;
  }
  // Ideal accumulated court-time for THIS player at gameSecs, given their target
  function paceFor(jersey) {
    return targetMinsFor(jersey) * 60 * (gameSecs / Math.max(1, totalGameSecs));
  }
  function overUnderSecs(jersey) {
    return courtTime(jersey) - paceFor(jersey);
  }

  const pObj = (jersey) => PLAYERS_DB.find(p => p.jersey === jersey);

  // ── SETUP SCREEN ────────────────────────────────────────────────────────────
  if (screen === "setup") return (
    <div style={{ minHeight: "100vh", backgroundColor: "#0f172a", padding: "16px", fontFamily: "system-ui, sans-serif" }}>
      <div style={{ maxWidth: 400, margin: "0 auto" }}>
        <div style={{ background: "linear-gradient(135deg,#1e3a8a,#1d4ed8)", borderRadius: 20, padding: "20px 20px 16px", marginBottom: 16, textAlign: "center" }}>
          <div style={{ display: "flex", justifyContent: "center", marginBottom: 10 }}>
            <CoachKLogo size={88} />
          </div>
          <div style={{ color: "#fff", fontSize: 16, fontWeight: 700, letterSpacing: 0.3 }}>Coach K Sub Planner</div>
          <div style={{ color: "#93c5fd", fontSize: 11, marginTop: 2 }}>Roadies 005</div>
        </div>

        {hasSavedGame && (
          <div style={{ background: "#422006", border: "1px solid #f59e0b", borderRadius: 16, padding: 14, marginBottom: 12 }}>
            <div style={{ color: "#fbbf24", fontSize: 12, fontWeight: 700, letterSpacing: 1, marginBottom: 6 }}>⚠ SAVED GAME FOUND</div>
            <div style={{ color: "#fde68a", fontSize: 13, marginBottom: 10 }}>
              A game is in progress. Tap Resume to jump back into it (clock stays paused), or discard to start fresh.
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={() => { setConfirmDiscard(false); setScreen("game"); }}
                style={{ flex: 1, padding: "10px", borderRadius: 10, border: "none", background: "#22c55e", color: "#052e16", fontSize: 14, fontWeight: 700, cursor: "pointer" }}>
                ▶ Resume Game
              </button>
              <button
                onClick={() => {
                  if (confirmDiscard) {
                    discardSavedGame();
                    setConfirmDiscard(false);
                  } else {
                    setConfirmDiscard(true);
                  }
                }}
                style={{
                  flex: 1, padding: "10px", borderRadius: 10, border: "none",
                  background: confirmDiscard ? "#dc2626" : "#7f1d1d",
                  color: "#fff", fontSize: 14, fontWeight: 700, cursor: "pointer",
                }}>
                {confirmDiscard ? "⚠ Tap again to confirm" : "🗑 Discard"}
              </button>
            </div>
            {confirmDiscard && (
              <button onClick={() => setConfirmDiscard(false)}
                style={{ marginTop: 8, width: "100%", padding: "6px", borderRadius: 8, border: "none", background: "#334155", color: "#cbd5e1", fontSize: 12, cursor: "pointer" }}>
                Cancel
              </button>
            )}
          </div>
        )}

        <div style={{ background: "#1e293b", borderRadius: 16, padding: 16, marginBottom: 12 }}>
          <div style={{ color: "#94a3b8", fontSize: 12, fontWeight: 700, marginBottom: 10, letterSpacing: 1 }}>HALF DURATION</div>
          <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
            <button onClick={() => setHalfMins(m => Math.max(5, m - 5))}
              style={{ width: 44, height: 44, borderRadius: "50%", background: "#334155", border: "none", color: "#fff", fontSize: 22, cursor: "pointer" }}>−</button>
            <div style={{ flex: 1, textAlign: "center" }}>
              <span style={{ color: "#fff", fontSize: 32, fontWeight: 800 }}>{halfMins}</span>
              <span style={{ color: "#64748b", fontSize: 16 }}> min halves</span>
              <div style={{ color: "#64748b", fontSize: 12 }}>Total: {halfMins * 2} min game</div>
            </div>
            <button onClick={() => setHalfMins(m => m + 5)}
              style={{ width: 44, height: 44, borderRadius: "50%", background: "#334155", border: "none", color: "#fff", fontSize: 22, cursor: "pointer" }}>+</button>
          </div>
        </div>

        <div style={{ background: "#1e293b", borderRadius: 16, padding: 16, marginBottom: 16 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
            <div style={{ color: "#94a3b8", fontSize: 12, fontWeight: 700, letterSpacing: 1 }}>AVAILABLE PLAYERS</div>
            <div style={{ color: "#60a5fa", fontSize: 13, fontWeight: 600 }}>{selected.size} selected</div>
          </div>
          {PLAYERS_DB.map(p => {
            const isOn = selected.has(p.jersey);
            return (
              <div key={p.jersey} onClick={() => togglePlayer(p.jersey)}
                style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 12px", borderRadius: 12, marginBottom: 6, cursor: "pointer",
                  background: isOn ? "#1e3a5f" : "#0f172a", border: `1px solid ${isOn ? "#3b82f6" : "#1e293b"}`, opacity: isOn ? 1 : 0.5 }}>
                <div style={{ width: 36, height: 36, borderRadius: "50%", background: p.color, display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 13, fontWeight: 700, flexShrink: 0 }}>
                  #{p.jersey}
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ color: "#fff", fontSize: 15, fontWeight: 600 }}>{p.name}</div>
                  <div style={{ color: "#64748b", fontSize: 11 }}>
                    {p.skills.join(" · ")}
                  </div>
                </div>
                <div style={{ color: isOn ? "#60a5fa" : "#334155", fontSize: 20 }}>{isOn ? "✓" : "○"}</div>
              </div>
            );
          })}
        </div>

        <button onClick={handlePickStarters} disabled={selected.size < 5}
          style={{ width: "100%", padding: "16px", borderRadius: 16, border: "none", cursor: selected.size >= 5 ? "pointer" : "not-allowed",
            background: selected.size >= 5 ? "linear-gradient(135deg,#1d4ed8,#7c3aed)" : "#334155",
            color: "#fff", fontSize: 17, fontWeight: 700 }}>
          Next: Pick Starting 5 →
        </button>
        {selected.size < 5 && <div style={{ color: "#f87171", textAlign: "center", marginTop: 8, fontSize: 13 }}>Select at least 5 players</div>}
      </div>
    </div>
  );

  // ── START 5 SCREEN ──────────────────────────────────────────────────────────
  if (screen === "start5") return (
    <div style={{ minHeight: "100vh", backgroundColor: "#0f172a", padding: "16px", fontFamily: "system-ui, sans-serif" }}>
      <div style={{ maxWidth: 400, margin: "0 auto" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16 }}>
          <button onClick={() => setScreen("setup")}
            style={{ background: "#334155", border: "none", color: "#fff", borderRadius: 10, padding: "8px 14px", cursor: "pointer", fontSize: 14 }}>← Back</button>
          <div style={{ color: "#fff", fontSize: 18, fontWeight: 700 }}>Pick Starting 5</div>
        </div>

        <div style={{ background: "#1e293b", borderRadius: 16, padding: 16, marginBottom: 12 }}>
          <div style={{ color: "#fbbf24", fontSize: 12, fontWeight: 700, letterSpacing: 1, marginBottom: 4 }}>
            ⭐ STARTING & CLOSING 5
          </div>
          <div style={{ color: "#94a3b8", fontSize: 12, marginBottom: 12 }}>
            These players start the game and finish it. Pick exactly 5.
          </div>
          {available.map(p => {
            const isStarter = starters.has(p.jersey);
            const disabled = !isStarter && starters.size >= 5;
            return (
              <div key={p.jersey} onClick={() => !disabled && toggleStarter(p.jersey)}
                style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 12px", borderRadius: 12, marginBottom: 6,
                  cursor: disabled ? "not-allowed" : "pointer",
                  background: isStarter ? "#422006" : "#0f172a",
                  border: `2px solid ${isStarter ? "#f59e0b" : "#1e293b"}`,
                  opacity: disabled ? 0.35 : 1 }}>
                <div style={{ width: 36, height: 36, borderRadius: "50%", background: p.color, display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 13, fontWeight: 700, flexShrink: 0 }}>
                  #{p.jersey}
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ color: "#fff", fontSize: 15, fontWeight: 600 }}>{p.name}</div>
                  <div style={{ color: "#64748b", fontSize: 11 }}>
                    {p.pos.join(" / ")} · {p.skills.slice(0, 2).join(", ")}
                  </div>
                </div>
                <div style={{ fontSize: 20 }}>{isStarter ? "⭐" : "○"}</div>
              </div>
            );
          })}
        </div>

        {(() => {
          const starterObjs = available.filter(p => starters.has(p.jersey));
          const skillsOk = starters.size === 5 && meetsSkillRequirements(starterObjs);
          const missingSkills = starters.size === 5 && !skillsOk
            ? SKILL_MINIMUMS.filter(({ skill, min }) =>
                starterObjs.filter(p => p.skills.includes(skill)).length < min
              ).map(({ skill }) => skill)
            : [];
          const w3 = weakestThreeJerseys(available);
          const devBalanceWarn = starters.size === 5 && w3.length >= 3 && violatesWeakestThree(starterObjs, w3);
          const canGenerate = starters.size === 5 && skillsOk;
          return (
            <>
              {missingSkills.length > 0 && (
                <div style={{ background: "#7f1d1d", borderRadius: 10, padding: "8px 12px", marginBottom: 8, color: "#fca5a5", fontSize: 12, fontWeight: 600 }}>
                  ⚠️ Starting 5 needs: {missingSkills.join(", ")}
                </div>
              )}
              {devBalanceWarn && (
                <div style={{ background: "#78350f", borderRadius: 10, padding: "8px 12px", marginBottom: 8, color: "#fcd34d", fontSize: 12, fontWeight: 600 }}>
                  ⚠️ All 3 developing players in the starting 5 — engine can't fix this during the 4-min start lock
                </div>
              )}
              <button onClick={handleGeneratePlan} disabled={!canGenerate}
                style={{ width: "100%", padding: "16px", borderRadius: 16, border: "none",
                  cursor: canGenerate ? "pointer" : "not-allowed",
                  background: canGenerate ? "linear-gradient(135deg,#1d4ed8,#7c3aed)" : "#334155",
                  color: "#fff", fontSize: 17, fontWeight: 700 }}>
                {starters.size !== 5
                  ? `Select ${5 - starters.size} more player${5 - starters.size !== 1 ? "s" : ""}`
                  : canGenerate ? "Generate Rotation Plan →" : "Fix skill gaps above ↑"}
              </button>
