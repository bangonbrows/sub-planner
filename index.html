          // Total court-minutes (sum of all row counts)
          const totalCourtMins = rowCounts.reduce((s, c) => s + c, 0);

          // Spread
          const maxMins = Math.max(...playerTotals);
          const minMins = Math.min(...playerTotals);
          const spread = maxMins - minMins;
          const idealTarget = (5 * totalMins) / players.length;

          // Cell handlers (pointer events for mouse + touch)
          const cellDown = (e, m, pIdx) => {
            e.preventDefault();
            gridPainting.current = true;
            gridPainting.lastCell = `${m},${pIdx}`;
            if (gridPaintMode) {
              gridPaintValue.current = !grid[m][pIdx];
              setEditableGrid(prev => {
                const next = prev.map(r => [...r]);
                next[m][pIdx] = gridPaintValue.current;
                return next;
              });
            } else {
              setEditableGrid(prev => {
                const next = prev.map(r => [...r]);
                next[m][pIdx] = !next[m][pIdx];
                return next;
              });
            }
          };

          const cellEnter = (e, m, pIdx) => {
            if (!gridPainting.current || !gridPaintMode) return;
            const key = `${m},${pIdx}`;
            if (gridPainting.lastCell === key) return;
            gridPainting.lastCell = key;
            setEditableGrid(prev => {
              const next = prev.map(r => [...r]);
              next[m][pIdx] = gridPaintValue.current;
              return next;
            });
          };

          // Touch-move handler: find cell under finger and paint it
          // Stored in ref so useEffect can attach as non-passive listener
          gridTouchMoveRef.current = (e) => {
            if (!gridPainting.current || !gridPaintMode) return;
            if (e.cancelable) e.preventDefault();
            const touch = e.touches[0];
            const el = document.elementFromPoint(touch.clientX, touch.clientY);
            if (el && el.dataset.gridM != null && el.dataset.gridP != null) {
              const m = parseInt(el.dataset.gridM);
              const pIdx = parseInt(el.dataset.gridP);
              cellEnter(e, m, pIdx);
            }
          };

          return (
            <>
              <div style={{ overflowX: "auto", display: "flex", justifyContent: "center" }}>
                <table ref={gridTableRef} style={{ borderCollapse: "collapse", userSelect: "none", touchAction: "none" }}>
                  <thead>
                    <tr>
                      <th style={{ padding: "4px 6px", fontSize: "0.75rem", color: "#94a3b8", fontWeight: 600, textAlign: "center", minWidth: 40, position: "sticky", top: 0, background: "#0f172a" }}></th>
                      {players.map((p, pIdx) => {
                        const isSelected = swapSelectedIdx === pIdx;
                        return (
                          <th key={p.jersey}
                            onClick={() => {
                              if (swapSelectedIdx === null) {
                                // First tap — select this column
                                setSwapSelectedIdx(pIdx);
                              } else if (swapSelectedIdx === pIdx) {
                                // Tapped same — deselect
                                setSwapSelectedIdx(null);
                              } else {
                                // Second tap — swap columns
                                const fromIdx = swapSelectedIdx;
                                const toIdx = pIdx;
                                // Swap ONLY the player order — keep the painted
                                // cells in place so the new player inherits the
                                // old player's rotation slot. (e.g. swap Aanya
                                // [starter] with Armel [bench]: Armel now holds
                                // the starter slot, Aanya takes Armel's bench
                                // rotation. NOT a cosmetic relabel.)
                                setGridPlayerOrder(prev => {
                                  const next = [...prev];
                                  const tmp = next[fromIdx];
                                  next[fromIdx] = next[toIdx];
                                  next[toIdx] = tmp;
                                  return next;
                                });
                                setSwapSelectedIdx(null);
                              }
                            }}
                            style={{
                              padding: "6px 4px", fontSize: "0.72rem", lineHeight: 1.2, textAlign: "center",
                              minWidth: 52, position: "sticky", top: 0, cursor: "pointer",
                              background: isSelected ? "#1e3a8a" : "#0f172a",
                              border: isSelected ? "2px solid #3b82f6" : "2px solid transparent",
                              borderRadius: isSelected ? 6 : 0,
                              transition: "background 0.15s, border 0.15s",
                            }}>
                            <span style={{ color: "#fbbf24", fontSize: "0.85rem", display: "block" }}>#{p.jersey}</span>
                            <span style={{ color: isSelected ? "#93c5fd" : "#94a3b8", fontSize: "0.65rem", display: "block" }}>{p.name}</span>
                            {isSelected && <span style={{ color: "#60a5fa", fontSize: "0.55rem", display: "block" }}>swap ↔</span>}
                          </th>
                        );
                      })}
                      <th style={{ padding: "4px 6px", fontSize: "0.75rem", color: "#94a3b8", fontWeight: 600, textAlign: "center", minWidth: 28, position: "sticky", top: 0, background: "#0f172a" }}></th>
                    </tr>
                  </thead>
                  <tbody>
                    {Array.from({ length: totalMins }, (_, m) => {
                      // Halftime row
                      const htRow = m === halfMins ? (
                        <tr key="ht" style={{ height: 6 }}>
                          <td style={{ background: "transparent", color: "#fbbf24", fontSize: "0.6rem", fontWeight: 700, textAlign: "right", paddingRight: 4, cursor: "default", border: "none" }}>HT</td>
                          {players.map(p => <td key={p.jersey} style={{ background: "#fbbf24", border: "none", cursor: "default" }}></td>)}
                          <td style={{ background: "#fbbf24", border: "none", cursor: "default" }}></td>
                        </tr>
                      ) : null;

                      const displayMin = m < halfMins ? m + 1 : m - halfMins + 1;
                      const halfLabel = m < halfMins ? "H1" : "H2";
                      const rowCount = rowCounts[m];
                      const hasTimeout = plannedTimeouts.has(m);

                      return [
                        htRow,
                        <tr key={m}>
                          <td onClick={() => {
                              setPlannedTimeouts(prev => {
                                const next = new Set(prev);
                                if (next.has(m)) next.delete(m); else next.add(m);
                                return next;
                              });
                            }}
                            style={{ cursor: "pointer", fontSize: "0.7rem", color: hasTimeout ? "#f59e0b" : "#64748b", border: "none", textAlign: "right", paddingRight: 8, width: 40, minWidth: 40,
                              background: hasTimeout ? "#78350f" : "transparent", borderRadius: hasTimeout ? 3 : 0, fontWeight: hasTimeout ? 700 : 400 }}>
                            {hasTimeout ? "⏱ " : ""}{halfLabel} {displayMin}
                          </td>
                          {players.map((p, pIdx) => {
                            const filled = grid[m] && grid[m][pIdx];
                            return (
                              <td key={p.jersey}
                                data-grid-m={m} data-grid-p={pIdx}
                                onPointerDown={e => cellDown(e, m, pIdx)}
                                onPointerEnter={e => cellEnter(e, m, pIdx)}
                                style={{
                                  width: 52, height: 22, border: "1px solid #1e293b", textAlign: "center",
                                  cursor: "pointer", transition: "background 0.05s",
                                  background: filled ? "#16a34a" : "transparent",
                                  touchAction: "none",
                                }}></td>
                            );
                          })}
                          <td style={{ fontSize: "0.6rem", width: 28, textAlign: "center", border: "none", cursor: "default", padding: "0 2px",
                            color: rowCount === 5 ? "#4ade80" : "#f87171", fontWeight: 700 }}>
                            {rowCount}/5
                          </td>
                        </tr>,
                      ];
                    }).flat().filter(Boolean)}

                    {/* TOTALS row */}
                    <tr>
                      <td style={{ cursor: "default", fontSize: "0.75rem", fontWeight: 700, color: "#e2e8f0", border: "none", textAlign: "right", paddingRight: 8 }}>
                        TOTAL
                      </td>
                      {players.map((p, pIdx) => {
                        const total = playerTotals[pIdx];
                        const tgt = target[p.jersey] || idealTarget;
                        let color = "#4ade80";
                        if (total > tgt + 2) color = "#f87171";
                        else if (total < tgt - 2) color = "#fbbf24";
                        return (
                          <td key={p.jersey} style={{ cursor: "default", fontSize: "0.75rem", fontWeight: 700, border: "1px solid #334155", background: "#1e293b", textAlign: "center", color }}>
                            {total}
                          </td>
                        );
                      })}
                      <td style={{ cursor: "default", fontSize: "0.65rem", fontWeight: 700, border: "1px solid #334155", background: "#1e293b", textAlign: "center",
                        color: totalCourtMins === 5 * totalMins ? "#4ade80" : "#fbbf24" }}>
                        {totalCourtMins}
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>

              {/* Summary stats */}
              <div style={{ display: "flex", justifyContent: "center", gap: 16, marginTop: 14, flexWrap: "wrap", fontSize: "0.8rem" }}>
                <div style={{ color: "#94a3b8" }}>Spread: <span style={{ color: "#f8fafc", fontWeight: 600 }}>{spread} min</span></div>
                <div style={{ color: "#94a3b8" }}>Most: <span style={{ color: "#f8fafc", fontWeight: 600 }}>{maxMins} min</span></div>
                <div style={{ color: "#94a3b8" }}>Least: <span style={{ color: "#f8fafc", fontWeight: 600 }}>{minMins} min</span></div>
                <div style={{ color: "#94a3b8" }}>Target: <span style={{ color: "#f8fafc", fontWeight: 600 }}>{idealTarget.toFixed(1)} min</span></div>
              </div>
              <div style={{ textAlign: "center", marginTop: 8, fontSize: "0.75rem", color: "#64748b" }}>
                5 players × {totalMins} min ÷ {players.length} players = {idealTarget.toFixed(1)} min each
              </div>
              {/* Legend */}
              <div style={{ display: "flex", justifyContent: "center", gap: 16, marginTop: 10, fontSize: "0.7rem", color: "#64748b" }}>
                <span><span style={{ display: "inline-block", width: 12, height: 12, borderRadius: 2, marginRight: 4, verticalAlign: "middle", background: "#4ade80" }}></span> On target</span>
                <span><span style={{ display: "inline-block", width: 12, height: 12, borderRadius: 2, marginRight: 4, verticalAlign: "middle", background: "#fbbf24" }}></span> Under target</span>
                <span><span style={{ display: "inline-block", width: 12, height: 12, borderRadius: 2, marginRight: 4, verticalAlign: "middle", background: "#f87171" }}></span> Over target</span>
              </div>
            </>
          );
        })()}

        {/* Action buttons */}
        <div style={{ marginTop: 16 }}>
          {gameIsLive ? (
            <>
              <button onClick={() => { setSwapSelectedIdx(null); if (gridHasInvalidRows()) return; syncGridToPlan(); setScreen("game"); }}
                style={{ width: "100%", padding: "16px", borderRadius: 16, border: "none", cursor: "pointer",
                  background: "linear-gradient(135deg,#1d4ed8,#3b82f6)", color: "#fff", fontSize: 17, fontWeight: 700,
                  display: "flex", alignItems: "center", justifyContent: "center", gap: 10, marginBottom: 8 }}>
                ← Back to Game
              </button>
              <button onClick={() => { if (window.confirm("This will end the current game and lose all data. Are you sure?")) { discardSavedGame(); } }}
                style={{ width: "100%", padding: "12px", borderRadius: 12, border: "1px solid #991b1b", cursor: "pointer",
                  background: "transparent", color: "#f87171", fontSize: 14, fontWeight: 600 }}>
                End Game & New Setup
              </button>
            </>
          ) : (
            <button onClick={handleStartGame}
              style={{ width: "100%", padding: "16px", borderRadius: 16, border: "none", cursor: "pointer",
                background: "linear-gradient(135deg,#059669,#10b981)", color: "#fff", fontSize: 17, fontWeight: 700,
                display: "flex", alignItems: "center", justifyContent: "center", gap: 10 }}>
              <CoachKLogo size={24} /> Start Game
            </button>
          )}
        </div>
      </div>
    </div>
  );

  // ── GAME SCREEN ─────────────────────────────────────────────────────────────
  const halfSecs = halfMins * 60;
  const halfRemaining = halfSecs - timeInHalf;

  return (
    <div style={{ minHeight: "100vh", backgroundColor: "#0f172a", padding: "12px", fontFamily: "system-ui, sans-serif" }}
      onClick={() => { if (activeMenu) setActiveMenu(null); if (benchMenu) setBenchMenu(null); }}>
      <div style={{ maxWidth: 400, margin: "0 auto" }}>

        {/* HALFTIME OVERLAY */}
        {showHalftime && (
          <div style={{ position: "fixed", inset: 0, background: "#000000cc", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100 }}>
            <div style={{ background: "#1e293b", borderRadius: 24, padding: 32, textAlign: "center", maxWidth: 320, margin: "0 auto" }}>
              <div style={{ display: "flex", justifyContent: "center", marginBottom: 8 }}>
                <CoachKLogo size={64} />
              </div>
              <div style={{ color: "#fbbf24", fontSize: 22, fontWeight: 800, marginBottom: 8 }}>HALFTIME</div>
              <div style={{ color: "#94a3b8", fontSize: 14, marginBottom: 24 }}>
                {rotationPlan ? "H2 lineup from rotation plan" : "Players who sat most in H1 start the 2nd half"}
              </div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 8, justifyContent: "center", marginBottom: 24 }}>
                {(() => {
                  // If plan exists, use the first H2 segment lineup
                  if (rotationPlan && rotationPlan.segments) {
                    const h2Start = rotationPlan.segments.find(s => s.half === 2);
                    if (h2Start && h2Start.onCourt) {
                      // Filter unavailable players and backfill, matching handleStartSecondHalf
                      const unavail = j => fouledOut.has(j) || injured.has(j);
                      let previewJerseys = h2Start.onCourt.filter(j => !unavail(j));
                      if (previewJerseys.length < 5) {
                        const activeBench = available.filter(p =>
                          !previewJerseys.includes(p.jersey) && !unavail(p.jersey));
                        for (const p of activeBench) {
                          if (previewJerseys.length >= 5) break;
                          previewJerseys.push(p.jersey);
                        }
                      }
                      return previewJerseys.map(j => {
                        const p = available.find(pl => pl.jersey === j) || PLAYERS_DB.find(pl => pl.jersey === j);
                        if (!p) return null;
                        return (
                          <div key={j} style={{ background: p.color + "44", border: `1px solid ${p.color}`, borderRadius: 8, padding: "4px 10px", color: "#fff", fontSize: 13, fontWeight: 600 }}>
                            #{p.jersey} {p.name}
                          </div>
                        );
                      }).filter(Boolean);
                    }
                  }
                  const { courtObjs: court } = computeSecondHalfLineup();
                  return court.map(p => (
                    <div key={p.jersey} style={{ background: p.color + "44", border: `1px solid ${p.color}`, borderRadius: 8, padding: "4px 10px", color: "#fff", fontSize: 13, fontWeight: 600 }}>
                      #{p.jersey} {p.name}
                    </div>
                  ));
                })()}
              </div>
              <button onClick={handleStartSecondHalf}
                style={{ background: "linear-gradient(135deg,#1d4ed8,#7c3aed)", border: "none", color: "#fff", borderRadius: 14, padding: "14px 32px", fontSize: 16, fontWeight: 700, cursor: "pointer", width: "100%" }}>
                Start 2nd Half ▶
              </button>
            </div>
          </div>
        )}

        {/* EMERGENCY REPLACEMENT OVERLAY */}
        {replacingJersey && (
          <div style={{ position: "fixed", inset: 0, background: "#000000cc", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100 }}>
            <div style={{ background: "#1e293b", borderRadius: 24, padding: 24, maxWidth: 320, width: "90%", margin: "0 auto" }}>
              <div style={{ color: "#f87171", fontSize: 16, fontWeight: 700, marginBottom: 4 }}>⚠️ Player Off Court</div>
              <div style={{ color: "#94a3b8", fontSize: 13, marginBottom: 12 }}>
                #{replacingJersey} {pObj(replacingJersey)?.name} is out. Pick a replacement:
              </div>
              {/* Undo escape hatch — the overlay otherwise sits above the main
                  Undo button and traps the coach into picking a replacement. */}
              {undoStack.length > 0 && (
                <button onClick={performUndo}
                  style={{ width: "100%", marginBottom: 12, background: "#334155", border: "1px solid #475569", color: "#fbbf24", borderRadius: 10, padding: "10px", cursor: "pointer", fontSize: 13, fontWeight: 700 }}>
                  ↩ Undo: {undoStack[undoStack.length - 1].label}
                </button>
              )}
              {benchPlayers.length === 0 ? (
                <div style={{ color: "#64748b", fontSize: 13, marginBottom: 16 }}>No available bench players</div>
              ) : benchPlayers.map(p => (
                <div key={p.jersey} onClick={() => doEmergencyIn(p.jersey)}
                  style={{ display: "flex", alignItems: "center", gap: 10, padding: "12px", borderRadius: 12, marginBottom: 6, cursor: "pointer", background: "#0f172a", border: "1px solid #334155" }}>
                  <div style={{ width: 34, height: 34, borderRadius: "50%", background: p.color, display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 12, fontWeight: 700 }}>#{p.jersey}</div>
                  <div style={{ color: "#fff", fontSize: 15, fontWeight: 600 }}>{p.name}</div>
                </div>
              ))}
              {benchPlayers.length === 0 ? (
                <button onClick={() => { setShortHandedDismissedAt(gameSecs); setPendingSub(null); setDelayedSegId(null); setPlanDelayUntilSecs(null); setReplacingJersey(null); }}
                  style={{ width: "100%", marginTop: 8, background: "#334155", border: "none", color: "#94a3b8", borderRadius: 10, padding: "10px", cursor: "pointer", fontSize: 14 }}>
                  Play with {onCourt.length} — no bench available
                </button>
              ) : (
                <button onClick={() => { if (window.confirm(`${benchPlayers.length} bench player${benchPlayers.length > 1 ? "s" : ""} available. Play short-handed anyway?`)) { setShortHandedDismissedAt(gameSecs); setReplacingJersey(null); } }}
                  style={{ width: "100%", marginTop: 8, background: "transparent", border: "1px solid #991b1b", color: "#f87171", borderRadius: 10, padding: "10px", cursor: "pointer", fontSize: 13 }}>
                  Play with {onCourt.length} despite available bench
                </button>
              )}
            </div>
          </div>
        )}

        {/* HEADER */}
        <div style={{ background: "linear-gradient(135deg,#1e3a8a,#1d4ed8)", borderRadius: 16, padding: "12px 16px", marginBottom: 10, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <div>
            <div style={{ color: "#93c5fd", fontSize: 11, fontWeight: 700, letterSpacing: 1 }}>HALF {half} {gameOver ? "— FULL TIME" : ""}</div>
            <div style={{ color: "#fff", fontSize: 30, fontWeight: 800, lineHeight: 1 }}>{fmt(timeInHalf)}</div>
            <div style={{ color: "#60a5fa", fontSize: 12 }}>{gameOver ? "Game over" : `${fmt(halfRemaining)} left in H${half}`}</div>
          </div>
          <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
            {!showHalftime && (
              <>
                <button onClick={() => adjustClock(-10)}
                  title="Rewind 10s"
                  style={{ padding: "8px 10px", borderRadius: 10, border: "1px solid #1e40af", cursor: "pointer", background: "#1e3a8a", color: "#dbeafe", fontSize: 12, fontWeight: 700 }}>−10s</button>
                {!gameOver && (
                  <button onClick={() => setRunning(r => !r)}
                    style={{ padding: "10px 18px", borderRadius: 12, border: "none", cursor: "pointer", fontWeight: 700, fontSize: 15,
                      background: running ? "#ef4444" : "#16a34a", color: "#fff" }}>
                    {running ? "⏸" : "▶"}
                  </button>
                )}
                {!gameOver && (
                  <button onClick={() => adjustClock(+10)}
                    title="Forward 10s"
                    style={{ padding: "8px 10px", borderRadius: 10, border: "1px solid #1e40af", cursor: "pointer", background: "#1e3a8a", color: "#dbeafe", fontSize: 12, fontWeight: 700 }}>+10s</button>
                )}
              </>
            )}
            <button onClick={() => {
              setRunning(false);
              // Rebuild grid from current (possibly rerouted) plan so stale grids don't overwrite reroutes
              if (rotationPlan && rotationPlan.segments) {
                const activePlayers = available.filter(p => !unavailableJerseys.has(p.jersey));
                const gridPlayers = activePlayers.length > 0 ? activePlayers : available;
                const { grid, order } = buildEditableGridFromPlan(rotationPlan, gridPlayers);
                setEditableGrid(grid);
                setGridPlayerOrder(order);
              }
              setScreen("plan");
            }}
              style={{ padding: "10px 14px", borderRadius: 12, border: "none", cursor: "pointer", background: "#334155", color: "#fff", fontSize: 14 }}>Plan</button>
          </div>
        </div>

        {/* SAVE ERROR BANNER — sticky, only shown when localStorage writes fail */}
        {saveError && (
          <div style={{
            background: "#7f1d1d", border: "2px solid #ef4444", borderRadius: 12,
            padding: "10px 14px", marginBottom: 10,
            display: "flex", alignItems: "center", gap: 10,
          }}>
            <span style={{ fontSize: 18 }}>⚠</span>
            <div>
              <div style={{ color: "#fecaca", fontSize: 12, fontWeight: 700 }}>NOT SAVING TO THIS DEVICE</div>
              <div style={{ color: "#fca5a5", fontSize: 11 }}>Storage failed — do NOT refresh or close the tab. Game state will be lost.</div>
            </div>
          </div>
        )}

        {/* REROUTE BANNER — auto-dismisses, no OK button */}
        {rerouteBanner && (
          <div style={{
            background: "linear-gradient(135deg, #7c2d12, #9a3412)",
            borderRadius: 12, padding: "10px 14px", marginBottom: 10,
            display: "flex", alignItems: "center", gap: 10,
            animation: "fadeIn 0.3s ease-in",
          }}>
            <span style={{ fontSize: 18 }}>🔄</span>
            <div>
              <div style={{ color: "#fed7aa", fontSize: 12, fontWeight: 700 }}>PLAN REROUTED</div>
              <div style={{ color: "#fdba74", fontSize: 11 }}>{rerouteBanner} — remaining time redistributed</div>
            </div>
          </div>
        )}

        {/* SCORE & TIMEOUT PANEL */}
        {!gameOver && showScorePanel && (
          <div style={{ background: "#1e293b", borderRadius: 12, padding: "8px 12px", marginBottom: 10 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
              {/* Us score */}
              <div style={{ flex: 1, textAlign: "center" }}>
                <div style={{ color: "#4ade80", fontSize: 10, fontWeight: 700, letterSpacing: 1 }}>ROADIES</div>
                <div style={{ color: "#fff", fontSize: 28, fontWeight: 800, lineHeight: 1.1 }}>{scoreUs}</div>
                <div style={{ display: "flex", gap: 4, justifyContent: "center", marginTop: 4 }}>
                  <button onClick={() => addScore("us", 1)} style={{ padding: "4px 8px", borderRadius: 6, border: "none", background: "#166534", color: "#4ade80", fontSize: 11, fontWeight: 700, cursor: "pointer" }}>+1</button>
                  <button onClick={() => addScore("us", 2)} style={{ padding: "4px 8px", borderRadius: 6, border: "none", background: "#166534", color: "#4ade80", fontSize: 11, fontWeight: 700, cursor: "pointer" }}>+2</button>
                  <button onClick={() => addScore("us", 3)} style={{ padding: "4px 8px", borderRadius: 6, border: "none", background: "#166534", color: "#4ade80", fontSize: 11, fontWeight: 700, cursor: "pointer" }}>+3</button>
                  <button onClick={() => undoScore("us")} style={{ padding: "4px 6px", borderRadius: 6, border: "1px solid #334155", background: "transparent", color: "#64748b", fontSize: 11, cursor: "pointer" }}>−1</button>
                </div>
              </div>
              {/* Divider + timeouts */}
              <div style={{ display: "flex", flexDirection: "column", alignItems: "center", padding: "0 8px" }}>
                <div style={{ color: "#475569", fontSize: 20, fontWeight: 300, marginBottom: 4 }}>—</div>
                <div style={{ display: "flex", gap: 4 }}>
                  <button onClick={() => useTimeout("us")} title="Our timeout"
                    style={{ padding: "3px 6px", borderRadius: 5, border: "1px solid #475569", background: "#334155", color: "#94a3b8", fontSize: 9, fontWeight: 700, cursor: "pointer" }}>
                    TO:{timeoutsUs}
                  </button>
                  <button onClick={() => useTimeout("opp")} title="Their timeout"
                    style={{ padding: "3px 6px", borderRadius: 5, border: "1px solid #475569", background: "#334155", color: "#94a3b8", fontSize: 9, fontWeight: 700, cursor: "pointer" }}>
                    TO:{timeoutsOpponent}
                  </button>
                </div>
              </div>
              {/* Opponent score */}
              <div style={{ flex: 1, textAlign: "center" }}>
                <div style={{ color: "#f87171", fontSize: 10, fontWeight: 700, letterSpacing: 1 }}>OPPONENT</div>
                <div style={{ color: "#fff", fontSize: 28, fontWeight: 800, lineHeight: 1.1 }}>{scoreOpponent}</div>
                <div style={{ display: "flex", gap: 4, justifyContent: "center", marginTop: 4 }}>
                  <button onClick={() => addScore("opp", 1)} style={{ padding: "4px 8px", borderRadius: 6, border: "none", background: "#7f1d1d", color: "#fca5a5", fontSize: 11, fontWeight: 700, cursor: "pointer" }}>+1</button>
                  <button onClick={() => addScore("opp", 2)} style={{ padding: "4px 8px", borderRadius: 6, border: "none", background: "#7f1d1d", color: "#fca5a5", fontSize: 11, fontWeight: 700, cursor: "pointer" }}>+2</button>
                  <button onClick={() => addScore("opp", 3)} style={{ padding: "4px 8px", borderRadius: 6, border: "none", background: "#7f1d1d", color: "#fca5a5", fontSize: 11, fontWeight: 700, cursor: "pointer" }}>+3</button>
                  <button onClick={() => undoScore("opp")} style={{ padding: "4px 6px", borderRadius: 6, border: "1px solid #334155", background: "transparent", color: "#64748b", fontSize: 11, cursor: "pointer" }}>−1</button>
                </div>
              </div>
            </div>
            <div style={{ borderTop: "1px solid #334155", paddingTop: 4, display: "flex", justifyContent: "center" }}>
              <button onClick={() => setShowScorePanel(false)}
                style={{ padding: "2px 10px", borderRadius: 6, border: "none", background: "transparent", color: "#475569", fontSize: 10, cursor: "pointer" }}>
                Hide score panel
              </button>
            </div>
          </div>
        )}
        {/* Show score button when panel is hidden */}
        {!gameOver && !showScorePanel && (
          <div style={{ textAlign: "center", marginBottom: 6 }}>
            <button onClick={() => setShowScorePanel(true)}
              style={{ padding: "4px 12px", borderRadius: 8, border: "1px solid #334155", background: "#1e293b", color: "#64748b", fontSize: 11, cursor: "pointer" }}>
              Show score panel
            </button>
          </div>
        )}

        {/* POSSESSION ARROW */}
        {!gameOver && showPossessionArrow && (
          <div style={{ textAlign: "center", marginBottom: 10 }}>
            <button onClick={() => setPossessionLeft(p => !p)}
              style={{
                width: "100%", padding: "10px", borderRadius: 12, border: "2px solid #475569",
                background: "#1e293b", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 12,
              }}>
              <span style={{ color: possessionLeft ? "#fbbf24" : "#475569", fontSize: 28, fontWeight: 900, transition: "color 0.2s" }}>⬅</span>
              <span style={{ color: "#94a3b8", fontSize: 11, fontWeight: 700, letterSpacing: 1 }}>POSS</span>
              <span style={{ color: !possessionLeft ? "#fbbf24" : "#475569", fontSize: 28, fontWeight: 900, transition: "color 0.2s" }}>➡</span>
            </button>
          </div>
        )}

        {/* UNDO BUTTON — always visible when undo available */}
        {!gameOver && undoStack.length > 0 && (
          <div style={{ textAlign: "center", marginBottom: 10 }}>
            <button onClick={performUndo}
              style={{ padding: "5px 14px", borderRadius: 8, border: "1px solid #475569", background: "#334155", color: "#cbd5e1", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>
              ↩ Undo: {undoStack[undoStack.length - 1].label}
            </button>
          </div>
        )}

        {/* SUB SUGGESTION — window-based with urgency levels */}
        {pendingSub && !gameOver && (() => {
          // Compute urgency from window timing
          const wt = pendingSub.windowTarget;
          const wsl = pendingSub.windowSoftLate;
          const urgency = pendingSub.mandatory ? "mandatory"
            : wt == null ? "mandatory"
            : gameSecs >= wsl ? "overdue"
            : gameSecs >= wt ? "due"
            : "open";
          const bgColor = urgency === "mandatory" || urgency === "overdue" ? "#7f1d1d"
            : urgency === "due" ? "#164e63"
            : "#1e3a5f";
          const labelColor = urgency === "mandatory" || urgency === "overdue" ? "#fca5a5"
            : urgency === "due" ? "#67e8f9"
            : "#93c5fd";
          const label = urgency === "mandatory"
            ? (pendingSub.subs.length > 1 ? `🔴 ${pendingSub.subs.length} SUBS — required` : "🔴 SUB — required")
            : urgency === "overdue"
            ? "🔴 SUB OVERDUE — make change now"
            : urgency === "due"
            ? "🟡 SUB WINDOW — change at next dead ball"
            : "🔵 WINDOW OPEN — sub when ready";
          const btnBg = urgency === "mandatory" || urgency === "overdue" ? "#dc2626"
            : urgency === "due" ? "#0284c7"
            : "#1d4ed8";
          return (
            <div style={{ background: bgColor, borderRadius: 12, padding: "10px 14px", marginBottom: 10,
              border: urgency === "overdue" ? "2px solid #ef4444" : "none" }}>
              <div style={{ color: labelColor, fontSize: 12, fontWeight: 700, marginBottom: 4 }}>
                {label}
              </div>
              <div style={{ color: "#fff", fontSize: 13, marginBottom: 6 }}>
                {pendingSub.reason}
              </div>
              {pendingSub.subs.map((s, i) => (
                <div key={i} style={{ color: "#cbd5e1", fontSize: 12, marginBottom: 2 }}>
                  {s.out ? (
                    <>
                      <span style={{ color: "#f87171" }}>OUT #{s.out.jersey} {s.out.name}</span>
                      <span style={{ color: "#64748b" }}> ({s.out.pos[0]})</span>
                      <span style={{ color: "#94a3b8" }}> → </span>
                    </>
                  ) : null}
                  <span style={{ color: "#4ade80" }}>{s.out ? "IN" : "➕ ADD"} #{s.in.jersey} {s.in.name}</span>
                  <span style={{ color: "#64748b" }}> ({s.in.pos[0]})</span>
                </div>
              ))}
              {/* Why this sub? disclosure */}
              {pendingSub.whyDetails && (
                <div style={{ marginTop: 4 }}>
                  <div onClick={() => setShowWhySub(prev => !prev)}
                    style={{ color: "#64748b", fontSize: 11, cursor: "pointer", fontWeight: 600 }}>
                    {showWhySub ? "▼ Hide details" : "▶ Why this sub?"}
                  </div>
                  {showWhySub && (
                    <div style={{ background: "#0f172a", borderRadius: 8, padding: "6px 10px", marginTop: 4 }}>
                      {pendingSub.whyDetails.map((details, i) => (
                        <div key={i} style={{ marginBottom: i < pendingSub.whyDetails.length - 1 ? 4 : 0 }}>
                          {details.map((line, j) => (
                            <div key={j} style={{ color: "#94a3b8", fontSize: 11, lineHeight: 1.4 }}>• {line}</div>
                          ))}
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              )}
              <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
                <button
                  onClick={() => withActionLock(() => {
                    if (pendingSub.addOnly) {
                      // Add-only: bring player(s) onto court without removing anyone
                      const now = gameSecs;
                      let currentCount = onCourt.length;
                      let addedAny = false;
                      const addedJerseys = [];
                      for (const sub of pendingSub.subs) {
                        const inJersey = sub.in.jersey;
                        if (onCourt.includes(inJersey) || currentCount >= 5) continue;
                        if (unavailableJerseys.has(inJersey)) continue;
                        if (!addedAny) pushUndo("Add player");
                        addedAny = true;
                        currentCount++;
                        addedJerseys.push(inJersey);
                        setStintStart(prev => ({ ...prev, [inJersey]: now }));
                        setOffSince(prev => { const n = { ...prev }; delete n[inJersey]; return n; });
                        setOnCourt(prev => [...prev, inJersey]);
                        setSubLog(prev => [...prev, {
                          time: now, half, timeInHalf,
                          subs: [{ out: null, in: pObj(inJersey) }],
                        }]);
                        setRestedThisHalf(prev => { const next = new Set(prev); next.add(inJersey); return next; });
                      }
                      if (addedAny) {
                        setLastSubTime(now);
                        markNearbyWindowHandled();
                        markActiveWindowHandled();
                      }
                      setPendingSub(null);
                    } else {
                      // Process swaps (out+in pairs)
                      const swaps = pendingSub.subs.filter(s => s.out);
                      const adds = pendingSub.subs.filter(s => !s.out);
                      // Safety: reject mixed swap+add confirmations — lineup may have
                      // changed since the suggestion was generated, making the simulated
                      // court unreliable. Force a fresh re-check instead.
                      if (adds.length > 0 && swaps.length > 0) {
                        alert("Lineup changed. Rechecking plan.");
                        setPendingSub(null);
                        return;
                      }
                      pushUndo("Confirm sub");
                      const appliedSubs = swaps.length > 0
                        ? doSubs(swaps.map(s => ({ outJersey: s.out.jersey, inJersey: s.in.jersey })))
                        : [];
                      // Build post-sub court from ACTUALLY applied subs (not all requested)
                      let courtAfterSwaps = [...onCourt];
                      for (const sw of appliedSubs) {
                        courtAfterSwaps = courtAfterSwaps.filter(j => j !== sw.outJersey);
                        if (!courtAfterSwaps.includes(sw.inJersey)) courtAfterSwaps.push(sw.inJersey);
                      }
                      let addedCount = 0;
                      for (const addSub of adds) {
                        const inJersey = addSub.in.jersey;
                        if (courtAfterSwaps.length >= 5) break; // capacity guard
                        if (courtAfterSwaps.includes(inJersey) || unavailableJerseys.has(inJersey)) continue;
                        courtAfterSwaps.push(inJersey);
                        addedCount++;
                        const now = gameSecs;
                        setStintStart(prev => ({ ...prev, [inJersey]: now }));
                        setOffSince(prev => { const n = { ...prev }; delete n[inJersey]; return n; });
                        setOnCourt(prev => [...prev, inJersey]);
                        setSubLog(prev => [...prev, {
                          time: now, half, timeInHalf,
                          subs: [{ out: null, in: pObj(inJersey) }],
                        }]);
                      }
                      if (appliedSubs.length === 0 && addedCount === 0) {
                        // Nothing actually changed — pop the no-op undo entry
                        setUndoStack(prev => prev.slice(0, -1));
                      }
                      if (appliedSubs.length > 0 || addedCount > 0) {
                        setLastSubTime(gameSecs);
                        // Only mark window/segment as handled if post-sub court matches plan
                        const seg = rotationPlan?.segments?.find(s => s.id === pendingSub._planSegId);
                        const courtSet = new Set(courtAfterSwaps);
                        const matchesPlan = seg && seg.onCourt.length === courtSet.size && seg.onCourt.every(j => courtSet.has(j));
                        if (matchesPlan) {
                          confirmPlanSub();
                          if (pendingSub.windowTarget != null && pendingSub.windowRoster != null) {
                            const k = wKey(pendingSub.windowRoster, pendingSub.windowTarget);
                            setHandledWindows(prev => new Set([...prev, k]));
                          }
                          if (pendingSub.windowTarget == null && !pendingSub.reason?.startsWith("Closer")) {
                            markActiveWindowHandled();
                          }
                        }
                        // If lineup doesn't match, don't mark — executor will re-prompt
                      }
                      setPendingSub(null);
                    }
                  })}
                  style={{ flex: 1, padding: "10px", borderRadius: 10, border: "none", cursor: "pointer",
                    background: btnBg, color: "#fff", fontWeight: 700, fontSize: 14 }}>
                  {pendingSub.addOnly
                    ? "✓ Add Player"
                    : pendingSub.subs.length > 1
                      ? `✓ Confirm ${pendingSub.subs.length} Subs`
                      : "✓ Confirm Sub"}
                </button>
                {/* Delay — dismiss now, will re-appear next tick (plan-based) */}
                {!pendingSub.mandatory && pendingSub._planSegId && (
                  <button
                    onClick={() => withActionLock(() => {
                      setDelayedSegId(pendingSub._planSegId);
                      setPlanDelayUntilSecs(gameSecs + 15);
                      setPendingSub(null);
                    })}
                    style={{ padding: "10px 14px", borderRadius: 10, border: "1px solid #475569", cursor: "pointer",
                      background: "#334155", color: "#fbbf24", fontWeight: 600, fontSize: 13 }}>
                    Delay
                  </button>
                )}
                {/* Skip — don't make this sub at all */}
                {!pendingSub.mandatory && pendingSub.windowTarget != null && (
                  <button
                    onClick={() => withActionLock(() => {
                      pushUndo("Skip window");
                      // Log the skipped window in the sub log
                      setSubLog(prev => [...prev, {
                        time: gameSecs,
                        half,
                        timeInHalf,
                        skipped: true,
                        reason: pendingSub.reason,
                        windowTarget: pendingSub.windowTarget,
                        suggestedSubs: pendingSub.subs.map(s => ({
                          outJersey: s.out?.jersey ?? null, outName: s.out?.name ?? null,
                          inJersey: s.in.jersey, inName: s.in.name,
                        })),
                      }]);
                      if (pendingSub._planSegId) {
                        // Mark this segment as handled so plan executor doesn't re-fire
                        setLastExecutedSegId(pendingSub._planSegId);
                      }
                      if (pendingSub.windowRoster != null) {
                        setHandledWindows(prev => new Set([...prev, wKey(pendingSub.windowRoster, pendingSub.windowTarget)]));
                      }
                      setPendingSub(null);
                    })}
                    style={{ padding: "10px 14px", borderRadius: 10, border: "1px solid #475569", cursor: "pointer",
                      background: "#334155", color: "#94a3b8", fontWeight: 600, fontSize: 13 }}>
                    Skip
                  </button>
                )}
              </div>
            </div>
          );
        })()}
        {/* TIMEOUT REMINDER */}
        {!gameOver && screen === "game" && !showHalftime && timeoutRemindersOn && plannedTimeouts.size > 0 && (() => {
          const currentGameMin = Math.floor(gameSecs / 60);
          // Find the active timeout (current minute matches a planned one, not yet dismissed)
          const activeTO = plannedTimeouts.has(currentGameMin) && !dismissedTimeouts.has(currentGameMin);
          // Find next upcoming timeout
          const sortedTOs = [...plannedTimeouts].sort((a, b) => a - b);
          const nextTO = sortedTOs.find(m => m > currentGameMin && !dismissedTimeouts.has(m));
          const nextTOCountdown = nextTO !== undefined ? (nextTO * 60) - gameSecs : null;

          if (!activeTO && nextTO === undefined) return null;

          if (activeTO) {
            const toHalf = currentGameMin < halfMins ? "H1" : "H2";
            const toMin = currentGameMin < halfMins ? currentGameMin + 1 : currentGameMin - halfMins + 1;
            return (
              <div style={{ background: "#78350f", border: "2px solid #f59e0b", borderRadius: 12, padding: "10px 14px", marginBottom: 10,
                display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div>
                  <div style={{ color: "#fbbf24", fontSize: 13, fontWeight: 700 }}>⏱ CALL TIMEOUT</div>
                  <div style={{ color: "#fde68a", fontSize: 11 }}>Planned timeout at {toHalf} {toMin}:00</div>
                </div>
                <button onClick={() => setDismissedTimeouts(prev => new Set([...prev, currentGameMin]))}
                  style={{ padding: "6px 12px", borderRadius: 8, border: "1px solid #92400e", background: "#451a03",
                    color: "#fbbf24", cursor: "pointer", fontSize: 12, fontWeight: 600 }}>
                  Done
                </button>
              </div>
            );
          }

          // Show upcoming timeout in a subtle bar
          if (nextTOCountdown !== null && nextTOCountdown <= 120) {
            return (
              <div style={{ background: "#1c1917", border: "1px solid #78350f", borderRadius: 10, padding: "6px 12px", marginBottom: 10,
                display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <span style={{ color: "#a16207", fontSize: 11, fontWeight: 600 }}>⏱ Timeout in {fmt(nextTOCountdown)}</span>
              </div>
            );
          }
          return null;
        })()}

        {!pendingSub && !gameOver && screen === "game" && plan && !showHalftime && (() => {
          // Plan-based: show last sub and next sub info
          if (rotationPlan && rotationPlan.segments) {
            const segs = rotationPlan.segments;
            const currentSeg = segs.find(s => gameSecs >= s.startSecs && gameSecs < s.endSecs);
            // Find next segment with a lineup change
            const currentIdx = currentSeg ? segs.indexOf(currentSeg) : -1;
            let nextSubSeg = null;
            let nextSubPlayersIn = [];
            let nextSubPlayersOut = [];
            for (let i = currentIdx + 1; i < segs.length; i++) {
              if (!currentSeg) break;
              const prevCourt = new Set(segs[i > 0 ? i - 1 : 0].onCourt);
              const nextCourt = new Set(segs[i].onCourt);
              const comingIn = segs[i].onCourt.filter(j => !prevCourt.has(j));
              const goingOut = segs[i > 0 ? i - 1 : 0].onCourt.filter(j => !nextCourt.has(j));
              if (comingIn.length > 0 || goingOut.length > 0) {
                nextSubSeg = segs[i];
                nextSubPlayersIn = comingIn;
                nextSubPlayersOut = goingOut;
                break;
              }
            }
            // Find last sub that was executed
            const lastSub = subLog.length > 0 ? subLog[subLog.length - 1] : null;

            const nextCountdown = nextSubSeg ? nextSubSeg.startSecs - gameSecs : null;
            return (
              <div style={{ background: "#042f2e", border: "1px solid #14b8a6", borderRadius: 12, padding: "10px 14px", marginBottom: 10 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                  <span style={{ color: "#5eead4", fontSize: 12, fontWeight: 700 }}>✓ Following plan</span>
                  {nextCountdown != null && nextCountdown > 0 && (
                    <span style={{ color: "#2dd4bf", fontSize: 11, fontWeight: 600 }}>
                      next sub in {fmt(nextCountdown)}
                    </span>
                  )}
                </div>
                {nextSubSeg && (nextSubPlayersOut.length > 0 || nextSubPlayersIn.length > 0) && (
                  <div style={{ marginTop: 4 }}>
                    {nextSubPlayersOut.length > 0 && (
                      <div style={{ fontSize: 11, color: "#fca5a5", marginBottom: 2, fontWeight: 600 }}>
                        <span style={{ color: "#f87171" }}>▼ OUT: </span>
                        {nextSubPlayersOut.map(j => {
                          const p = available.find(pl => pl.jersey === j);
                          return p ? `#${p.jersey} ${p.name}` : `#${j}`;
                        }).join(", ")}
                      </div>
                    )}
                    {nextSubPlayersIn.length > 0 && (
                      <div style={{ fontSize: 11, color: "#86efac", fontWeight: 600 }}>
                        <span style={{ color: "#4ade80" }}>▲ IN: </span>
                        {nextSubPlayersIn.map(j => {
                          const p = available.find(pl => pl.jersey === j);
                          return p ? `#${p.jersey} ${p.name}` : `#${j}`;
                        }).join(", ")}
                      </div>
                    )}
                  </div>
                )}
                {lastSub && !lastSub.skipped && lastSub.subs && (
                  <div style={{ fontSize: 10, color: "#64748b", marginTop: 2 }}>
                    Last: {lastSub.subs.map(s => s.out ? `#${s.out.jersey}→#${s.in.jersey}` : `+#${s.in.jersey}`).join(", ")} @ {fmt(lastSub.time)}
                  </div>
                )}
              </div>
            );
          }

          // Fallback: old reactive engine countdown
          const activeRosterSize = available.length - fouledOut.size - injured.size;
          const schedule = activeRosterSize > 5
            ? getWindowSchedule(activeRosterSize, halfMins, START_BLOCK_SECS, CLOSE_BLOCK_SECS)
            : [];
          const nextWindow = schedule.find(w =>
            gameSecs < w.openSecs && !handledWindows.has(wKey(activeRosterSize, w.targetSecs))
          );
          const countdown = nextWindow ? nextWindow.targetSecs - gameSecs : null;
          return (
            <div style={{ background: "#042f2e", border: "1px solid #14b8a6", borderRadius: 12, padding: "8px 14px", marginBottom: 10,
              display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ color: "#5eead4", fontSize: 12, fontWeight: 700 }}>
                ✓ Rotation stable
              </span>
              {countdown != null && countdown > 0 && (
                <span style={{ color: "#2dd4bf", fontSize: 11, fontWeight: 600 }}>
                  next window {fmt(countdown)}
                </span>
              )}
            </div>
          );
        })()}

        {/* ON COURT */}
        <div style={{ background: "#1e293b", borderRadius: 14, padding: 12, marginBottom: 10 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
            <div style={{ color: "#4ade80", fontSize: 11, fontWeight: 700, letterSpacing: 1 }}>ON COURT ({onCourt.length})</div>
            {(() => {
              const w3 = activeWeakest3;
              if (w3.length < 3) return null;
              const courtObjs = onCourt.map(j => PLAYERS_DB.find(p => p.jersey === j)).filter(Boolean);
              const onCount = courtObjs.filter(p => w3.includes(p.jersey)).length;
              const violated = onCount >= 3;
              // If violated, check whether any of the weakest-3 on court is
              // genuinely under pace (which is the exception that permits it)
              const exempt = violated && courtObjs
                .filter(p => w3.includes(p.jersey))
                .some(p => overUnderSecs(p.jersey) <= -2 * 60);
              const ok = !violated;
              const bg = ok ? "#042f2e" : (exempt ? "#1e3a8a" : "#422006");
              const fg = ok ? "#5eead4" : (exempt ? "#93c5fd" : "#fbbf24");
              const bd = ok ? "#14b8a6" : (exempt ? "#3b82f6" : "#f59e0b");
              const label = ok
                ? `✓ ${onCount}/3 DEV ON`
                : exempt
                  ? "↻ 3/3 DEV — CATCH-UP OK"
                  : "⚠ 3 DEVELOPING TOGETHER";
              return (
                <div style={{
                  fontSize: 10, fontWeight: 700, letterSpacing: 0.5,
                  padding: "3px 8px", borderRadius: 6,
                  background: bg, color: fg, border: `1px solid ${bd}`,
                }}>
                  {label}
                </div>
              );
            })()}
          </div>
          {onCourt.map(jersey => {
            const p = pObj(jersey);
            if (!p) return null;
            const ct = Math.max(0, courtTime(jersey));
            const mins = Math.floor(ct / 60);
            const secs = ct % 60;
            const target = fouledOut.has(jersey) ? 0 : targetMinsFor(jersey);
            const pct = target > 0 ? Math.min((courtTime(jersey) / (target * 60)) * 100, 100) : 0;
            const ou = overUnderSecs(jersey); // seconds over (+) or under (-) fair-share pace
            const isMenuOpen = activeMenu === jersey;
            return (
              <div key={jersey} style={{ marginBottom: 8 }} onClick={e => { e.stopPropagation(); setActiveMenu(isMenuOpen ? null : jersey); }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 10px", borderRadius: 10,
                  background: isMenuOpen ? "#0f2a1a" : "#0f172a", border: `1px solid ${isMenuOpen ? "#16a34a" : "#334155"}`, cursor: "pointer" }}>
                  <div style={{ width: 34, height: 34, borderRadius: "50%", background: p.color, display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 12, fontWeight: 700, flexShrink: 0 }}>
                    #{jersey}
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      <span style={{ color: "#fff", fontSize: 14, fontWeight: 600 }}>{p.name}</span>
                      <span style={{ color: p.color, fontSize: 10, fontWeight: 700, background: p.color + "22", padding: "1px 5px", borderRadius: 4 }}>{p.pos[0]}</span>
                      {(fouls[jersey] || 0) > 0 && (
                        <span style={{ color: (fouls[jersey] >= 4) ? "#fca5a5" : "#fcd34d", fontSize: 10, fontWeight: 700, background: (fouls[jersey] >= 4) ? "#7f1d1d" : "#78350f", padding: "1px 5px", borderRadius: 4 }}>
                          {fouls[jersey]}F
                        </span>
                      )}
                    </div>
                    <div style={{ display: "flex", gap: 3, marginTop: 3 }}>
                      {p.skills.map(sk => { const b = SKILL_BADGE[sk]; return b ? (
                        <span key={sk} style={{ fontSize: 9, fontWeight: 700, color: b.color, background: b.color + "22", padding: "1px 4px", borderRadius: 3, lineHeight: 1.2 }}>{b.label}</span>
                      ) : null; })}
                    </div>
                    <div style={{ background: "#1e293b", borderRadius: 4, height: 4, marginTop: 3, overflow: "hidden" }}>
                      <div style={{ height: "100%", width: `${pct}%`, background: pct >= 100 ? "#f87171" : "#4ade80", borderRadius: 4 }} />
                    </div>
                  </div>
                  <div style={{ color: "#94a3b8", fontSize: 12, textAlign: "right" }}>
                    <div>{mins}:{secs.toString().padStart(2,"0")}</div>
                    <div style={{ color: "#64748b", fontSize: 10 }}>
                      /{target}m
                      {Math.abs(ou) >= 30 && (
                        <span style={{ marginLeft: 4, color: ou > 0 ? "#f87171" : "#4ade80", fontWeight: 700 }}>
                          {ou > 0 ? "+" : ""}{(ou / 60).toFixed(1)}m
                        </span>
                      )}
                    </div>
                  </div>
                  <div style={{ color: "#64748b", fontSize: 16 }}>⋮</div>
                </div>
                {isMenuOpen && (
                  <div style={{ background: "#0f172a", border: "1px solid #334155", borderRadius: 10, marginTop: 4, overflow: "hidden" }}
                    onClick={e => e.stopPropagation()}>
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "10px 14px", borderBottom: "1px solid #1e293b" }}>
                      <span style={{ color: "#fcd34d", fontSize: 13, fontWeight: 600 }}>Fouls: {fouls[jersey] || 0} / 5</span>
                      <div style={{ display: "flex", gap: 6 }}>
                        <button onClick={() => removeFoul(jersey)}
                          style={{ padding: "6px 12px", borderRadius: 8, border: "1px solid #334155", background: "#1e293b", color: "#cbd5e1", fontSize: 14, cursor: "pointer", fontWeight: 700 }}>−</button>
                        <button onClick={() => addFoul(jersey)}
                          style={{ padding: "6px 12px", borderRadius: 8, border: "none", background: "#b45309", color: "#fff", fontSize: 14, cursor: "pointer", fontWeight: 700 }}>+ Foul</button>
                      </div>
                    </div>
                    <div onClick={() => manualSubOut(jersey)}
                      style={{ padding: "12px 14px", color: "#60a5fa", fontSize: 14, cursor: "pointer", borderBottom: "1px solid #1e293b" }}>
                      🔁 Sub Out Now (pick replacement)
                    </div>
                    <div onClick={() => markFouledOut(jersey)}
                      style={{ padding: "12px 14px", color: "#fca5a5", fontSize: 14, cursor: "pointer", borderBottom: "1px solid #1e293b" }}>
                      🟥 Foul Out
                    </div>
                    <div onClick={() => markInjured(jersey)}
                      style={{ padding: "12px 14px", color: "#fcd34d", fontSize: 14, cursor: "pointer" }}>
                      ⚕️ Injury — remove temporarily
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>

        {/* BENCH */}
        {benchPlayers.length > 0 && (
          <div style={{ background: "#1e293b", borderRadius: 14, padding: 12, marginBottom: 10 }}
            onClick={() => benchMenu && setBenchMenu(null)}>
            <div style={{ color: "#60a5fa", fontSize: 11, fontWeight: 700, letterSpacing: 1, marginBottom: 8 }}>BENCH ({benchPlayers.length})</div>
            {benchPlayers.map(p => {
              const ct = Math.max(0, courtTime(p.jersey));
              const mins = Math.floor(ct / 60);
              const secs = ct % 60;
              const target = targetMinsFor(p.jersey);
              const pct = target > 0 ? Math.min((courtTime(p.jersey) / (target * 60)) * 100, 100) : 0;
              const ou = overUnderSecs(p.jersey);
              const isMenuOpen = benchMenu === p.jersey;
              return (
                <div key={p.jersey} style={{ marginBottom: 6 }} onClick={e => { e.stopPropagation(); setBenchMenu(isMenuOpen ? null : p.jersey); setActiveMenu(null); }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 10px", borderRadius: 10,
                    background: isMenuOpen ? "#1a1a2e" : "#0f172a",
                    border: `1px solid ${isMenuOpen ? "#3b82f6" : "#1e293b"}`, cursor: "pointer" }}>
                    <div style={{ width: 34, height: 34, borderRadius: "50%", background: p.color, opacity: 0.7, display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 12, fontWeight: 700, flexShrink: 0 }}>
                      #{p.jersey}
                    </div>
                    <div style={{ flex: 1 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                        <span style={{ color: "#94a3b8", fontSize: 14 }}>{p.name}</span>
                        <span style={{ color: "#64748b", fontSize: 10, fontWeight: 700 }}>{p.pos[0]}</span>
                        {(fouls[p.jersey] || 0) > 0 && (
                          <span style={{ color: (fouls[p.jersey] >= 4) ? "#fca5a5" : "#fcd34d", fontSize: 10, fontWeight: 700, background: (fouls[p.jersey] >= 4) ? "#7f1d1d" : "#78350f", padding: "1px 5px", borderRadius: 4 }}>
                            {fouls[p.jersey]}F
                          </span>
                        )}
                      </div>
                      <div style={{ display: "flex", gap: 3, marginTop: 3 }}>
                        {p.skills.map(sk => { const b = SKILL_BADGE[sk]; return b ? (
                          <span key={sk} style={{ fontSize: 9, fontWeight: 700, color: b.color, background: b.color + "22", padding: "1px 4px", borderRadius: 3, lineHeight: 1.2, opacity: 0.7 }}>{b.label}</span>
                        ) : null; })}
                      </div>
                      <div style={{ background: "#1e293b", borderRadius: 4, height: 4, marginTop: 3, overflow: "hidden" }}>
                        <div style={{ height: "100%", width: `${pct}%`, background: "#3b82f6", borderRadius: 4 }} />
                      </div>
                    </div>
                    <div style={{ color: "#64748b", fontSize: 12, textAlign: "right" }}>
                      <div>{mins}:{secs.toString().padStart(2,"0")}</div>
                      <div style={{ fontSize: 10 }}>
                        /{target}m
                        {Math.abs(ou) >= 30 && (
                          <span style={{ marginLeft: 4, color: ou > 0 ? "#f87171" : "#4ade80", fontWeight: 700 }}>
                            {ou > 0 ? "+" : ""}{(ou / 60).toFixed(1)}m
                          </span>
                        )}
                      </div>
                    </div>
                    <div style={{ color: "#64748b", fontSize: 16 }}>⋮</div>
                  </div>
                  {isMenuOpen && (
                    <div style={{ background: "#0f172a", border: "1px solid #334155", borderRadius: 10, marginTop: 4, overflow: "hidden" }}
                      onClick={e => e.stopPropagation()}>
                      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "10px 14px", borderBottom: "1px solid #1e293b" }}>
                        <span style={{ color: "#fcd34d", fontSize: 13, fontWeight: 600 }}>Fouls: {fouls[p.jersey] || 0} / 5</span>
                        <div style={{ display: "flex", gap: 6 }}>
                          <button onClick={() => removeFoul(p.jersey)}
                            style={{ padding: "6px 12px", borderRadius: 8, border: "1px solid #334155", background: "#1e293b", color: "#cbd5e1", fontSize: 14, cursor: "pointer", fontWeight: 700 }}>−</button>
                          <button onClick={() => addFoul(p.jersey)}
                            style={{ padding: "6px 12px", borderRadius: 8, border: "none", background: "#b45309", color: "#fff", fontSize: 14, cursor: "pointer", fontWeight: 700 }}>+ Foul</button>
                        </div>
                      </div>
                      <div onClick={() => markFouledOut(p.jersey)}
                        style={{ padding: "12px 14px", color: "#fca5a5", fontSize: 14, cursor: "pointer", borderBottom: "1px solid #1e293b" }}>
                        🟥 Foul Out
                      </div>
                      <div onClick={() => markInjured(p.jersey)}
                        style={{ padding: "12px 14px", color: "#fcd34d", fontSize: 14, cursor: "pointer" }}>
                        ⚕️ Injury — remove temporarily
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}

        {/* UNAVAILABLE */}
        {(fouledOut.size > 0 || injured.size > 0) && (
          <div style={{ background: "#1e293b", borderRadius: 14, padding: 12, marginBottom: 10 }}>
            <div style={{ color: "#f87171", fontSize: 11, fontWeight: 700, letterSpacing: 1, marginBottom: 8 }}>UNAVAILABLE</div>
            {[...fouledOut].map(jersey => {
              const p = pObj(jersey);
              if (!p) return null;
              return (
                <div key={jersey} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 10px", borderRadius: 10, marginBottom: 6, background: "#2d0b0b" }}>
                  <div style={{ width: 34, height: 34, borderRadius: "50%", background: "#7f1d1d", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 12, fontWeight: 700, flexShrink: 0 }}>
                    #{jersey}
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ color: "#fca5a5", fontSize: 14 }}>{p.name}</div>
                    <div style={{ color: "#ef4444", fontSize: 11 }}>
                      🟥 Fouled out ({fouls[jersey] || 5}F)
                      {fouloutInfo[jersey] && (
                        <span style={{ color: "#fca5a5", marginLeft: 6 }}>
                          · out {fmt(Math.max(0, gameSecs - fouloutInfo[jersey].startSecs))}
                        </span>
                      )}
                    </div>
                  </div>
                  <button onClick={() => undoFoulOut(jersey)}
                    title="Undo foul-out (reverts to 4 fouls)"
                    style={{ background: "#334155", border: "1px solid #475569", color: "#e2e8f0", borderRadius: 8, padding: "6px 10px", cursor: "pointer", fontSize: 12, fontWeight: 700 }}>
                    ↩ Undo
                  </button>
                </div>
              );
            })}
            {[...injured].map(jersey => {
              const p = pObj(jersey);
              if (!p) return null;
              return (
                <div key={jersey} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 10px", borderRadius: 10, marginBottom: 6, background: "#2d2500" }}>
                  <div style={{ width: 34, height: 34, borderRadius: "50%", background: "#78350f", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 12, fontWeight: 700, flexShrink: 0 }}>
                    #{jersey}
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ color: "#fcd34d", fontSize: 14 }}>{p.name}</div>
                    <div style={{ color: "#f59e0b", fontSize: 11 }}>
                      ⚕️ Injured
                      {injuryInfo[jersey] && (
                        <span style={{ color: "#fbbf24", marginLeft: 6 }}>
                          · out {fmt(Math.max(0, gameSecs - injuryInfo[jersey].startSecs))}
                        </span>
                      )}
                    </div>
                  </div>
                  <button onClick={() => clearInjury(jersey)}
                    style={{ background: "#16a34a", border: "none", color: "#fff", borderRadius: 8, padding: "6px 12px", cursor: "pointer", fontSize: 12, fontWeight: 700 }}>
                    Return
                  </button>
                </div>
              );
            })}
          </div>
        )}

        {/* SUB LOG */}
        {subLog.length > 0 && (
          <div style={{ background: "#1e293b", borderRadius: 14, padding: 12, marginBottom: 10 }}>
            <div style={{ color: "#94a3b8", fontSize: 11, fontWeight: 700, letterSpacing: 1, marginBottom: 8 }}>SUB LOG</div>
            {subLog.map((entry, i) => (
              <div key={i} style={{ marginBottom: 8, paddingBottom: 8, borderBottom: i < subLog.length - 1 ? "1px solid #334155" : "none" }}>
                {entry.timeout ? (
                  <>
                    <div style={{ color: "#f59e0b", fontSize: 11, fontWeight: 700, marginBottom: 3 }}>
                      ⏸ TIMEOUT ({entry.team}) · H{entry.half} @ {fmt(entry.timeInHalf)}
                    </div>
                  </>
                ) : (
                  <>
                    <div style={{
                      color: entry.skipped ? "#94a3b8" : entry.emergency ? "#fb923c" : "#fbbf24",
                      fontSize: 11, fontWeight: 700, marginBottom: 3,
                    }}>
                      {entry.skipped ? "⏭ SKIPPED" : entry.emergency ? "⚠️ EMERGENCY" : entry.subs.some(s => !s.out) ? "➕ ADD" : "🔄 SUB"} · H{entry.half} @ {fmt(entry.timeInHalf)}
                    </div>
                    {entry.skipped ? (
                      <div style={{ fontSize: 12, color: "#64748b", fontStyle: "italic" }}>
                        {entry.reason || "no sub needed"}
                      </div>
                    ) : entry.subs.map((s, j) => (
                      <div key={j} style={{ fontSize: 12, color: "#cbd5e1" }}>
                        {s.out ? (
                          <>
                            <span style={{ color: "#f87171" }}>OUT {s.out.name}</span>
                            <span style={{ color: "#64748b" }}> → </span>
                          </>
                        ) : null}
                        <span style={{ color: "#4ade80" }}>{s.out ? "IN" : "➕ ADD"} {s.in?.name ?? "?"}</span>
                      </div>
                    ))}
                  </>
                )}
              </div>
            ))}
          </div>
        )}

        {/* GAME OVER — ENHANCED SUMMARY */}
        {gameOver && (() => {
          const rosterSize = available.length;
          const equalTarget = totalGameSecs * 5 / rosterSize;
          const playerRows = available.map(p => {
            const secs = courtTime(p.jersey);
            // Use planned/adjusted target if available, fallback to equal share
            const plannedTarget = (adjustedTargetMins[p.jersey] ?? rotationPlan?.targetMinutes?.[p.jersey]) != null
              ? (adjustedTargetMins[p.jersey] ?? rotationPlan?.targetMinutes?.[p.jersey]) * 60
              : equalTarget;
            const fairTarget = plannedTarget;
            const diff = secs - fairTarget;
            const pct = fairTarget > 0 ? (secs / fairTarget) * 100 : 0;
            const foulCount = fouls[p.jersey] || 0;
            const status = fouledOut.has(p.jersey) ? "Fouled out" : injured.has(p.jersey) ? "Injured" : "";
            return { jersey: p.jersey, name: p.name, secs, diff, pct, foulCount, status };
          }).sort((a, b) => b.secs - a.secs);
          const allSecs = playerRows.map(r => r.secs);
          const maxSecs = Math.max(...allSecs);
          const minSecs = Math.min(...allSecs);
          const spread = maxSecs - minSecs;
          const below85 = playerRows.filter(r => r.pct < 85);
          const subStoppages = subLog.filter(e => !e.skipped && !e.timeout).length;
          const playerSwaps = subLog.filter(e => !e.skipped && !e.timeout).reduce((sum, e) => sum + (e.subs?.length || 0), 0);
          const totalFouls = Object.values(fouls).reduce((a, b) => a + b, 0);

          function buildClipboard() {
            const lines = [];
            lines.push("=== GAME SUMMARY ===");
            if (scoreUs > 0 || scoreOpponent > 0) lines.push(`Score: Roadies ${scoreUs} – ${scoreOpponent} Opponent`);
            if (timeoutsUs > 0 || timeoutsOpponent > 0) lines.push(`Timeouts: Roadies ${timeoutsUs}, Opponent ${timeoutsOpponent}`);
            lines.push("");
            lines.push(`Targets: planned/adjusted rotation targets (${rosterSize} players)`);
            lines.push("");
            lines.push("MINUTES:");
            playerRows.forEach(r => {
              const m = Math.floor(r.secs / 60);
              const s = r.secs % 60;
              const diffSign = r.diff >= 0 ? "+" : "";
              const diffM = (r.diff / 60).toFixed(1);
              const pTarget = (adjustedTargetMins[r.jersey] ?? rotationPlan?.targetMinutes?.[r.jersey]) != null
                ? (adjustedTargetMins[r.jersey] ?? rotationPlan.targetMinutes[r.jersey])
                : equalTarget / 60;
              let line = `  #${r.jersey} ${r.name}: ${m}:${s.toString().padStart(2,"0")} / target ${fmt(Math.round(pTarget * 60))} (${diffSign}${diffM}m, ${Math.round(r.pct)}%)`;
              if (r.foulCount > 0) line += ` [${r.foulCount}F]`;
              if (r.status) line += ` [${r.status}]`;
              lines.push(line);
            });
            lines.push("");
            lines.push(`Spread: ${fmt(spread)} (max ${fmt(maxSecs)} / min ${fmt(minSecs)})`);
            if (below85.length > 0) {
              lines.push(`Below 85%: ${below85.map(r => {
                const rTgt = (adjustedTargetMins[r.jersey] ?? rotationPlan?.targetMinutes?.[r.jersey]) != null
                  ? (adjustedTargetMins[r.jersey] ?? rotationPlan?.targetMinutes?.[r.jersey]) * 60 : equalTarget;
                const gap = Math.round(0.85 * rTgt - r.secs);
                return `#${r.jersey} ${r.name} — ${r.pct.toFixed(1)}% (${fmt(Math.abs(gap))} below floor)`;
              }).join(", ")}`);
            } else {
              lines.push("All players at or above 85% of target ✓");
            }
            lines.push(`Sub stoppages: ${subStoppages} | Player swaps: ${playerSwaps} | Total fouls: ${totalFouls}`);
            lines.push("");
            lines.push("SUB LOG:");
            subLog.forEach(entry => {
              if (entry.timeout) {
                lines.push(`  H${entry.half} ${fmt(entry.timeInHalf)} — TIMEOUT (${entry.team})`);
              } else if (entry.skipped) {
                lines.push(`  H${entry.half} ${fmt(entry.timeInHalf)} — SKIPPED: ${entry.reason || "no sub needed"}`);
              } else {
                const parts = entry.subs.map(s => s.out ? `${s.out.name} → ${s.in?.name}` : `+${s.in?.name}`);
                const tag = entry.emergency ? "EMERGENCY" : entry.subs.some(s => !s.out) ? "ADD" : "SUB";
                lines.push(`  H${entry.half} ${fmt(entry.timeInHalf)} — ${tag}: ${parts.join(", ")}`);
              }
            });
            return lines.join("\n");
          }

          return (
            <div style={{ background: "#1e3a8a", borderRadius: 14, padding: 16 }}>
              <div style={{ textAlign: "center", marginBottom: 12 }}>
                <div style={{ color: "#fbbf24", fontSize: 20, fontWeight: 800, marginBottom: 4 }}>🏆 Full Time!</div>
                {(scoreUs > 0 || scoreOpponent > 0) && (
                  <div style={{ color: "#93c5fd", fontSize: 16, fontWeight: 700 }}>
                    Roadies {scoreUs} – {scoreOpponent} Opponent
                  </div>
                )}
                {(timeoutsUs > 0 || timeoutsOpponent > 0) && (
                  <div style={{ color: "#94a3b8", fontSize: 12, marginTop: 2 }}>
                    Timeouts: Roadies {timeoutsUs} · Opponent {timeoutsOpponent}
                  </div>
                )}
              </div>

              <div style={{ background: "#0f172a", borderRadius: 10, padding: 10, marginBottom: 10 }}>
                <div style={{ color: "#94a3b8", fontSize: 11, fontWeight: 700, letterSpacing: 1, marginBottom: 6 }}>
                  MINUTES vs planned target
                </div>
                {playerRows.map(r => {
                  const m = Math.floor(r.secs / 60);
                  const s = r.secs % 60;
                  const rTarget = (adjustedTargetMins[r.jersey] ?? rotationPlan?.targetMinutes?.[r.jersey]) != null
                    ? (adjustedTargetMins[r.jersey] ?? rotationPlan?.targetMinutes?.[r.jersey]) * 60
                    : equalTarget;
                  const barPct = rTarget > 0 ? Math.min(120, (r.secs / rTarget) * 100) : 0;
                  const barColor = r.pct < 85 ? "#ef4444" : r.pct < 95 ? "#f59e0b" : "#22c55e";
                  return (
                    <div key={r.jersey} style={{ marginBottom: 6 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: "#cbd5e1", marginBottom: 2 }}>
                        <span>
                          #{r.jersey} {r.name}
                          {r.foulCount > 0 && <span style={{ color: "#f87171", marginLeft: 6, fontSize: 10 }}>{r.foulCount}F</span>}
                          {r.status && <span style={{ color: "#fb923c", marginLeft: 6, fontSize: 10 }}>{r.status}</span>}
                        </span>
                        <span style={{ fontWeight: 600, color: barColor }}>
                          {m}:{s.toString().padStart(2,"0")}
                          <span style={{ color: "#64748b", fontSize: 10, marginLeft: 4 }}>
                            ({r.diff >= 0 ? "+" : ""}{(r.diff / 60).toFixed(1)}m)
                          </span>
                        </span>
                      </div>
                      <div style={{ background: "#1e293b", borderRadius: 4, height: 6, overflow: "hidden" }}>
                        <div style={{ background: barColor, width: `${Math.min(100, barPct)}%`, height: "100%", borderRadius: 4 }} />
                      </div>
                    </div>
                  );
                })}
              </div>

              <div style={{ background: "#0f172a", borderRadius: 10, padding: 10, marginBottom: 10 }}>
                <div style={{ color: "#94a3b8", fontSize: 11, fontWeight: 700, letterSpacing: 1, marginBottom: 6 }}>FAIRNESS</div>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: "#cbd5e1", marginBottom: 4 }}>
                  <span>Spread (max – min)</span>
                  <span style={{ fontWeight: 600, color: spread <= 120 ? "#22c55e" : spread <= 180 ? "#f59e0b" : "#ef4444" }}>{fmt(spread)}</span>
                </div>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: "#cbd5e1", marginBottom: 4 }}>
                  <span>Most court time</span>
                  <span style={{ color: "#60a5fa" }}>{fmt(maxSecs)}</span>
                </div>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: "#cbd5e1", marginBottom: 4 }}>
                  <span>Least court time</span>
                  <span style={{ color: "#60a5fa" }}>{fmt(minSecs)}</span>
                </div>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: "#cbd5e1" }}>
                  <span>Below 85% target</span>
                  <span style={{ color: below85.length === 0 ? "#22c55e" : "#ef4444", fontWeight: 600 }}>
                    {below85.length === 0 ? "None ✓" : below85.map(r => `#${r.jersey} (${r.pct.toFixed(1)}%)`).join(", ")}
                  </span>
                </div>
              </div>

              <div style={{ background: "#0f172a", borderRadius: 10, padding: 10, marginBottom: 12 }}>
                <div style={{ color: "#94a3b8", fontSize: 11, fontWeight: 700, letterSpacing: 1, marginBottom: 6 }}>GAME STATS</div>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: "#cbd5e1", marginBottom: 4 }}>
                  <span>Sub stoppages</span>
                  <span style={{ color: "#60a5fa", fontWeight: 600 }}>{subStoppages}</span>
                </div>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: "#cbd5e1", marginBottom: 4 }}>
                  <span>Player swaps</span>
                  <span style={{ color: "#60a5fa", fontWeight: 600 }}>{playerSwaps}</span>
                </div>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: "#cbd5e1" }}>
                  <span>Total fouls</span>
                  <span style={{ color: totalFouls > 0 ? "#f87171" : "#60a5fa", fontWeight: 600 }}>{totalFouls}</span>
                </div>
              </div>

              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={() => {
                  const text = buildClipboard();
                  if (navigator.clipboard) {
                    navigator.clipboard.writeText(text).then(() => {
                      alert("Game summary copied to clipboard!");
                    }).catch(() => {
                      prompt("Copy this summary:", text);
                    });
                  } else {
                    prompt("Copy this summary:", text);
                  }
                }} style={{ flex: 1, padding: "12px", borderRadius: 12, border: "1px solid #3b82f6", background: "transparent", color: "#93c5fd", fontSize: 14, fontWeight: 700, cursor: "pointer" }}>
                  📋 Copy Summary
                </button>
                <button onClick={discardSavedGame} style={{ flex: 1, padding: "12px", borderRadius: 12, border: "none", background: "#1d4ed8", color: "#fff", fontSize: 14, fontWeight: 700, cursor: "pointer" }}>
                  New Game
                </button>
              </div>
            </div>
          );
        })()}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
