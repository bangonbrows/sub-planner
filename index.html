            </>
          );
        })()}
      </div>
    </div>
  );

  // ── PLAN SCREEN ─────────────────────────────────────────────────────────────
  if (screen === "plan") return (
    <div style={{ minHeight: "100vh", backgroundColor: "#0f172a", padding: "16px", fontFamily: "system-ui, sans-serif" }}>
      <div style={{ maxWidth: 400, margin: "0 auto" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16 }}>
          <button onClick={() => setScreen(gameIsLive ? "game" : "setup")}
            style={{ background: "#334155", border: "none", color: "#fff", borderRadius: 10, padding: "8px 14px", cursor: "pointer", fontSize: 14 }}>← Back</button>
          <div style={{ color: "#fff", fontSize: 18, fontWeight: 700 }}>Rotation Plan</div>
        </div>

        {/* Starting 5 */}
        <div style={{ background: "#1e293b", borderRadius: 16, padding: 16, marginBottom: 12 }}>
          <div style={{ color: "#fbbf24", fontSize: 12, fontWeight: 700, letterSpacing: 1, marginBottom: 10 }}>⭐ STARTING 5 (also CLOSING 5)</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
            {plan.starting.map(p => (
              <div key={p.jersey} style={{ background: p.color + "33", border: `1px solid ${p.color}`, borderRadius: 10, padding: "6px 10px", display: "flex", alignItems: "center", gap: 6 }}>
                <div style={{ width: 26, height: 26, borderRadius: "50%", background: p.color, display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 11, fontWeight: 700 }}>#{p.jersey}</div>
                <span style={{ color: "#fff", fontSize: 13, fontWeight: 600 }}>{p.name}</span>
              </div>
            ))}
          </div>
        </div>

        {/* Target minutes */}
        <div style={{ background: "#1e293b", borderRadius: 16, padding: 16, marginBottom: 12 }}>
          <div style={{ color: "#94a3b8", fontSize: 12, fontWeight: 700, letterSpacing: 1, marginBottom: 10 }}>TARGET MINUTES</div>
          {available.map(p => (
            <div key={p.jersey} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
              <div style={{ width: 28, height: 28, borderRadius: "50%", background: p.color, display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 11, fontWeight: 700, flexShrink: 0 }}>#{p.jersey}</div>
              <div style={{ color: "#cbd5e1", fontSize: 14, flex: 1 }}>{p.name}</div>
              <div style={{ color: "#60a5fa", fontSize: 14, fontWeight: 600 }}>{adjustedTargetMins[p.jersey]} min</div>
            </div>
          ))}
        </div>

        {/* Rule-driven rotation note — no pre-scheduled events */}
        <div style={{ background: "#1e293b", borderRadius: 16, padding: 16, marginBottom: 12 }}>
          <div style={{ color: "#94a3b8", fontSize: 12, fontWeight: 700, letterSpacing: 1, marginBottom: 10 }}>ROTATION</div>
          {(() => {
            const activeRosterSize = gameIsLive
              ? available.length - fouledOut.size - injured.size
              : available.length;
            const config = getRotationConfig(activeRosterSize);
            const schedule = activeRosterSize > 5
              ? getWindowSchedule(activeRosterSize, halfMins, START_BLOCK_SECS, CLOSE_BLOCK_SECS)
              : [];
            const rotationWindows = schedule.filter(w => !w.isCloser);
            if (activeRosterSize <= 5) return (
              <div style={{ color: "#cbd5e1", fontSize: 13, lineHeight: 1.5 }}>
                No bench — all {activeRosterSize} players on court full time.
                <br />
                <span style={{ color: "#64748b", fontSize: 12 }}>
                  No rotation windows. Mandatory checks (stint cap, skill, weakest-3) still active.
                </span>
              </div>
            );
            return (
              <div style={{ color: "#cbd5e1", fontSize: 13, lineHeight: 1.5 }}>
                Window-based — subs at scheduled intervals.
                <br />
                <span style={{ color: "#64748b", fontSize: 12 }}>
                  {activeRosterSize} players → {config.benchCount} bench → cadence every {fmt(config.cadenceSecs)}.
                  {config.firstCycleCount > 0 && ` First cycle faster (${fmt(config.firstCycleCadenceSecs)}).`}
                  {" "}Bundle: up to {config.bundleCap} swap{config.bundleCap > 1 ? "s" : ""} per window.
                  {" "}Stint cap: {fmt(config.hardStintCapSecs)}.
                  {" "}Starters locked {fmt(START_BLOCK_SECS)}, closers last {fmt(CLOSE_BLOCK_SECS)}.
                  {" "}{rotationWindows.length} rotation windows + closer.
                </span>
              </div>
            );
          })()}
        </div>

        {gameIsLive ? (
          <>
            <button onClick={() => setScreen("game")}
              style={{ width: "100%", padding: "16px", borderRadius: 16, border: "none", cursor: "pointer",
                background: "linear-gradient(135deg,#1d4ed8,#3b82f6)", color: "#fff", fontSize: 17, fontWeight: 700,
                display: "flex", alignItems: "center", justifyContent: "center", gap: 10, marginBottom: 8 }}>
              ← Back to Game
            </button>
            <button onClick={() => { if (window.confirm("This will end the current game and lose all data. Are you sure?")) { discardSavedGame(); } }}
              style={{ width: "100%", padding: "12px", borderRadius: 12, border: "1px solid #991b1b", cursor: "pointer",
                background: "transparent", color: "#f87171", fontSize: 14, fontWeight: 600 }}>
              End Game & New Setup
            </button>
          </>
        ) : (
          <button onClick={handleStartGame}
            style={{ width: "100%", padding: "16px", borderRadius: 16, border: "none", cursor: "pointer",
              background: "linear-gradient(135deg,#059669,#10b981)", color: "#fff", fontSize: 17, fontWeight: 700,
              display: "flex", alignItems: "center", justifyContent: "center", gap: 10 }}>
            <CoachKLogo size={24} /> Start Game
          </button>
        )}
      </div>
    </div>
  );

  // ── GAME SCREEN ─────────────────────────────────────────────────────────────
  const halfSecs = halfMins * 60;
  const halfRemaining = halfSecs - timeInHalf;

  return (
    <div style={{ minHeight: "100vh", backgroundColor: "#0f172a", padding: "12px", fontFamily: "system-ui, sans-serif" }}
      onClick={() => { if (activeMenu) setActiveMenu(null); if (benchMenu) setBenchMenu(null); }}>
      <div style={{ maxWidth: 400, margin: "0 auto" }}>

        {/* HALFTIME OVERLAY */}
        {showHalftime && (
          <div style={{ position: "fixed", inset: 0, background: "#000000cc", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100 }}>
            <div style={{ background: "#1e293b", borderRadius: 24, padding: 32, textAlign: "center", maxWidth: 320, margin: "0 auto" }}>
              <div style={{ display: "flex", justifyContent: "center", marginBottom: 8 }}>
                <CoachKLogo size={64} />
              </div>
              <div style={{ color: "#fbbf24", fontSize: 22, fontWeight: 800, marginBottom: 8 }}>HALFTIME</div>
              <div style={{ color: "#94a3b8", fontSize: 14, marginBottom: 24 }}>Players who sat most in H1 start the 2nd half</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 8, justifyContent: "center", marginBottom: 24 }}>
                {(() => {
                  const { courtObjs: court } = computeSecondHalfLineup();
                  return court.map(p => (
                    <div key={p.jersey} style={{ background: p.color + "44", border: `1px solid ${p.color}`, borderRadius: 8, padding: "4px 10px", color: "#fff", fontSize: 13, fontWeight: 600 }}>
                      #{p.jersey} {p.name}
                    </div>
                  ));
                })()}
              </div>
              <button onClick={handleStartSecondHalf}
                style={{ background: "linear-gradient(135deg,#1d4ed8,#7c3aed)", border: "none", color: "#fff", borderRadius: 14, padding: "14px 32px", fontSize: 16, fontWeight: 700, cursor: "pointer", width: "100%" }}>
                Start 2nd Half ▶
              </button>
            </div>
          </div>
        )}

        {/* EMERGENCY REPLACEMENT OVERLAY */}
        {replacingJersey && (
          <div style={{ position: "fixed", inset: 0, background: "#000000cc", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100 }}>
            <div style={{ background: "#1e293b", borderRadius: 24, padding: 24, maxWidth: 320, width: "90%", margin: "0 auto" }}>
              <div style={{ color: "#f87171", fontSize: 16, fontWeight: 700, marginBottom: 4 }}>⚠️ Player Off Court</div>
              <div style={{ color: "#94a3b8", fontSize: 13, marginBottom: 16 }}>
                #{replacingJersey} {pObj(replacingJersey)?.name} is out. Pick a replacement:
              </div>
              {benchPlayers.length === 0 ? (
                <div style={{ color: "#64748b", fontSize: 13, marginBottom: 16 }}>No available bench players</div>
              ) : benchPlayers.map(p => (
                <div key={p.jersey} onClick={() => doEmergencyIn(p.jersey)}
                  style={{ display: "flex", alignItems: "center", gap: 10, padding: "12px", borderRadius: 12, marginBottom: 6, cursor: "pointer", background: "#0f172a", border: "1px solid #334155" }}>
                  <div style={{ width: 34, height: 34, borderRadius: "50%", background: p.color, display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 12, fontWeight: 700 }}>#{p.jersey}</div>
                  <div style={{ color: "#fff", fontSize: 15, fontWeight: 600 }}>{p.name}</div>
                </div>
              ))}
              {benchPlayers.length === 0 ? (
                <button onClick={() => setReplacingJersey(null)}
                  style={{ width: "100%", marginTop: 8, background: "#334155", border: "none", color: "#94a3b8", borderRadius: 10, padding: "10px", cursor: "pointer", fontSize: 14 }}>
                  Play with {onCourt.length} — no bench available
                </button>
              ) : (
                <button onClick={() => { if (window.confirm(`${benchPlayers.length} bench player${benchPlayers.length > 1 ? "s" : ""} available. Play short-handed anyway?`)) setReplacingJersey(null); }}
                  style={{ width: "100%", marginTop: 8, background: "transparent", border: "1px solid #991b1b", color: "#f87171", borderRadius: 10, padding: "10px", cursor: "pointer", fontSize: 13 }}>
                  Play with {onCourt.length} despite available bench
                </button>
              )}
            </div>
          </div>
        )}

        {/* HEADER */}
        <div style={{ background: "linear-gradient(135deg,#1e3a8a,#1d4ed8)", borderRadius: 16, padding: "12px 16px", marginBottom: 10, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <div>
            <div style={{ color: "#93c5fd", fontSize: 11, fontWeight: 700, letterSpacing: 1 }}>HALF {half} {gameOver ? "— FULL TIME" : ""}</div>
            <div style={{ color: "#fff", fontSize: 30, fontWeight: 800, lineHeight: 1 }}>{fmt(timeInHalf)}</div>
            <div style={{ color: "#60a5fa", fontSize: 12 }}>{gameOver ? "Game over" : `${fmt(halfRemaining)} left in H${half}`}</div>
          </div>
          <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
            {!gameOver && !showHalftime && (
              <>
                <button onClick={() => setClockSecs(Math.max(halftimeDone ? halfMins * 60 : 0, gameSecs - 10))}
                  title="Rewind 10s"
                  style={{ padding: "8px 10px", borderRadius: 10, border: "1px solid #1e40af", cursor: "pointer", background: "#1e3a8a", color: "#dbeafe", fontSize: 12, fontWeight: 700 }}>−10s</button>
                <button onClick={() => setRunning(r => !r)}
                  style={{ padding: "10px 18px", borderRadius: 12, border: "none", cursor: "pointer", fontWeight: 700, fontSize: 15,
                    background: running ? "#ef4444" : "#16a34a", color: "#fff" }}>
                  {running ? "⏸" : "▶"}
                </button>
                <button onClick={() => setClockSecs(Math.min(totalGameSecs, gameSecs + 10))}
                  title="Forward 10s"
                  style={{ padding: "8px 10px", borderRadius: 10, border: "1px solid #1e40af", cursor: "pointer", background: "#1e3a8a", color: "#dbeafe", fontSize: 12, fontWeight: 700 }}>+10s</button>
              </>
            )}
            <button onClick={() => { setRunning(false); setScreen("plan"); }}
              style={{ padding: "10px 14px", borderRadius: 12, border: "none", cursor: "pointer", background: "#334155", color: "#fff", fontSize: 14 }}>Plan</button>
          </div>
        </div>

        {/* SUB SUGGESTION — window-based with urgency levels */}
        {pendingSub && !gameOver && (() => {
          // Compute urgency from window timing
          const wt = pendingSub.windowTarget;
          const wsl = pendingSub.windowSoftLate;
          const urgency = pendingSub.mandatory ? "mandatory"
            : wt == null ? "mandatory"
            : gameSecs >= wsl ? "overdue"
            : gameSecs >= wt ? "due"
            : "open";
          const bgColor = urgency === "mandatory" || urgency === "overdue" ? "#7f1d1d"
            : urgency === "due" ? "#164e63"
            : "#1e3a5f";
          const labelColor = urgency === "mandatory" || urgency === "overdue" ? "#fca5a5"
            : urgency === "due" ? "#67e8f9"
            : "#93c5fd";
          const label = urgency === "mandatory"
            ? (pendingSub.subs.length > 1 ? `🔴 ${pendingSub.subs.length} SUBS — required` : "🔴 SUB — required")
            : urgency === "overdue"
            ? "🔴 SUB OVERDUE — make change now"
            : urgency === "due"
            ? "🟡 SUB WINDOW — change at next dead ball"
            : "🔵 WINDOW OPEN — sub when ready";
          const btnBg = urgency === "mandatory" || urgency === "overdue" ? "#dc2626"
            : urgency === "due" ? "#0284c7"
            : "#1d4ed8";
          return (
            <div style={{ background: bgColor, borderRadius: 12, padding: "10px 14px", marginBottom: 10,
              border: urgency === "overdue" ? "2px solid #ef4444" : "none" }}>
              <div style={{ color: labelColor, fontSize: 12, fontWeight: 700, marginBottom: 4 }}>
                {label}
              </div>
              <div style={{ color: "#fff", fontSize: 13, marginBottom: 6 }}>
                {pendingSub.reason}
              </div>
              {pendingSub.subs.map((s, i) => (
                <div key={i} style={{ color: "#cbd5e1", fontSize: 12, marginBottom: 2 }}>
                  {s.out ? (
                    <>
                      <span style={{ color: "#f87171" }}>OUT #{s.out.jersey} {s.out.name}</span>
                      <span style={{ color: "#64748b" }}> ({s.out.pos[0]})</span>
                      <span style={{ color: "#94a3b8" }}> → </span>
                    </>
                  ) : null}
                  <span style={{ color: "#4ade80" }}>{s.out ? "IN" : "➕ ADD"} #{s.in.jersey} {s.in.name}</span>
                  <span style={{ color: "#64748b" }}> ({s.in.pos[0]})</span>
                </div>
              ))}
              <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
                <button
                  onClick={() => withActionLock(() => {
                    if (pendingSub.addOnly) {
                      // Add-only: bring player onto court without removing anyone
                      const inJersey = pendingSub.subs[0].in.jersey;
                      if (onCourt.includes(inJersey) || onCourt.length >= 5) return;
                      if (unavailableJerseys.has(inJersey)) return; // injured/fouled out since suggestion
                      const now = gameSecs;
                      setStintStart(prev => ({ ...prev, [inJersey]: now }));
                      setOffSince(prev => { const n = { ...prev }; delete n[inJersey]; return n; });
                      setOnCourt(prev => [...prev, inJersey]);
                      setSubLog(prev => [...prev, {
                        time: now, half, timeInHalf,
                        subs: [{ out: null, in: pObj(inJersey) }],
                      }]);
                      setLastSubTime(now);
                      setPendingSub(null);
                      setRestedThisHalf(prev => { const next = new Set(prev); next.add(inJersey); return next; });
                      markActiveWindowHandled();
                    } else {
                      const applied = doSubs(pendingSub.subs.map(s => ({ outJersey: s.out.jersey, inJersey: s.in.jersey })));
                      if (applied > 0) {
                        if (pendingSub.windowTarget != null && pendingSub.windowRoster != null) {
                          const k = wKey(pendingSub.windowRoster, pendingSub.windowTarget);
                          setHandledWindows(prev => new Set([...prev, k]));
                        }
                        // For mandatory subs without a windowTarget, still mark the
                        // active rotation window so it doesn't reappear after quiet period.
                        if (pendingSub.windowTarget == null && !pendingSub.reason?.startsWith("Closer")) {
                          markActiveWindowHandled();
                        }
                      }
                      setPendingSub(null);
                    }
                  })}
                  style={{ flex: 1, padding: "10px", borderRadius: 10, border: "none", cursor: "pointer",
                    background: btnBg, color: "#fff", fontWeight: 700, fontSize: 14 }}>
                  {pendingSub.addOnly
                    ? "✓ Add Player"
                    : pendingSub.subs.length > 1
                      ? `✓ Confirm ${pendingSub.subs.length} Subs`
                      : "✓ Confirm Sub"}
                </button>
                {!pendingSub.mandatory && pendingSub.windowTarget != null && (
                  <button
                    onClick={() => withActionLock(() => {
                      // Log the skipped window in the sub log
                      setSubLog(prev => [...prev, {
                        time: gameSecs,
                        half,
                        timeInHalf,
                        skipped: true,
                        reason: pendingSub.reason,
                        windowTarget: pendingSub.windowTarget,
                        suggestedSubs: pendingSub.subs.map(s => ({
                          outJersey: s.out.jersey, outName: s.out.name,
                          inJersey: s.in.jersey, inName: s.in.name,
                        })),
                      }]);
                      if (pendingSub.windowRoster != null) {
                        setHandledWindows(prev => new Set([...prev, wKey(pendingSub.windowRoster, pendingSub.windowTarget)]));
                      }
                      setPendingSub(null);
                    })}
                    style={{ padding: "10px 14px", borderRadius: 10, border: "1px solid #475569", cursor: "pointer",
                      background: "#334155", color: "#94a3b8", fontWeight: 600, fontSize: 13 }}>
                    Skip
                  </button>
                )}
              </div>
            </div>
          );
        })()}
        {!pendingSub && !gameOver && screen === "game" && plan && !showHalftime && (() => {
          // Show next window countdown
          const activeRosterSize = available.length - fouledOut.size - injured.size;
          const schedule = activeRosterSize > 5
            ? getWindowSchedule(activeRosterSize, halfMins, START_BLOCK_SECS, CLOSE_BLOCK_SECS)
            : [];
          const nextWindow = schedule.find(w =>
            gameSecs < w.openSecs && !handledWindows.has(wKey(activeRosterSize, w.targetSecs))
          );
          const countdown = nextWindow ? nextWindow.targetSecs - gameSecs : null;
          return (
            <div style={{ background: "#042f2e", border: "1px solid #14b8a6", borderRadius: 12, padding: "8px 14px", marginBottom: 10,
              display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ color: "#5eead4", fontSize: 12, fontWeight: 700 }}>
                ✓ Rotation stable
              </span>
              {countdown != null && countdown > 0 && (
                <span style={{ color: "#2dd4bf", fontSize: 11, fontWeight: 600 }}>
                  next window {fmt(countdown)}
                </span>
              )}
            </div>
          );
        })()}

        {/* ON COURT */}
        <div style={{ background: "#1e293b", borderRadius: 14, padding: 12, marginBottom: 10 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
            <div style={{ color: "#4ade80", fontSize: 11, fontWeight: 700, letterSpacing: 1 }}>ON COURT ({onCourt.length})</div>
            {(() => {
              const w3 = activeWeakest3;
              if (w3.length < 3) return null;
              const courtObjs = onCourt.map(j => PLAYERS_DB.find(p => p.jersey === j)).filter(Boolean);
              const onCount = courtObjs.filter(p => w3.includes(p.jersey)).length;
              const violated = onCount >= 3;
              // If violated, check whether any of the weakest-3 on court is
              // genuinely under pace (which is the exception that permits it)
              const exempt = violated && courtObjs
                .filter(p => w3.includes(p.jersey))
                .some(p => overUnderSecs(p.jersey) <= -2 * 60);
              const ok = !violated;
              const bg = ok ? "#042f2e" : (exempt ? "#1e3a8a" : "#422006");
              const fg = ok ? "#5eead4" : (exempt ? "#93c5fd" : "#fbbf24");
              const bd = ok ? "#14b8a6" : (exempt ? "#3b82f6" : "#f59e0b");
              const label = ok
                ? `✓ ${onCount}/3 DEV ON`
                : exempt
                  ? "↻ 3/3 DEV — CATCH-UP OK"
                  : "⚠ 3 DEVELOPING TOGETHER";
              return (
                <div style={{
                  fontSize: 10, fontWeight: 700, letterSpacing: 0.5,
                  padding: "3px 8px", borderRadius: 6,
                  background: bg, color: fg, border: `1px solid ${bd}`,
                }}>
                  {label}
                </div>
              );
            })()}
          </div>
          {onCourt.map(jersey => {
            const p = pObj(jersey);
            if (!p) return null;
            const mins = Math.floor(courtTime(jersey) / 60);
            const secs = courtTime(jersey) % 60;
            const target = fouledOut.has(jersey) ? 0 : targetMinsFor(jersey);
            const pct = target > 0 ? Math.min((courtTime(jersey) / (target * 60)) * 100, 100) : 0;
            const ou = overUnderSecs(jersey); // seconds over (+) or under (-) fair-share pace
            const isMenuOpen = activeMenu === jersey;
            return (
              <div key={jersey} style={{ marginBottom: 8 }} onClick={e => { e.stopPropagation(); setActiveMenu(isMenuOpen ? null : jersey); }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 10px", borderRadius: 10,
                  background: isMenuOpen ? "#0f2a1a" : "#0f172a", border: `1px solid ${isMenuOpen ? "#16a34a" : "#334155"}`, cursor: "pointer" }}>
                  <div style={{ width: 34, height: 34, borderRadius: "50%", background: p.color, display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 12, fontWeight: 700, flexShrink: 0 }}>
                    #{jersey}
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      <span style={{ color: "#fff", fontSize: 14, fontWeight: 600 }}>{p.name}</span>
                      <span style={{ color: p.color, fontSize: 10, fontWeight: 700, background: p.color + "22", padding: "1px 5px", borderRadius: 4 }}>{p.pos[0]}</span>
                      {(fouls[jersey] || 0) > 0 && (
                        <span style={{ color: (fouls[jersey] >= 4) ? "#fca5a5" : "#fcd34d", fontSize: 10, fontWeight: 700, background: (fouls[jersey] >= 4) ? "#7f1d1d" : "#78350f", padding: "1px 5px", borderRadius: 4 }}>
                          {fouls[jersey]}F
                        </span>
                      )}
                    </div>
                    <div style={{ display: "flex", gap: 3, marginTop: 3 }}>
                      {p.skills.map(sk => { const b = SKILL_BADGE[sk]; return b ? (
                        <span key={sk} style={{ fontSize: 9, fontWeight: 700, color: b.color, background: b.color + "22", padding: "1px 4px", borderRadius: 3, lineHeight: 1.2 }}>{b.label}</span>
                      ) : null; })}
                    </div>
                    <div style={{ background: "#1e293b", borderRadius: 4, height: 4, marginTop: 3, overflow: "hidden" }}>
                      <div style={{ height: "100%", width: `${pct}%`, background: pct >= 100 ? "#f87171" : "#4ade80", borderRadius: 4 }} />
                    </div>
                  </div>
                  <div style={{ color: "#94a3b8", fontSize: 12, textAlign: "right" }}>
                    <div>{mins}:{secs.toString().padStart(2,"0")}</div>
                    <div style={{ color: "#64748b", fontSize: 10 }}>
                      /{target}m
                      {Math.abs(ou) >= 30 && (
                        <span style={{ marginLeft: 4, color: ou > 0 ? "#f87171" : "#4ade80", fontWeight: 700 }}>
                          {ou > 0 ? "+" : ""}{(ou / 60).toFixed(1)}m
                        </span>
                      )}
                    </div>
                  </div>
                  <div style={{ color: "#64748b", fontSize: 16 }}>⋮</div>
                </div>
                {isMenuOpen && (
                  <div style={{ background: "#0f172a", border: "1px solid #334155", borderRadius: 10, marginTop: 4, overflow: "hidden" }}
                    onClick={e => e.stopPropagation()}>
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "10px 14px", borderBottom: "1px solid #1e293b" }}>
                      <span style={{ color: "#fcd34d", fontSize: 13, fontWeight: 600 }}>Fouls: {fouls[jersey] || 0} / 5</span>
                      <div style={{ display: "flex", gap: 6 }}>
                        <button onClick={() => removeFoul(jersey)}
                          style={{ padding: "6px 12px", borderRadius: 8, border: "1px solid #334155", background: "#1e293b", color: "#cbd5e1", fontSize: 14, cursor: "pointer", fontWeight: 700 }}>−</button>
                        <button onClick={() => addFoul(jersey)}
                          style={{ padding: "6px 12px", borderRadius: 8, border: "none", background: "#b45309", color: "#fff", fontSize: 14, cursor: "pointer", fontWeight: 700 }}>+ Foul</button>
                      </div>
                    </div>
                    <div onClick={() => manualSubOut(jersey)}
                      style={{ padding: "12px 14px", color: "#60a5fa", fontSize: 14, cursor: "pointer", borderBottom: "1px solid #1e293b" }}>
                      🔁 Sub Out Now (pick replacement)
                    </div>
                    <div onClick={() => markFouledOut(jersey)}
                      style={{ padding: "12px 14px", color: "#fca5a5", fontSize: 14, cursor: "pointer", borderBottom: "1px solid #1e293b" }}>
                      🟥 Foul Out
                    </div>
                    <div onClick={() => markInjured(jersey)}
                      style={{ padding: "12px 14px", color: "#fcd34d", fontSize: 14, cursor: "pointer" }}>
                      ⚕️ Injury — remove temporarily
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>

        {/* BENCH */}
        {benchPlayers.length > 0 && (
          <div style={{ background: "#1e293b", borderRadius: 14, padding: 12, marginBottom: 10 }}
            onClick={() => benchMenu && setBenchMenu(null)}>
            <div style={{ color: "#60a5fa", fontSize: 11, fontWeight: 700, letterSpacing: 1, marginBottom: 8 }}>BENCH ({benchPlayers.length})</div>
            {benchPlayers.map(p => {
              const mins = Math.floor(courtTime(p.jersey) / 60);
              const secs = courtTime(p.jersey) % 60;
              const target = targetMinsFor(p.jersey);
              const pct = target > 0 ? Math.min((courtTime(p.jersey) / (target * 60)) * 100, 100) : 0;
              const ou = overUnderSecs(p.jersey);
              const isMenuOpen = benchMenu === p.jersey;
              return (
                <div key={p.jersey} style={{ marginBottom: 6 }} onClick={e => { e.stopPropagation(); setBenchMenu(isMenuOpen ? null : p.jersey); setActiveMenu(null); }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 10px", borderRadius: 10,
                    background: isMenuOpen ? "#1a1a2e" : "#0f172a",
                    border: `1px solid ${isMenuOpen ? "#3b82f6" : "#1e293b"}`, cursor: "pointer" }}>
                    <div style={{ width: 34, height: 34, borderRadius: "50%", background: p.color, opacity: 0.7, display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 12, fontWeight: 700, flexShrink: 0 }}>
                      #{p.jersey}
                    </div>
                    <div style={{ flex: 1 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                        <span style={{ color: "#94a3b8", fontSize: 14 }}>{p.name}</span>
                        <span style={{ color: "#64748b", fontSize: 10, fontWeight: 700 }}>{p.pos[0]}</span>
                        {(fouls[p.jersey] || 0) > 0 && (
                          <span style={{ color: (fouls[p.jersey] >= 4) ? "#fca5a5" : "#fcd34d", fontSize: 10, fontWeight: 700, background: (fouls[p.jersey] >= 4) ? "#7f1d1d" : "#78350f", padding: "1px 5px", borderRadius: 4 }}>
                            {fouls[p.jersey]}F
                          </span>
                        )}
                      </div>
                      <div style={{ display: "flex", gap: 3, marginTop: 3 }}>
                        {p.skills.map(sk => { const b = SKILL_BADGE[sk]; return b ? (
                          <span key={sk} style={{ fontSize: 9, fontWeight: 700, color: b.color, background: b.color + "22", padding: "1px 4px", borderRadius: 3, lineHeight: 1.2, opacity: 0.7 }}>{b.label}</span>
                        ) : null; })}
                      </div>
                      <div style={{ background: "#1e293b", borderRadius: 4, height: 4, marginTop: 3, overflow: "hidden" }}>
                        <div style={{ height: "100%", width: `${pct}%`, background: "#3b82f6", borderRadius: 4 }} />
                      </div>
                    </div>
                    <div style={{ color: "#64748b", fontSize: 12, textAlign: "right" }}>
                      <div>{mins}:{secs.toString().padStart(2,"0")}</div>
                      <div style={{ fontSize: 10 }}>
                        /{target}m
                        {Math.abs(ou) >= 30 && (
                          <span style={{ marginLeft: 4, color: ou > 0 ? "#f87171" : "#4ade80", fontWeight: 700 }}>
                            {ou > 0 ? "+" : ""}{(ou / 60).toFixed(1)}m
                          </span>
                        )}
                      </div>
                    </div>
                    <div style={{ color: "#64748b", fontSize: 16 }}>⋮</div>
                  </div>
                  {isMenuOpen && (
                    <div style={{ background: "#0f172a", border: "1px solid #334155", borderRadius: 10, marginTop: 4, overflow: "hidden" }}
                      onClick={e => e.stopPropagation()}>
                      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "10px 14px", borderBottom: "1px solid #1e293b" }}>
                        <span style={{ color: "#fcd34d", fontSize: 13, fontWeight: 600 }}>Fouls: {fouls[p.jersey] || 0} / 5</span>
                        <div style={{ display: "flex", gap: 6 }}>
                          <button onClick={() => removeFoul(p.jersey)}
                            style={{ padding: "6px 12px", borderRadius: 8, border: "1px solid #334155", background: "#1e293b", color: "#cbd5e1", fontSize: 14, cursor: "pointer", fontWeight: 700 }}>−</button>
                          <button onClick={() => addFoul(p.jersey)}
                            style={{ padding: "6px 12px", borderRadius: 8, border: "none", background: "#b45309", color: "#fff", fontSize: 14, cursor: "pointer", fontWeight: 700 }}>+ Foul</button>
                        </div>
                      </div>
                      <div onClick={() => markFouledOut(p.jersey)}
                        style={{ padding: "12px 14px", color: "#fca5a5", fontSize: 14, cursor: "pointer", borderBottom: "1px solid #1e293b" }}>
                        🟥 Foul Out
                      </div>
                      <div onClick={() => markInjured(p.jersey)}
                        style={{ padding: "12px 14px", color: "#fcd34d", fontSize: 14, cursor: "pointer" }}>
                        ⚕️ Injury — remove temporarily
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}

        {/* UNAVAILABLE */}
        {(fouledOut.size > 0 || injured.size > 0) && (
          <div style={{ background: "#1e293b", borderRadius: 14, padding: 12, marginBottom: 10 }}>
            <div style={{ color: "#f87171", fontSize: 11, fontWeight: 700, letterSpacing: 1, marginBottom: 8 }}>UNAVAILABLE</div>
            {[...fouledOut].map(jersey => {
              const p = pObj(jersey);
              if (!p) return null;
              return (
                <div key={jersey} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 10px", borderRadius: 10, marginBottom: 6, background: "#2d0b0b" }}>
                  <div style={{ width: 34, height: 34, borderRadius: "50%", background: "#7f1d1d", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 12, fontWeight: 700, flexShrink: 0 }}>
                    #{jersey}
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ color: "#fca5a5", fontSize: 14 }}>{p.name}</div>
                    <div style={{ color: "#ef4444", fontSize: 11 }}>
                      🟥 Fouled out ({fouls[jersey] || 5}F)
                      {fouloutInfo[jersey] && (
                        <span style={{ color: "#fca5a5", marginLeft: 6 }}>
                          · out {fmt(Math.max(0, gameSecs - fouloutInfo[jersey].startSecs))}
                        </span>
                      )}
                    </div>
                  </div>
                  <button onClick={() => undoFoulOut(jersey)}
                    title="Undo foul-out (reverts to 4 fouls)"
                    style={{ background: "#334155", border: "1px solid #475569", color: "#e2e8f0", borderRadius: 8, padding: "6px 10px", cursor: "pointer", fontSize: 12, fontWeight: 700 }}>
                    ↩ Undo
                  </button>
                </div>
              );
            })}
            {[...injured].map(jersey => {
              const p = pObj(jersey);
              if (!p) return null;
              return (
                <div key={jersey} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 10px", borderRadius: 10, marginBottom: 6, background: "#2d2500" }}>
                  <div style={{ width: 34, height: 34, borderRadius: "50%", background: "#78350f", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 12, fontWeight: 700, flexShrink: 0 }}>
                    #{jersey}
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ color: "#fcd34d", fontSize: 14 }}>{p.name}</div>
                    <div style={{ color: "#f59e0b", fontSize: 11 }}>
                      ⚕️ Injured
                      {injuryInfo[jersey] && (
                        <span style={{ color: "#fbbf24", marginLeft: 6 }}>
                          · out {fmt(Math.max(0, gameSecs - injuryInfo[jersey].startSecs))}
                        </span>
                      )}
                    </div>
                  </div>
                  <button onClick={() => clearInjury(jersey)}
                    style={{ background: "#16a34a", border: "none", color: "#fff", borderRadius: 8, padding: "6px 12px", cursor: "pointer", fontSize: 12, fontWeight: 700 }}>
                    Return
                  </button>
                </div>
              );
            })}
          </div>
        )}

        {/* SUB LOG */}
        {subLog.length > 0 && (
          <div style={{ background: "#1e293b", borderRadius: 14, padding: 12, marginBottom: 10 }}>
            <div style={{ color: "#94a3b8", fontSize: 11, fontWeight: 700, letterSpacing: 1, marginBottom: 8 }}>SUB LOG</div>
            {subLog.map((entry, i) => (
              <div key={i} style={{ marginBottom: 8, paddingBottom: 8, borderBottom: i < subLog.length - 1 ? "1px solid #334155" : "none" }}>
                <div style={{
                  color: entry.skipped ? "#94a3b8" : entry.emergency ? "#fb923c" : "#fbbf24",
                  fontSize: 11, fontWeight: 700, marginBottom: 3,
                }}>
                  {entry.skipped ? "⏭ SKIPPED" : entry.emergency ? "⚠️ EMERGENCY" : entry.subs.some(s => !s.out) ? "➕ ADD" : "🔄 SUB"} · H{entry.half} @ {fmt(entry.timeInHalf)}
                </div>
                {entry.skipped ? (
                  <div style={{ fontSize: 12, color: "#64748b", fontStyle: "italic" }}>
                    {entry.reason || "no sub needed"}
                  </div>
                ) : entry.subs.map((s, j) => (
                  <div key={j} style={{ fontSize: 12, color: "#cbd5e1" }}>
                    {s.out ? (
                      <>
                        <span style={{ color: "#f87171" }}>OUT {s.out.name}</span>
                        <span style={{ color: "#64748b" }}> → </span>
                      </>
                    ) : null}
                    <span style={{ color: "#4ade80" }}>{s.out ? "IN" : "➕ ADD"} {s.in?.name ?? "?"}</span>
                  </div>
                ))}
              </div>
            ))}
          </div>
        )}

        {/* GAME OVER */}
        {gameOver && (
          <div style={{ background: "#1e3a8a", borderRadius: 14, padding: 16, textAlign: "center" }}>
            <div style={{ color: "#fbbf24", fontSize: 20, fontWeight: 800, marginBottom: 4 }}>🏆 Full Time!</div>
            <div style={{ color: "#93c5fd", fontSize: 13, marginBottom: 12 }}>Final minutes played:</div>
            {available.map(p => {
              const secs = courtTime(p.jersey);
              const m = Math.floor(secs / 60);
              const s = secs % 60;
              return (
                <div key={p.jersey} style={{ display: "flex", justifyContent: "space-between", color: "#cbd5e1", fontSize: 13, marginBottom: 4, padding: "4px 8px" }}>
                  <span>#{p.jersey} {p.name}</span>
                  <span style={{ color: "#60a5fa", fontWeight: 600 }}>{m}:{s.toString().padStart(2,"0")}</span>
                </div>
              );
            })}
            <button onClick={discardSavedGame} style={{ marginTop: 16, width: "100%", padding: "12px", borderRadius: 12, border: "none", background: "#1d4ed8", color: "#fff", fontSize: 15, fontWeight: 700, cursor: "pointer" }}>
              New Game
            </button>
          </div>
        )}
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
