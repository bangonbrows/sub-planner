      }));
      setStintStart(prev => { const n = { ...prev }; delete n[jersey]; return n; });
      setReplacingJersey(jersey);
    }
    // Reroute plan — pass locally computed targets to avoid stale closure
    const p = pObj(jersey);
    triggerReroute(`#${jersey} ${p?.name || ""} injured`, {
      removeJersey: jersey,
      currentOnCourt: wasOnCourt ? onCourt.filter(j => j !== jersey) : onCourt,
      targetMinutesOverride: nextTargets,
    });
    }); // withActionLock
  }

  // Mark the currently active rotation window (if any) as handled.
  // Called after manual/emergency subs so the window doesn't reappear
  // after the 45s quiet period expires.
  function markActiveWindowHandled() {
    const rosterForCadence = available.length - fouledOut.size - injured.size;
    if (rosterForCadence <= 5) return;
    const schedule = getWindowSchedule(rosterForCadence, halfMins, START_BLOCK_SECS, CLOSE_BLOCK_SECS);
    const activeWindow = schedule.find(w =>
      gameSecs >= w.openSecs && gameSecs <= w.hardLateSecs &&
      !w.isCloser && !handledWindows.has(wKey(rosterForCadence, w.targetSecs))
    );
    if (activeWindow) {
      setHandledWindows(prev => new Set([...prev, wKey(rosterForCadence, activeWindow.targetSecs)]));
    }
  }

  // Manual sub out — take a player off court and open replacement picker
  function manualSubOut(jersey) {
    if (!onCourt.includes(jersey)) return;
    withActionLock(() => {
      pushUndo("Sub out #" + jersey);
      const now = gameSecs;
      setAccumulated(prev => ({
        ...prev,
        [jersey]: (prev[jersey] || 0) + (now - (stintStart[jersey] ?? now)),
      }));
      setStintStart(prev => { const n = { ...prev }; delete n[jersey]; return n; });
      setOffSince(prev => ({ ...prev, [jersey]: now }));
      setOnCourt(prev => prev.filter(j => j !== jersey));
      setActiveMenu(null);
      setBenchMenu(null);
      setReplacingJersey(jersey);
      // Manual sub resets the cooldown, clears pending, marks active window,
      // and adds the player to carousel memory.
      setLastSubTime(now);
      markNearbyWindowHandled();
      setPendingSub(null);
      markActiveWindowHandled();
      setRestedThisHalf(prev => { const next = new Set(prev); next.add(jersey); return next; });
    });
  }

  // Foul add / remove
  function addFoul(jersey) {
    withActionLock(() => {
      const cur = fouls[jersey] || 0;
      if (cur >= 5) return;
      if (cur === 4) {
        // 5th foul — ask BEFORE mutating any state
        const p = PLAYERS_DB.find(pl => pl.jersey === jersey);
        const name = p ? `#${p.jersey} ${p.name}` : `#${jersey}`;
        if (window.confirm(`5th foul for ${name}. Foul out this player?`)) {
          pushUndo("5th foul + foul out #" + jersey);
          setFouls(prev => ({ ...prev, [jersey]: Math.max(prev[jersey] || 0, 5) }));
          _doFoulOut(jersey, { skipUndo: true });
        }
      } else {
        pushUndo("Foul #" + jersey);
        // Use functional updater to avoid stale closure under rapid taps
        setFouls(prev => {
          const c = prev[jersey] || 0;
          if (c >= 4) return prev; // 5th foul handled above with confirm
          return { ...prev, [jersey]: c + 1 };
        });
      }
    });
  }
  function removeFoul(jersey) {
    withActionLock(() => {
      pushUndo("Remove foul #" + jersey);
      setFouls(prev => {
        const cur = prev[jersey] || 0;
        if (cur <= 0) return prev;
        return { ...prev, [jersey]: cur - 1 };
      });
    });
  }

  // Clear injury — reverse the unused portion of the redistribution.
  // If injury was expected to cover `remainingMins` of the player's share and
  // Δ minutes have elapsed, `unusedMins = remainingMins - Δ` is the amount NOT
  // yet consumed by teammates. Pull that back per teammate (unused/N each) and
  // give it to the returning player so they don't need a huge catch-up stint.
  function clearInjury(jersey) {
    if (!injured.has(jersey)) return;
    withActionLock(() => {
      pushUndo("Return #" + jersey);
      const info = injuryInfo[jersey];
      setInjured(prev => { const n = new Set(prev); n.delete(jersey); return n; });
      // Returning player has been resting — add to carousel memory
      setRestedThisHalf(prev => { const next = new Set(prev); next.add(jersey); return next; });
      // Returning player goes to bench: start their bench-stint clock now.
      setOffSince(prev => ({ ...prev, [jersey]: gameSecs }));

      // Build local targets so triggerReroute sees fresh values (not stale closure)
      let nextTargets = { ...adjustedTargetMins };

      if (info && info.remainingMins > 0 && info.others.length > 0) {
        const elapsedMins = Math.max(0, (gameSecs - info.startSecs) / 60);
        const unusedMins = Math.max(0, info.remainingMins - elapsedMins);
        const N = info.others.length;
        const pullBackPerOther = unusedMins / N;

        if (unusedMins > 0) {
          // Give the unused chunk back to the returning player
          nextTargets[jersey] = (nextTargets[jersey] || 0) + unusedMins;
          // Pull the same share back from each teammate who received it
          info.others.forEach(j => {
            nextTargets[j] = Math.max(0, (nextTargets[j] || 0) - pullBackPerOther);
          });
          setAdjustedTargetMins(nextTargets);
        }
      }

      setInjuryInfo(prev => { const n = { ...prev }; delete n[jersey]; return n; });
      // Reroute with locally computed targets — avoids stale closure
      if (rotationPlan) {
        setTimeout(() => {
          const p = pObj(jersey);
          triggerReroute(`#${jersey} ${p?.name || ""} returned from injury`, {
            addJersey: jersey,
            targetMinutesOverride: nextTargets,
          });
        }, 0);
      }
    });
  }

  // Undo foul-out — restore player to bench, drop foul count to 4, and roll back
  // the UNUSED portion of their remaining-minutes redistribution (same math as
  // the injury Return path). If the player has been out for most of their share
  // already, little or nothing is clawed back — teammates keep what they earned.
  function undoFoulOut(jersey) {
    if (!fouledOut.has(jersey)) return;
    withActionLock(() => {
      pushUndo("Undo foul-out #" + jersey);
      const info = fouloutInfo[jersey];

      setFouledOut(prev => { const n = new Set(prev); n.delete(jersey); return n; });
      // Returning player has been resting — add to carousel memory
      setRestedThisHalf(prev => { const next = new Set(prev); next.add(jersey); return next; });
      setFouls(prev => ({ ...prev, [jersey]: 4 }));
      setOffSince(prev => ({ ...prev, [jersey]: gameSecs }));

      // Build local targets so triggerReroute sees fresh values (not stale closure)
      let nextTargets = { ...adjustedTargetMins };

      if (info && info.remainingMins > 0 && info.others.length > 0) {
        const elapsedMins = Math.max(0, (gameSecs - info.startSecs) / 60);
        const unusedMins = Math.max(0, info.remainingMins - elapsedMins);
        const N = info.others.length;
        const pullBackPerOther = unusedMins / N;

        if (unusedMins > 0) {
          nextTargets[jersey] = (nextTargets[jersey] || 0) + unusedMins;
          info.others.forEach(j => {
            nextTargets[j] = Math.max(0, (nextTargets[j] || 0) - pullBackPerOther);
          });
          setAdjustedTargetMins(nextTargets);
        }
      }

      setFouloutInfo(prev => { const n = { ...prev }; delete n[jersey]; return n; });
      // Reroute with locally computed targets — avoids stale closure
      if (rotationPlan) {
        setTimeout(() => {
          const p = pObj(jersey);
          triggerReroute(`#${jersey} ${p?.name || ""} returned from foul-out`, {
            addJersey: jersey,
            targetMinutesOverride: nextTargets,
          });
        }, 0);
      }
    });
  }

  // Bring someone on as emergency replacement
  function doEmergencyIn(inJersey) {
    if (inJersey === replacingJersey) return; // can't replace yourself
    if (onCourt.includes(inJersey)) return;
    if (onCourt.length >= 5) return;
    if (unavailableJerseys.has(inJersey)) return;
    withActionLock(() => {
      pushUndo("Emergency sub #" + inJersey);
      const now = gameSecs;
      setStintStart(prev => ({ ...prev, [inJersey]: now }));
      setOffSince(prev => { const n = { ...prev }; delete n[inJersey]; return n; });
      setOnCourt(prev => [...prev, inJersey]);
      setSubLog(prev => [...prev, {
        time: now, half, timeInHalf,
        subs: [{ out: pObj(replacingJersey), in: pObj(inJersey) }],
        emergency: true,
      }]);
      setReplacingJersey(null);
      setLastSubTime(now);
      setShortHandedDismissedAt(null); // clear short-handed grace on real sub
      markNearbyWindowHandled();
      setPendingSub(null);
      markActiveWindowHandled();
      // Carousel memory: the incoming player just rested on the bench, so mark
      // them in restedThisHalf to prevent the engine from yo-yoing them right off.
      setRestedThisHalf(prev => { const next = new Set(prev); next.add(inJersey); return next; });
      // Reroute plan to reflect manual lineup override — without this, the plan
      // executor sees court != plan and suggests reverting the coach's decision.
      // Must be inside withActionLock so a double-tap that gets blocked doesn't
      // reroute with the wrong player. Called synchronously (no setTimeout) so
      // React 18 batches setRotationPlan with setOnCourt, preventing a phantom
      // beep from the plan executor seeing a momentary mismatch.
      if (rotationPlan) {
        const newOnCourt = [...onCourt.filter(j => j !== replacingJersey), inJersey];
        triggerReroute("Manual lineup override", { currentOnCourt: newOnCourt });
      }
    });
  }

  // Current events list (plan + dynamically-appended events), sorted by time
  // ── RULE-DRIVEN SUB ENGINE (lookahead + bundled) ──────────────────────────
  // Each tick: evaluate the current state AND project 60 s ahead. If any
  // trigger would fire now OR within the lookahead window, bundle all those
  // subs into a single suggestion so the coach makes one tap instead of three
  // separate stoppages 30 seconds apart.
  //
  // Bundle cap = benchAvail.length (can't sub more players than you have
  // sitting). With 6 players (1 bench) every sub is a straight 1-for-1.
  //
  // Cooldown scales with bench depth (cooldownFor): fewer subs → faster
  // rotations so the single bench player doesn't sit forever.
  //
  // pendingSub shape: { subs: [{ out, in }], reason: string, mandatory: bool }

  // ── Alert: vibrate + beep when a sub suggestion appears ───────────────
  // Reuse a single AudioContext. Resume it before every beep because
  // mobile browsers suspend it after inactivity or between games.
  const audioCtxRef = useRef(null);
  const getAudioCtx = () => {
    if (!audioCtxRef.current || audioCtxRef.current.state === "closed") {
      try { audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)(); }
      catch (e) { /* audio not available */ }
    }
    return audioCtxRef.current;
  };
  // Warm up the AudioContext on any user tap (required by mobile browsers).
  // Re-listen after each game reset so the context stays alive.
  useEffect(() => {
    const warmUp = () => {
      const ctx = getAudioCtx();
      if (ctx && ctx.state === "suspended") ctx.resume();
    };
    document.addEventListener("touchstart", warmUp);
    document.addEventListener("click", warmUp);
    return () => {
      document.removeEventListener("touchstart", warmUp);
      document.removeEventListener("click", warmUp);
    };
  }, []);

  // ── WAKE LOCK ──────────────────────────────────────────────────────────────
  // Keep the phone screen on while the coach is on the game screen. iOS Safari
  // drops the lock when the tab backgrounds, so we re-request on visibilitychange.
  // Released automatically when the coach leaves the game screen or the game ends.
  const wakeLockRef = useRef(null);
  useEffect(() => {
    let cancelled = false;
    const requestWakeLock = async () => {
      if (!("wakeLock" in navigator)) return;
      try {
        const lock = await navigator.wakeLock.request("screen");
        // If the effect was already cleaned up while we were awaiting, release
        // the lock immediately so we don't leak it across screen changes.
        if (cancelled) { lock.release().catch(() => {}); return; }
        // If a prior request resolved while this one was pending (e.g. rapid
        // visibilitychange), release the older lock before overwriting the ref
        // so it doesn't get orphaned and leak.
        if (wakeLockRef.current && wakeLockRef.current !== lock) {
          wakeLockRef.current.release().catch(() => {});
        }
        wakeLockRef.current = lock;
      } catch (e) { /* unsupported, no permission, or page hidden */ }
    };
    const releaseWakeLock = () => {
      if (wakeLockRef.current) {
        wakeLockRef.current.release().catch(() => {});
        wakeLockRef.current = null;
      }
    };
    const onGameScreen = screen === "game" && !gameOver;
    if (onGameScreen) {
      requestWakeLock();
      const onVisChange = () => {
        if (document.visibilityState === "visible") requestWakeLock();
      };
      document.addEventListener("visibilitychange", onVisChange);
      return () => {
        cancelled = true;
        document.removeEventListener("visibilitychange", onVisChange);
        releaseWakeLock();
      };
    }
    releaseWakeLock();
    return () => { cancelled = true; };
  }, [screen, gameOver]);

  const notifySub = () => {
    // Vibrate (Android only — not supported on iPhone)
    if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
    // Short beep via reusable AudioContext
    try {
      const ctx = getAudioCtx();
      if (ctx) {
        // Resume if suspended (happens after inactivity / between games)
        if (ctx.state === "suspended") ctx.resume();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 880;
        gain.gain.value = 0.3;
        osc.start();
        osc.stop(ctx.currentTime + 0.25);
      }
    } catch (e) { /* audio not available */ }
  };

  // Track whether a game is currently live (clock has started at least once)
  const gameIsLive = screen === "game" || (gameSecs > 0 && !gameOver);

  // ── CADENCE-FIRST ROTATION ENGINE ──────────────────────────────────────────
  // Architecture:
  //   1. Mandatory triggers (always live, every second): hard stint cap, skill
  //      violation, weakest-3 balance → fire immediately.
  //   2. Window-based fairness rotation: subs fire ONLY at scheduled rotation
  //      windows. Cadence scales inversely with bench size.
  //   3. Closer-restore: dedicated window near end of game.
  //
  // This replaces the old continuous-trigger engine. The coach sees fewer,
  // more predictable stoppages while maintaining fairness.
  // ── PLAN-BASED SUB EXECUTOR ──────────────────────────────────────────────────
  // When rotationPlan exists, this effect drives sub suggestions by comparing
  // the current on-court lineup to the plan's segment at the current gameSecs.
  // It fires at segment boundaries and shows Confirm/Delay/Skip.
  // (lastExecutedSegId / planDelayUntilSecs / delayedSegId are declared earlier
  // alongside the other plan-execution state — see TDZ note above.)

  useEffect(() => {
    if (!rotationPlan || !plan || gameOver || showHalftime || screen !== "game" || replacingJersey != null) return;

    // Don't overwrite a mandatory emergency prompt with a routine plan sub
    if (pendingSub && pendingSub.mandatory) return;

    // Grace period: if coach explicitly chose to play short-handed, suppress plan executor too
    if (shortHandedDismissedAt != null && gameSecs - shortHandedDismissedAt < 60) return;

    // Quiet period: give the coach 30s of silence after every confirmed sub or
    // emergency add. Without this the executor can re-prompt instantly when the
    // player the coach just added doesn't exactly match the plan's intended one.
    const PLAN_QUIET_SECS = 30;
    if (gameSecs - lastSubTime < PLAN_QUIET_SECS) {
      if (pendingSub !== null && !pendingSub.mandatory) setPendingSub(null);
      return;
    }

    const segs = rotationPlan.segments;
    if (!segs || segs.length === 0) return;

    // Find current segment based on gameSecs
    const currentSeg = segs.find(s => gameSecs >= s.startSecs && gameSecs < s.endSecs)
      || segs[segs.length - 1]; // last segment if past end

    if (!currentSeg || !currentSeg.onCourt) return;

    // If we already executed this segment's subs, skip
    if (lastExecutedSegId === currentSeg.id) return;

    // If this segment is delayed, suppress until game clock passes delay threshold
    if (delayedSegId === currentSeg.id && planDelayUntilSecs != null && gameSecs < planDelayUntilSecs) return;
    // Clear expired delay
    if (delayedSegId === currentSeg.id && planDelayUntilSecs != null && gameSecs >= planDelayUntilSecs) {
      setDelayedSegId(null);
      setPlanDelayUntilSecs(null);
    }

    // Check if lineup needs changing
    const plannedSet = new Set(currentSeg.onCourt);
    const currentSet = new Set(onCourt);

    // Find who needs to come in and go out
    const needIn = currentSeg.onCourt.filter(j => !currentSet.has(j));
    const needOut = onCourt.filter(j => !plannedSet.has(j));

    // If lineup already matches plan, mark as executed
    if (needIn.length === 0 && needOut.length === 0) {
      if (lastExecutedSegId !== currentSeg.id) setLastExecutedSegId(currentSeg.id);
      if (pendingSub !== null) setPendingSub(null);
      return;
    }

    // Don't show if currently showing the same suggestion
    if (pendingSub && pendingSub._planSegId === currentSeg.id) return;

    // Build sub pairs: match out/in by position similarity
    const subs = [];
    const outPool = [...needOut];
    const inPool = [...needIn];
    while (outPool.length > 0 && inPool.length > 0) {
      const outJ = outPool.shift();
      const inJ = inPool.shift();
      const outP = available.find(p => p.jersey === outJ);
      const inP = available.find(p => p.jersey === inJ);
      if (outP && inP) subs.push({ out: outP, in: inP });
    }
    // Any remaining in without matching out (shouldn't happen with 5v5)
    for (const inJ of inPool) {
      const inP = available.find(p => p.jersey === inJ);
      if (inP) subs.push({ out: null, in: inP });
    }

    if (subs.length === 0) return;

    // Flag add-only subs (ALL subs must be adds, not just any one)
    const isAddOnly = subs.every(s => !s.out);

    // Determine urgency — at boundary = due, past boundary + 30s = overdue
    const segStart = currentSeg.startSecs;
    const reason = currentSeg.locked
      ? `Planned sub (${currentSeg.lockReason === "close-block" ? "closer" : "opener"})`
      : `Planned rotation @ ${Math.floor(segStart / 60)}:${String(segStart % 60).padStart(2, "0")}`;

    const next = {
      subs,
      reason,
      mandatory: false,
      addOnly: isAddOnly,
      windowTarget: segStart,
      windowSoftLate: segStart + 30,
      windowRoster: available.length,
      _planSegId: currentSeg.id,
      whyDetails: [subs.map(s => {
        if (!s.out) return `Add #${s.in.jersey} ${s.in.name} per plan`;
        return `#${s.out.jersey} ${s.out.name} → #${s.in.jersey} ${s.in.name} per rotation grid`;
      })],
    };

    setPendingSub(next);
    notifySub();
  }, [rotationPlan, gameSecs, onCourt, plan, gameOver, showHalftime, screen, replacingJersey, lastExecutedSegId, delayedSegId, planDelayUntilSecs, pendingSub, shortHandedDismissedAt, lastSubTime]);

  // When plan sub is confirmed, update lastExecutedSegId
  const confirmPlanSub = () => {
    if (pendingSub && pendingSub._planSegId) {
      setLastExecutedSegId(pendingSub._planSegId);
      setDelayedSegId(null);
      setPlanDelayUntilSecs(null);
    }
  };

  // ── EMERGENCY REPAIR: runs regardless of plan-first or reactive mode ──
  // Catches short-handed situations (fewer than 5 on court) when rotationPlan is active.
  useEffect(() => {
    if (!plan || gameOver || showHalftime || screen !== "game" || replacingJersey != null) return;
    if (!rotationPlan) return; // reactive engine handles its own short-handed check
    if (pendingSub && pendingSub.mandatory) return; // already showing an emergency prompt

    const onCourtPlayers = onCourt.map(j => PLAYERS_DB.find(p => p.jersey === j)).filter(Boolean);
    const benchAvail = available.filter(p =>
      !onCourt.includes(p.jersey) && !unavailableJerseys.has(p.jersey));

    // Grace period: if coach explicitly chose to play short-handed, suppress for 60s
    if (shortHandedDismissedAt != null && gameSecs - shortHandedDismissedAt < 60) return;

    if (onCourtPlayers.length < 5 && benchAvail.length > 0) {
      const courtNow = [...onCourtPlayers];
      const hasSkillVio = !meetsSkillRequirements(courtNow);
      const sorted = [...benchAvail].sort((a, b) => {
        if (hasSkillVio) {
          const aFixes = meetsSkillRequirements([...courtNow, a]);
          const bFixes = meetsSkillRequirements([...courtNow, b]);
          if (aFixes !== bFixes) return aFixes ? -1 : 1;
        }
        return b.rating - a.rating;
      });
      const inP = sorted[0];
      setPendingSub({
        subs: [{ out: null, in: inP }],
        reason: "⚠ Add player — fewer than 5 on court",
        mandatory: true,
        addOnly: true,
        whyDetails: [[`Only ${onCourtPlayers.length} on court, need 5`, `Best available: #${inP.jersey} ${inP.name}`]],
      });
      notifySub();
    }
  }, [rotationPlan, onCourt, available, unavailableJerseys, plan, gameOver, showHalftime, screen, replacingJersey, pendingSub, shortHandedDismissedAt, gameSecs]);

  useEffect(() => {
    if (!plan || gameOver || showHalftime) {
      if (pendingSub !== null) setPendingSub(null);
      return;
    }
    if (screen !== "game") {
      if (pendingSub !== null) setPendingSub(null);
      return;
    }
    // ── BYPASS: When plan-first executor is active, skip reactive engine ──
    if (rotationPlan) return;
    // Suppress while the emergency replacement overlay is open — the coach
    // is already handling a player-off-court event, don't stack suggestions.
    if (replacingJersey != null) {
      if (pendingSub !== null) setPendingSub(null);
      return;
    }

    // For cadence: exclude both fouled-out AND injured (reflects actual bench depth NOW)
    const rosterForCadence = available.length - fouledOut.size - injured.size;

    const config = rosterForCadence > 5 ? getRotationConfig(rosterForCadence) : getRotationConfig(6); // fallback config for mandatory checks
    const inStartBlock = half === 1 && gameSecs < START_BLOCK_SECS;

    const onCourtPlayers = onCourt
      .map(j => PLAYERS_DB.find(p => p.jersey === j))
      .filter(Boolean);
    const benchAvail = available.filter(p =>
      !onCourt.includes(p.jersey) && !unavailableJerseys.has(p.jersey));

    // Even with no bench, check if we're short-handed (fewer than 5 on court)
    if (onCourtPlayers.length === 0) {
      if (pendingSub !== null) setPendingSub(null);
      return;
    }

    const benchCount = benchAvail.length;
    const activePlayers = available.filter(p => !unavailableJerseys.has(p.jersey));
    const weakest3 = weakestThreeJerseys(activePlayers);
    const starterJerseys = new Set((plan?.starting || []).map(p => p.jersey));

    // ── Time helpers ──────────────────────────────────────────────────────
    const stintLen = (j) => stintStart[j] != null ? gameSecs - stintStart[j] : 0;
    const courtSecsOf = (j) => {
      const base = accumulated[j] || 0;
      return stintStart[j] != null ? base + (gameSecs - stintStart[j]) : base;
    };
    // Budget-aware: starters have CLOSE_BLOCK_SECS banked for the closer.
    const effectiveCourtSecs = (j) => {
      const base = courtSecsOf(j);
      return starterJerseys.has(j) ? base + CLOSE_BLOCK_SECS : base;
    };

    // ── Legality helpers ─────────────────────────────────────────────────
    const legalSkillSim = (court, pOut, pIn) => {
      const newOn = court.filter(p => p.jersey !== pOut.jersey).concat([pIn]);
      return meetsSkillRequirements(newOn);
    };
    const legalStrictSim = (court, pOut, pIn) => {
      const newOn = court.filter(p => p.jersey !== pOut.jersey).concat([pIn]);
      return meetsSkillRequirements(newOn) && !violatesWeakestBalance(newOn, weakest3);
    };
    const pickInSim = (court, pOut, bench) => {
      return bench.find(pIn => legalStrictSim(court, pOut, pIn))
        || bench.find(pIn => legalSkillSim(court, pOut, pIn))
        || null; // never fall back to an illegal sub
    };
    // Search all OUT/IN combinations to find the best legal pair.
    // outCandidates should be pre-sorted by priority (longest stint, lowest rating, etc).
    // benchSorted should be pre-sorted by least effective court time.
    const findLegalPair = (court, outCandidates, benchSorted) => {
      // First pass: strict legality (skill + weakest balance)
      for (const out of outCandidates) {
        const inP = benchSorted.find(pIn => legalStrictSim(court, out, pIn));
        if (inP) return { out, in: inP };
      }
      // Second pass: skill-only legality
      for (const out of outCandidates) {
        const inP = benchSorted.find(pIn => legalSkillSim(court, out, pIn));
        if (inP) return { out, in: inP };
      }
      return null;
    };
    // ── Scored global pair selection ──────────────────────────────────
    // Instead of picking OUT first (greedy), evaluate ALL legal (out, in)
    // pairs across court × bench and pick the highest-scored swap. This
    // ensures players like Naisha who can only replace specific court
    // players are found even when greedy selection misses them.
    const scorePair = (court, pOut, pIn, { triggerOut = null } = {}) => {
      // Only evaluate legal swaps
      const strict = legalStrictSim(court, pOut, pIn);
      const loose = !strict && legalSkillSim(court, pOut, pIn);
      if (!strict && !loose) return null;

      let score = 0;
      // IN urgency — how badly pIn needs court time (from benchInScore)
      score += benchInScore(pIn) * 2;
      // OUT merit — longer stint = better candidate to sit
      score += stintLen(pOut.jersey) / 60; // convert to minutes for scale
      // OUT over-pace bonus — if pOut is ahead of pace, pulling them is fine
      const outExpected = fairShareSecs_engine * (gameSecs / Math.max(1, totalGameSecs));
      const outSurplus = courtSecsOf(pOut.jersey) - outExpected;
      if (outSurplus > 0) score += outSurplus / 30;
      // Trigger match bonus — if pOut is specifically the one that caused the trigger
      if (triggerOut && pOut.jersey === triggerOut.jersey) score += 50;
      // Strict legality bonus — prefer swaps that maintain weakest balance
      if (strict) score += 20;
      return score;
    };
    const findBestScoredPair = (court, outCandidates, benchCandidates, opts = {}) => {
      let bestPair = null;
      let bestScore = -Infinity;
      for (const out of outCandidates) {
        for (const inP of benchCandidates) {
          const s = scorePair(court, out, inP, opts);
          if (s !== null && s > bestScore) {
            bestScore = s;
            bestPair = { out, in: inP, score: s };
          }
        }
      }
      return bestPair;
    };

    // Compare two pendingSub objects to avoid useless re-renders.
    const subsEq = (a, b) => {
      if (!a || !b) return false;
      if (a.mandatory !== b.mandatory || a.reason !== b.reason) return false;
      if (a.windowTarget !== b.windowTarget || a.windowSoftLate !== b.windowSoftLate || a.windowRoster !== b.windowRoster) return false;
      if (a.subs.length !== b.subs.length) return false;
      return a.subs.every((s, i) =>
        s.out?.jersey === b.subs[i].out?.jersey && s.in.jersey === b.subs[i].in.jersey);
    };

    // ── "Why this sub?" detail builder ─────────────────────────────────
    const buildWhyDetails = (pairs) => pairs.map(({ out, in: inP, reason }) => {
      const details = [];
      if (out) {
        const outOU = (effectiveCourtSecs(out.jersey) - ((5 * totalGameSecs) / rosterForCadence) * (gameSecs / Math.max(1, totalGameSecs)));
        details.push(`OUT #${out.jersey} ${out.name}: ${(outOU / 60).toFixed(1)}m ${outOU >= 0 ? "over" : "under"} pace, stint ${fmt(stintLen(out.jersey))}`);
      }
      if (inP) {
        const inOU = (courtSecsOf(inP.jersey) - ((5 * totalGameSecs) / rosterForCadence) * (gameSecs / Math.max(1, totalGameSecs)));
        const benchTime = offSince[inP.jersey] != null ? gameSecs - offSince[inP.jersey] : 0;
        details.push(`IN #${inP.jersey} ${inP.name}: ${(inOU / 60).toFixed(1)}m ${inOU >= 0 ? "over" : "under"} pace, benched ${fmt(benchTime)}`);
      }
      if (reason) details.push(`Trigger: ${reason}`);
      return details;
    });

    // ── Bench IN scoring: rank by pace deficit, not raw court time ───────
    // How much time a player can realistically still play. Non-starters
    // won't play during the closer block, and bench players need at least
    // one cadence cycle before they can get back on court.
    const closeStartSecs = totalGameSecs - CLOSE_BLOCK_SECS;
    const remainingGameSecs_engine = totalGameSecs - gameSecs;
    const maxRecoverableSecs = (j) => {
      const remaining = remainingGameSecs_engine;
      if (starterJerseys.has(j)) return remaining;
      // Non-starter: can't count on closer block time
      return Math.max(0, closeStartSecs - gameSecs);
    };
    const fairShareSecs_engine = (5 * totalGameSecs) / rosterForCadence;
    const floorSecs_engine = 0.85 * fairShareSecs_engine;

    // Score a bench player for IN priority. Higher = more urgently needed.
    const benchInScore = (p) => {
      const j = p.jersey;
      const actual = courtSecsOf(j);
      const expectedNow = fairShareSecs_engine * (gameSecs / Math.max(1, totalGameSecs));
      const paceDebt = expectedNow - actual; // positive = behind pace, needs time
      const projectedMax = actual + maxRecoverableSecs(j);

      let score = 0;
      // Primary: how far behind expected pace (bigger = more urgent)
      score += paceDebt;
      // Penalize over-pace players — make them less attractive
      if (paceDebt < 0) score += paceDebt * 2;
      // Floor-risk emergency: player can't reach 85% even playing all remaining time
      if (projectedMax < floorSecs_engine) score += 100000;
      // Floor-risk warning: one more missed cycle creates danger
      else if (projectedMax < floorSecs_engine + config.cadenceSecs) score += 10000;
      // Heavy penalty if already over final target
      if (actual >= fairShareSecs_engine) score -= 10000;
      return score;
    };

    // ── 0. SHORT-HANDED REPAIR: add player when fewer than 5 on court ───
    // Grace period: if coach explicitly chose to play short-handed, suppress for 60s
    if (shortHandedDismissedAt != null && gameSecs - shortHandedDismissedAt < 60) {
      if (pendingSub !== null && pendingSub.addOnly) setPendingSub(null);
      // fall through to mandatory triggers below (skill violations, stint cap still fire)
    } else if (!inStartBlock && onCourtPlayers.length < 5 && benchAvail.length > 0) {
      // Prefer players that fix a skill violation, then by least court time
      const courtNow = [...onCourtPlayers];
      const hasSkillVio = !meetsSkillRequirements(courtNow);
      const sorted = [...benchAvail].sort((a, b) => {
        if (hasSkillVio) {
          const aFixes = meetsSkillRequirements([...courtNow, a]);
          const bFixes = meetsSkillRequirements([...courtNow, b]);
          if (aFixes !== bFixes) return aFixes ? -1 : 1;
        }
        return benchInScore(b) - benchInScore(a); // highest score = most needed
      });
      const inP = sorted[0];
      const next = {
        subs: [{ out: null, in: inP }],
        reason: "⚠ Add player — fewer than 5 on court",
        mandatory: true,
        addOnly: true,
        whyDetails: [[`Only ${onCourtPlayers.length} on court, need 5`, `Best available: #${inP.jersey} ${inP.name}`]],
      };
      if (!subsEq(pendingSub, next)) { setPendingSub(next); notifySub(); }
      return;
    }

    // ── PRE-HALFTIME / PRE-END QUIET ZONE ───────────────────────────────
    // Suppress ALL subs (including mandatory) in the last 180 seconds of
    // each half. At U12, no sub is worth stopping play with 3 minutes left
    // — halftime or the final buzzer resets everything. Only short-handed
    // repair (above) still fires because playing with 4 is an emergency.
    const PRE_BREAK_QUIET_SECS = 180;
    const halfEndSecs = half === 1 ? halfMins * 60 : halfMins * 2 * 60;
    const secsUntilBreak = halfEndSecs - gameSecs;
    if (!inStartBlock && secsUntilBreak <= PRE_BREAK_QUIET_SECS && secsUntilBreak > 0) {
      if (pendingSub !== null) setPendingSub(null);
      return;
    }

    // ── 1. MANDATORY TRIGGERS (always live, every second) ────────────────
    // Note: only all-3-weakest-ON-court is mandatory (too many weak at once).
    // 0-on-court (all weak on bench) is a fairness issue handled at windows.
    if (!inStartBlock) {
      // Exempt starters from hard stint cap during (and 60s before) the closer
      // block — the closer restore is supposed to keep them on court to finish.
      const totalGameSecs = halfMins * 2 * 60;
      const closeStart = totalGameSecs - CLOSE_BLOCK_SECS;
      const nearOrInClose = half === 2 && gameSecs >= closeStart - 60;
      const overStint = onCourtPlayers.filter(p => {
        if (nearOrInClose && starterJerseys.has(p.jersey)) return false;
        return stintLen(p.jersey) >= config.hardStintCapSecs;
      });
      const skillVio = !meetsSkillRequirements(onCourtPlayers);
      const weakVio = violatesWeakestThree(onCourtPlayers, weakest3);

      // Soft-mandatory grace: stint cap and dev balance triggers can wait
      // if we just did a sub within the last 90 seconds. Skill violations
      // and critical triggers always fire immediately.
      const SOFT_MANDATORY_GRACE_SECS = 90;
      const inSoftGrace = gameSecs - lastSubTime < SOFT_MANDATORY_GRACE_SECS;
      const hasHardTrigger = skillVio || weakVio; // skill violation + dev balance always urgent
      const hasSoftTrigger = overStint.length > 0; // only stint cap can be deferred
      if (hasHardTrigger || (hasSoftTrigger && !inSoftGrace)) {
        let simCourt = [...onCourtPlayers];
        let simBench = [...benchAvail];
        const subPairs = [];
        const usedOut = new Set();
        const usedIn = new Set();

        for (let pass = 0; pass < Math.min(3, benchCount); pass++) {
          const osNow = simCourt.filter(p => {
            if (nearOrInClose && starterJerseys.has(p.jersey)) return false;
            return stintLen(p.jersey) >= config.hardStintCapSecs && !usedOut.has(p.jersey);
          });
          const svNow = !meetsSkillRequirements(simCourt);
          const wvNow = violatesWeakestThree(simCourt, weakest3);
          if (osNow.length === 0 && !svNow && !wvNow) break;

          const skip = new Set([...usedOut, ...usedIn]);
          let out = null, reason = "";

          if (osNow.length > 0) {
            out = [...osNow].sort((a, b) => stintLen(b.jersey) - stintLen(a.jersey))[0];
            reason = `Stint cap (${fmt(config.hardStintCapSecs)})`;
          } else if (wvNow) {
            // All 3 weakest are on court — pull the longest-stint one off
            out = [...simCourt]
              .filter(p => weakest3.includes(p.jersey) && !skip.has(p.jersey))
              .sort((a, b) => stintLen(b.jersey) - stintLen(a.jersey))[0];
            reason = "Dev balance (3 weakest on court)";
          } else if (svNow) {
            out = [...simCourt]
              .filter(p => !skip.has(p.jersey))
              .sort((a, b) => a.rating - b.rating)[0];
            reason = "Skill minimums";
          }

          if (!out) break;
          const excluded = new Set([...usedIn, ...usedOut]);
          const freeBench = simBench.filter(p => !excluded.has(p.jersey));
          const sorted = [...freeBench].sort((a, b) => benchInScore(b) - benchInScore(a));
          let inP = pickInSim(simCourt, out, sorted);
          if (!inP) {
            // Out-first failed — use scored global pair selection.
            // Restrict OUT candidates to trigger-fixing players.
            let outCandidates;
            if (osNow.length > 0) {
              outCandidates = osNow.filter(p => !skip.has(p.jersey));
            } else if (wvNow) {
              outCandidates = simCourt.filter(p =>
                weakest3.includes(p.jersey) && !skip.has(p.jersey));
            } else {
              outCandidates = simCourt.filter(p => !skip.has(p.jersey));
            }
            const pair = findBestScoredPair(simCourt, outCandidates, sorted, { triggerOut: out });
            if (!pair) break;
            out = pair.out;
            inP = pair.in;
          }

          subPairs.push({ out, in: inP, reason });
          usedOut.add(out.jersey);
          usedIn.add(inP.jersey);
          simCourt = simCourt.filter(p => p.jersey !== out.jersey).concat([inP]);
          simBench = simBench.filter(p => p.jersey !== inP.jersey).concat([out]);
        }

        if (subPairs.length > 0) {
          const reasons = [...new Set(subPairs.map(s => s.reason))];
          const next = { subs: subPairs, reason: "⚠ " + reasons.join(" + "), mandatory: true, whyDetails: buildWhyDetails(subPairs) };
          if (!subsEq(pendingSub, next)) { setPendingSub(next); notifySub(); }
          return;
        }
      }
    }

    // ── START BLOCK (H1 only): no subs ──────────────────────────────────
    if (inStartBlock) {
      if (pendingSub !== null) setPendingSub(null);
      return;
    }

    // ── H2 START GRACE ZONE ─────────────────────────────────────────────
    // Suppress all non-critical subs in the first 120 seconds of H2.
    // If a sub was needed that early, it should have been handled at halftime.
    const H2_GRACE_SECS = 120;
    const halfStartSecs = halfMins * 60;
    if (half === 2 && (gameSecs - halfStartSecs) < H2_GRACE_SECS) {
      if (pendingSub !== null && !pendingSub.mandatory) setPendingSub(null);
      return;
    }

    // ── NO BENCH: skip fairness windows (mandatory checks already ran above) ─
    if (benchAvail.length === 0 || rosterForCadence <= 5) {
      if (pendingSub !== null) setPendingSub(null);
      return;
    }

    // ── QUIET PERIOD after recent sub ─────────────────────────────────
    // Suppress window-based suggestions for 45s after any manual/confirmed sub
    // to prevent double-prompting the coach. Mandatory triggers above still fire.
    const QUIET_PERIOD_SECS = 45;
    if (gameSecs - lastSubTime < QUIET_PERIOD_SECS) {
      if (pendingSub !== null && !pendingSub.mandatory) setPendingSub(null);
      return;
    }

    // ── 2. WINDOW-BASED ROTATION ────────────────────────────────────────
    const schedule = getWindowSchedule(rosterForCadence, halfMins, START_BLOCK_SECS, CLOSE_BLOCK_SECS);

    // Find the current active window: first unhandled window whose time range
    // includes gameSecs. Expired windows (past hardLateSecs) are simply skipped.
    const activeWindow = schedule.find(w =>
      gameSecs >= w.openSecs &&
      gameSecs <= w.hardLateSecs &&
      !handledWindows.has(wKey(rosterForCadence, w.targetSecs))
    );

    if (!activeWindow) {
      // No active window — rotation stable
      if (pendingSub !== null) setPendingSub(null);
      return;
    }

    // ── 3. CLOSER-RESTORE WINDOW ────────────────────────────────────────
    if (activeWindow.isCloser) {
      let simCourt = [...onCourtPlayers];
      let simBench = [...benchAvail];
      const pairs = [];
      // Closer is a special event — allow ALL non-starters to be swapped off,
      // not limited by normal bundleCap. Ensures all available starters return.
      const closerMax = benchCount;
      for (let pass = 0; pass < closerMax && simBench.length > 0; pass++) {
        const nonStartersOn = simCourt.filter(p => {
          if (starterJerseys.has(p.jersey)) return false;
          // Closer safety: don't pull a non-starter who is below 85% floor
          if (courtSecsOf(p.jersey) < floorSecs_engine) return false;
          return true;
        });
        const startersOff = simBench.filter(p => starterJerseys.has(p.jersey));
        if (nonStartersOn.length === 0 || startersOff.length === 0) break;
        const out = [...nonStartersOn].sort((a, b) => stintLen(b.jersey) - stintLen(a.jersey))[0];
        const sorted = [...startersOff].sort((a, b) => b.rating - a.rating);
        const inP = pickInSim(simCourt, out, sorted);
        if (!inP) break;
        pairs.push({ out, in: inP });
        simCourt = simCourt.filter(p => p.jersey !== out.jersey).concat([inP]);
        simBench = simBench.filter(p => p.jersey !== inP.jersey).concat([out]);
      }
      if (pairs.length === 0) {
        // Starters already on court — auto-handle window
        if (!handledWindows.has(wKey(rosterForCadence, activeWindow.targetSecs))) {
          setHandledWindows(prev => new Set([...prev, wKey(rosterForCadence, activeWindow.targetSecs)]));
        }
        if (pendingSub !== null) setPendingSub(null);
        return;
      }
      // Check if any starters are unavailable (fouled out / injured)
      const unavailableStarters = (plan?.starting || []).filter(p => unavailableJerseys.has(p.jersey));
      // Check if any non-starters were protected from closer due to floor risk
      const protectedPlayers = onCourtPlayers.filter(p =>
        !starterJerseys.has(p.jersey) && courtSecsOf(p.jersey) < floorSecs_engine
      );
      let reason = "Closer: restore starters";
      if (unavailableStarters.length > 0) {
        reason = `Closer: partial restore (${unavailableStarters.map(p => `#${p.jersey}`).join(", ")} unavailable)`;
      }
      if (protectedPlayers.length > 0) {
        reason += ` · ${protectedPlayers.map(p => `#${p.jersey}`).join(", ")} kept on (85% floor)`;
      }
      const next = {
        subs: pairs,
        reason,
        mandatory: true,
        whyDetails: buildWhyDetails(pairs.map(p => ({ ...p, reason: "Closer restore" }))),
        windowTarget: activeWindow.targetSecs,
        windowSoftLate: activeWindow.softLateSecs,
        windowRoster: rosterForCadence,
      };
      if (!subsEq(pendingSub, next)) { setPendingSub(next); notifySub(); }
      return;
    }

    // ── 4. FAIRNESS ROTATION WINDOW ─────────────────────────────────────
    let simCourt = [...onCourtPlayers];
    let simBench = [...benchAvail];
    const subPairs = [];
    const usedOut = new Set();
    const usedIn = new Set();
    const isFirstCycle = activeWindow.isFirstCycle;

    // 85% floor-risk projection: don't bench a player if they can't recover
    // to 85% of fair-share minutes given remaining game time. Only matters in
    // H2 or late H1 when time is actually tight.
    const totalGS = halfMins * 2 * 60;
    const remainingGameSecs = totalGS - gameSecs;
    const fairShareSecs = (5 * totalGS) / rosterForCadence;
    const floorSecs = 0.85 * fairShareSecs;
    const floorRiskApplies = remainingGameSecs < totalGS * 0.55; // kicks in past 45% of game

    for (let pass = 0; pass < Math.min(config.bundleCap, benchCount); pass++) {
      const freeBench = simBench.filter(p => !usedIn.has(p.jersey) && !usedOut.has(p.jersey));
      if (freeBench.length === 0) break;

      const skip = new Set([...usedOut, ...usedIn]);
      // Pick OUT — eligible players who've met minimum stint
      let eligible = simCourt.filter(p => {
        if (skip.has(p.jersey)) return false;
        return stintLen(p.jersey) >= config.minStintSecs;
      });

      // Floor-risk guard: exclude players who can't reach 85% of fair-share
      // if benched now. Uses closer-adjusted remaining time for non-starters.
      if (floorRiskApplies && eligible.length > 1) {
        const safe = eligible.filter(p => {
          const recoverable = maxRecoverableSecs(p.jersey);
          const projected = courtSecsOf(p.jersey) + Math.max(0, recoverable - config.cadenceSecs);
          return projected >= floorSecs_engine;
        });
        // Only apply if we still have someone to sub out
        if (safe.length > 0) eligible = safe;
      }

      if (eligible.length === 0) break;

      // ── SCORED GLOBAL PAIR SELECTION (primary method) ─────────────
      // Evaluate ALL legal (out, in) pairs across eligible × bench and
      // pick the swap that maximises overall fairness. This prevents
      // Swiss-Army-Knife overuse (Lola) and ensures constrained players
      // like Naisha get found even when greedy selection misses them.
      //
      // First-cycle tweak: boost weaker-rated OUT candidates so they
      // rest first, matching the old priority-rest carousel behaviour.
      const benchCandidates = [...freeBench];

      // Build scored pairs with context-aware bonuses
      let bestPair = null;
      let bestScore = -Infinity;
      for (const pOut of eligible) {
        for (const pIn of benchCandidates) {
          const s = scorePair(simCourt, pOut, pIn);
          if (s === null) continue; // illegal swap
          let adjusted = s;
          // First-cycle: prefer resting weaker players first, and avoid
          // pulling back someone who already rested this half (yo-yo guard)
          if (isFirstCycle) {
            if (restedThisHalf.has(pOut.jersey)) adjusted -= 500;
            // Lower-rated OUT = more attractive to rest first
            adjusted += (10 - pOut.rating) * 5;
          }
          // Floor-risk guard on OUT: penalise benching someone who can't
          // recover to 85% floor (already filtered above, but add scoring
          // tiebreak for borderline cases)
          if (floorRiskApplies) {
            const recoverable = maxRecoverableSecs(pOut.jersey);
            const projected = courtSecsOf(pOut.jersey) + Math.max(0, recoverable - config.cadenceSecs);
            if (projected < floorSecs_engine) adjusted -= 50000;
          }
          // Weakest-balance awareness: if all 3 weakest are on bench,
          // boost swaps that bring one in
          const simSet = new Set(simCourt.map(p => p.jersey));
          const weakOnCount = weakest3.filter(j => simSet.has(j)).length;
          if (weakOnCount === 0 && weakest3.length === 3 && weakest3.includes(pIn.jersey)) {
            adjusted += 30;
          }
          if (adjusted > bestScore) {
            bestScore = adjusted;
            bestPair = { out: pOut, in: pIn };
          }
        }
      }

      if (!bestPair) break;
      let { out, in: inP } = bestPair;

      subPairs.push({ out, in: inP });
      usedOut.add(out.jersey);
      usedIn.add(inP.jersey);
      simCourt = simCourt.filter(p => p.jersey !== out.jersey).concat([inP]);
      simBench = simBench.filter(p => p.jersey !== inP.jersey).concat([out]);
    }

    if (subPairs.length === 0) {
      // Window active but no eligible sub (min stint not met, or balanced).
      // Don't auto-handle if we're still in the early-open phase — a player
      // may become eligible by the target time. Only auto-handle once past
      // the target time.
      if (gameSecs >= activeWindow.targetSecs) {
        const k = wKey(rosterForCadence, activeWindow.targetSecs);
        if (!handledWindows.has(k)) {
          setHandledWindows(prev => new Set([...prev, k]));
        }
      }
      if (pendingSub !== null) setPendingSub(null);
      return;
    }

    const next = {
      subs: subPairs,
      reason: `Rotation${isFirstCycle ? " (first cycle)" : ""}`,
      mandatory: false,
      whyDetails: buildWhyDetails(subPairs.map(p => ({ ...p, reason: "Fairness rotation" }))),
      windowTarget: activeWindow.targetSecs,
      windowSoftLate: activeWindow.softLateSecs,
      windowRoster: rosterForCadence,
    };
    if (!subsEq(pendingSub, next)) {
      // Only beep/vibrate when window is due or overdue, not when just opening
      const shouldAlert = gameSecs >= activeWindow.targetSecs;
      setPendingSub(next);
      if (shouldAlert) notifySub();
    }
  }, [plan, gameSecs, half, halfMins, onCourt, available, stintStart, accumulated, offSince,
      unavailableJerseys, showHalftime, gameOver, screen, pendingSub, handledWindows, fouledOut,
      lastSubTime, restedThisHalf, replacingJersey]);

  const benchPlayers = available.filter(
    p => !onCourt.includes(p.jersey) && !unavailableJerseys.has(p.jersey) && p.jersey !== replacingJersey
  );

  // ── DYNAMIC MINUTES DISTRIBUTION ───────────────────────────────────────────
  // Fair share recalculates continuously based on who is still available. Each
  // available player's target = (total court-minutes in game) ÷ (available players),
  // excluding anyone fouled out. Injured players still count (they'll return).
  // "Over/under" = actual court-time minus the pace they SHOULD be on at gameSecs.
  const activeCount = Math.max(1, available.length - fouledOut.size);
  const liveTargetSecs = (totalGameSecs * 5) / activeCount; // per-player total target, seconds
  const liveTargetMins = Math.round((liveTargetSecs / 60) * 10) / 10;
  // Per-player target (respects injury redistribution / foul-out adjustments).
  // Falls back to the pure fair-share number if nothing has been adjusted yet.
  function targetMinsFor(jersey) {
    const adj = adjustedTargetMins[jersey];
    if (typeof adj === "number") return adj;
    const base = plan?.targetMins?.[jersey];
    if (typeof base === "number") return base;
    return liveTargetMins;
  }
  // Ideal accumulated court-time for THIS player at gameSecs, given their target
  function paceFor(jersey) {
    return targetMinsFor(jersey) * 60 * (gameSecs / Math.max(1, totalGameSecs));
  }
  function overUnderSecs(jersey) {
    return courtTime(jersey) - paceFor(jersey);
  }

  const pObj = (jersey) => PLAYERS_DB.find(p => p.jersey === jersey);

  // ── SCORE HELPERS ──────────────────────────────────────────────────────────
  function addScore(team, pts) {
    withActionLock(() => {
      pushUndo(`+${pts} ${team}`);
      if (team === "us") setScoreUs(prev => prev + pts);
      else setScoreOpponent(prev => prev + pts);
    });
  }
  function undoScore(team) {
    withActionLock(() => {
      if (team === "us" && scoreUs > 0) { pushUndo("Undo score us"); setScoreUs(prev => Math.max(0, prev - 1)); }
      if (team === "opp" && scoreOpponent > 0) { pushUndo("Undo score opp"); setScoreOpponent(prev => Math.max(0, prev - 1)); }
    });
  }

  // ── TIMEOUT HELPERS ────────────────────────────────────────────────────────
  function useTimeout(team) {
    withActionLock(() => {
      pushUndo("Timeout " + team);
      if (team === "us") setTimeoutsUs(prev => prev + 1);
      else setTimeoutsOpponent(prev => prev + 1);
      setRunning(false); // pause clock on timeout
      setSubLog(prev => [...prev, {
        time: gameSecs, half, timeInHalf,
        timeout: true,
        team: team === "us" ? "Roadies" : "Opponent",
      }]);
      // Dismiss matching planned timeout reminder
      const currentGameMin = Math.floor(gameSecs / 60);
      if (plannedTimeouts.has(currentGameMin)) {
        setDismissedTimeouts(prev => new Set([...prev, currentGameMin]));
      }
    });
  }

  // ── SETUP SCREEN ────────────────────────────────────────────────────────────
  if (screen === "setup") return (
    <div style={{ minHeight: "100vh", backgroundColor: "#0f172a", padding: "16px", fontFamily: "system-ui, sans-serif" }}>
      <div style={{ maxWidth: 400, margin: "0 auto" }}>
        <div style={{ background: "linear-gradient(135deg,#1e3a8a,#1d4ed8)", borderRadius: 20, padding: "20px 20px 16px", marginBottom: 16, textAlign: "center" }}>
          <div style={{ display: "flex", justifyContent: "center", marginBottom: 10 }}>
            <CoachKLogo size={88} />
          </div>
          <div style={{ color: "#fff", fontSize: 16, fontWeight: 700, letterSpacing: 0.3 }}>Coach K Sub Planner</div>
          <div style={{ color: "#93c5fd", fontSize: 11, marginTop: 2 }}>Roadies 005</div>
        </div>

        {hasSavedGame && (
          <div style={{ background: "#422006", border: "1px solid #f59e0b", borderRadius: 16, padding: 14, marginBottom: 12 }}>
            <div style={{ color: "#fbbf24", fontSize: 12, fontWeight: 700, letterSpacing: 1, marginBottom: 6 }}>⚠ SAVED GAME FOUND</div>
            <div style={{ color: "#fde68a", fontSize: 13, marginBottom: 10 }}>
              A game is in progress. Tap Resume to jump back into it (clock stays paused), or discard to start fresh.
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={() => { setConfirmDiscard(false); setScreen("game"); }}
                style={{ flex: 1, padding: "10px", borderRadius: 10, border: "none", background: "#22c55e", color: "#052e16", fontSize: 14, fontWeight: 700, cursor: "pointer" }}>
                ▶ Resume Game
              </button>
              <button
                onClick={() => {
                  if (confirmDiscard) {
                    discardSavedGame();
                    setConfirmDiscard(false);
                  } else {
                    setConfirmDiscard(true);
                  }
                }}
                style={{
                  flex: 1, padding: "10px", borderRadius: 10, border: "none",
                  background: confirmDiscard ? "#dc2626" : "#7f1d1d",
                  color: "#fff", fontSize: 14, fontWeight: 700, cursor: "pointer",
                }}>
                {confirmDiscard ? "⚠ Tap again to confirm" : "🗑 Discard"}
              </button>
            </div>
            {confirmDiscard && (
              <button onClick={() => setConfirmDiscard(false)}
                style={{ marginTop: 8, width: "100%", padding: "6px", borderRadius: 8, border: "none", background: "#334155", color: "#cbd5e1", fontSize: 12, cursor: "pointer" }}>
                Cancel
              </button>
            )}
          </div>
        )}

        <div style={{ background: "#1e293b", borderRadius: 16, padding: 16, marginBottom: 12 }}>
          <div style={{ color: "#94a3b8", fontSize: 12, fontWeight: 700, marginBottom: 10, letterSpacing: 1 }}>HALF DURATION</div>
          <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
            <button onClick={() => setHalfMins(m => Math.max(5, m - 5))}
              style={{ width: 44, height: 44, borderRadius: "50%", background: "#334155", border: "none", color: "#fff", fontSize: 22, cursor: "pointer" }}>−</button>
            <div style={{ flex: 1, textAlign: "center" }}>
              <span style={{ color: "#fff", fontSize: 32, fontWeight: 800 }}>{halfMins}</span>
              <span style={{ color: "#64748b", fontSize: 16 }}> min halves</span>
              <div style={{ color: "#64748b", fontSize: 12 }}>Total: {halfMins * 2} min game</div>
            </div>
            <button onClick={() => setHalfMins(m => m + 5)}
              style={{ width: 44, height: 44, borderRadius: "50%", background: "#334155", border: "none", color: "#fff", fontSize: 22, cursor: "pointer" }}>+</button>
          </div>
        </div>

        <div style={{ background: "#1e293b", borderRadius: 16, padding: 16, marginBottom: 12 }}>
          <div style={{ color: "#94a3b8", fontSize: 12, fontWeight: 700, marginBottom: 10, letterSpacing: 1 }}>GAME OPTIONS</div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
            <span style={{ color: "#cbd5e1", fontSize: 13 }}>Score & timeout tracking</span>
            <button onClick={() => setShowScorePanel(p => !p)} style={{
              width: 48, height: 26, borderRadius: 13, border: "none", cursor: "pointer",
              background: showScorePanel ? "#3b82f6" : "#475569", position: "relative", transition: "background 0.2s",
            }}>
              <div style={{
                width: 20, height: 20, borderRadius: "50%", background: "#fff", position: "absolute", top: 3,
                left: showScorePanel ? 25 : 3, transition: "left 0.2s",
              }} />
            </button>
          </div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span style={{ color: "#cbd5e1", fontSize: 13 }}>Possession arrow</span>
            <button onClick={() => setShowPossessionArrow(p => !p)} style={{
              width: 48, height: 26, borderRadius: 13, border: "none", cursor: "pointer",
              background: showPossessionArrow ? "#3b82f6" : "#475569", position: "relative", transition: "background 0.2s",
            }}>
              <div style={{
                width: 20, height: 20, borderRadius: "50%", background: "#fff", position: "absolute", top: 3,
                left: showPossessionArrow ? 25 : 3, transition: "left 0.2s",
              }} />
            </button>
          </div>
        </div>

        <div style={{ background: "#1e293b", borderRadius: 16, padding: 16, marginBottom: 16 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
            <div style={{ color: "#94a3b8", fontSize: 12, fontWeight: 700, letterSpacing: 1 }}>AVAILABLE PLAYERS</div>
            <div style={{ color: "#60a5fa", fontSize: 13, fontWeight: 600 }}>{selected.size} selected</div>
          </div>
          {PLAYERS_DB.map(p => {
            const isOn = selected.has(p.jersey);
            return (
              <div key={p.jersey} onClick={() => togglePlayer(p.jersey)}
                style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 12px", borderRadius: 12, marginBottom: 6, cursor: "pointer",
                  background: isOn ? "#1e3a5f" : "#0f172a", border: `1px solid ${isOn ? "#3b82f6" : "#1e293b"}`, opacity: isOn ? 1 : 0.5 }}>
                <div style={{ width: 36, height: 36, borderRadius: "50%", background: p.color, display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 13, fontWeight: 700, flexShrink: 0 }}>
                  #{p.jersey}
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ color: "#fff", fontSize: 15, fontWeight: 600 }}>{p.name}</div>
                  <div style={{ color: "#64748b", fontSize: 11 }}>
                    {p.skills.join(" · ")}
                  </div>
                </div>
                <div style={{ color: isOn ? "#60a5fa" : "#334155", fontSize: 20 }}>{isOn ? "✓" : "○"}</div>
              </div>
            );
          })}
        </div>

        <button onClick={handlePickStarters} disabled={selected.size < 5}
          style={{ width: "100%", padding: "16px", borderRadius: 16, border: "none", cursor: selected.size >= 5 ? "pointer" : "not-allowed",
            background: selected.size >= 5 ? "linear-gradient(135deg,#1d4ed8,#7c3aed)" : "#334155",
            color: "#fff", fontSize: 17, fontWeight: 700 }}>
          Next: Pick Starting 5 →
        </button>
        {selected.size < 5 && <div style={{ color: "#f87171", textAlign: "center", marginTop: 8, fontSize: 13 }}>Select at least 5 players</div>}
      </div>
    </div>
  );

  // ── START 5 SCREEN ──────────────────────────────────────────────────────────
  if (screen === "start5") return (
    <div style={{ minHeight: "100vh", backgroundColor: "#0f172a", padding: "16px", fontFamily: "system-ui, sans-serif" }}>
      <div style={{ maxWidth: 400, margin: "0 auto" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16 }}>
          <button onClick={() => setScreen("setup")}
            style={{ background: "#334155", border: "none", color: "#fff", borderRadius: 10, padding: "8px 14px", cursor: "pointer", fontSize: 14 }}>← Back</button>
          <div style={{ color: "#fff", fontSize: 18, fontWeight: 700 }}>Pick Starting 5</div>
        </div>

        <div style={{ background: "#1e293b", borderRadius: 16, padding: 16, marginBottom: 12 }}>
          <div style={{ color: "#fbbf24", fontSize: 12, fontWeight: 700, letterSpacing: 1, marginBottom: 4 }}>
            ⭐ STARTING & CLOSING 5
          </div>
          <div style={{ color: "#94a3b8", fontSize: 12, marginBottom: 12 }}>
            These players start the game and finish it. Pick exactly 5.
          </div>
          {available.map(p => {
            const isStarter = starters.has(p.jersey);
            const disabled = !isStarter && starters.size >= 5;
            return (
              <div key={p.jersey} onClick={() => !disabled && toggleStarter(p.jersey)}
                style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 12px", borderRadius: 12, marginBottom: 6,
                  cursor: disabled ? "not-allowed" : "pointer",
                  background: isStarter ? "#422006" : "#0f172a",
                  border: `2px solid ${isStarter ? "#f59e0b" : "#1e293b"}`,
                  opacity: disabled ? 0.35 : 1 }}>
                <div style={{ width: 36, height: 36, borderRadius: "50%", background: p.color, display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 13, fontWeight: 700, flexShrink: 0 }}>
                  #{p.jersey}
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ color: "#fff", fontSize: 15, fontWeight: 600 }}>{p.name}</div>
                  <div style={{ color: "#64748b", fontSize: 11 }}>
                    {p.pos.join(" / ")} · {p.skills.slice(0, 2).join(", ")}
                  </div>
                </div>
                <div style={{ fontSize: 20 }}>{isStarter ? "⭐" : "○"}</div>
              </div>
            );
          })}
        </div>

        {(() => {
          const starterObjs = available.filter(p => starters.has(p.jersey));
          const hardOk = starters.size === 5 && satisfiesHardRules(starterObjs);
          const softWarnings = starters.size === 5 ? checkSoftRules(starterObjs) : [];
          const missingHard = starters.size === 5 && !hardOk
            ? [
                !starterObjs.some(p => p.skills.includes("BallHandle")) ? "BallHandle" : null,
                !starterObjs.some(p => p.skills.includes("Passing")) ? "Passing" : null,
              ].filter(Boolean)
            : [];
          const w3 = weakestThreeJerseys(available);
          const devBalanceWarn = starters.size === 5 && w3.length >= 3 && violatesWeakestThree(starterObjs, w3);
          const canGenerate = starters.size === 5 && hardOk;
          return (
            <>
              {missingHard.length > 0 && (
                <div style={{ background: "#7f1d1d", borderRadius: 10, padding: "8px 12px", marginBottom: 8, color: "#fca5a5", fontSize: 12, fontWeight: 600 }}>
                  ⚠️ Starting 5 needs: {missingHard.join(", ")}
                </div>
              )}
              {softWarnings.length > 0 && missingHard.length === 0 && (
                <div style={{ background: "#78350f", borderRadius: 10, padding: "8px 12px", marginBottom: 8, color: "#fcd34d", fontSize: 12, fontWeight: 600 }}>
                  ⚠️ Soft warning: {softWarnings.join(" / ")}
                </div>
              )}
              {devBalanceWarn && (
                <div style={{ background: "#78350f", borderRadius: 10, padding: "8px 12px", marginBottom: 8, color: "#fcd34d", fontSize: 12, fontWeight: 600 }}>
                  ⚠️ All 3 developing players in the starting 5 — engine can't fix this during the 4-min start lock
                </div>
              )}
              {/* Plan Mode Selector */}
              {starters.size === 5 && (
                <div style={{ background: "#1e293b", borderRadius: 12, padding: 12, marginBottom: 12 }}>
                  <div style={{ color: "#94a3b8", fontSize: 11, fontWeight: 700, letterSpacing: 1, marginBottom: 8 }}>PLAN MODE</div>
                  <div style={{ display: "flex", gap: 6 }}>
                    {[
                      { id: "balanced", label: "Balanced", desc: "Fair time for all" },
                      { id: "competitive", label: "Compete", desc: "Best players, more time" },
                      { id: "development", label: "Develop", desc: "Weaker players get a boost" },
                    ].map(m => (
                      <button key={m.id} onClick={() => setPlanMode(m.id)}
                        style={{ flex: 1, padding: "8px 4px", borderRadius: 10, border: `2px solid ${planMode === m.id ? "#3b82f6" : "#334155"}`,
                          background: planMode === m.id ? "#1e3a8a" : "#0f172a", cursor: "pointer", textAlign: "center" }}>
                        <div style={{ color: planMode === m.id ? "#60a5fa" : "#94a3b8", fontSize: 12, fontWeight: 700 }}>{m.label}</div>
                        <div style={{ color: "#64748b", fontSize: 9, marginTop: 2 }}>{m.desc}</div>
                      </button>
                    ))}
                  </div>
                </div>
              )}
              <button onClick={handleGeneratePlan} disabled={!canGenerate}
                style={{ width: "100%", padding: "16px", borderRadius: 16, border: "none",
                  cursor: canGenerate ? "pointer" : "not-allowed",
                  background: canGenerate ? "linear-gradient(135deg,#1d4ed8,#7c3aed)" : "#334155",
                  color: "#fff", fontSize: 17, fontWeight: 700 }}>
                {starters.size !== 5
                  ? `Select ${5 - starters.size} more player${5 - starters.size !== 1 ? "s" : ""}`
                  : canGenerate ? "Generate Rotation Plan →" : "Fix skill gaps above ↑"}
              </button>
            </>
          );
        })()}
      </div>
    </div>
  );

  // ── PLAN SCREEN (EDITABLE ROTATION GRID) ────────────────────────────────────
  if (screen === "plan") return (
    <div style={{ minHeight: "100vh", backgroundColor: "#0f172a", padding: "16px", fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif", color: "#e2e8f0" }}
      onPointerUp={() => { gridPainting.current = false; }}
      onPointerLeave={() => { gridPainting.current = false; }}>
      <div style={{ maxWidth: 700, margin: "0 auto" }}>
        {/* Header */}
        <h1 style={{ textAlign: "center", fontSize: "1.3rem", marginBottom: 12, color: "#f8fafc" }}>
          🏀 Rotation Planner
        </h1>

        {/* Controls — Row 1: Grid tools */}
        <div style={{ display: "flex", justifyContent: "center", gap: 8, marginBottom: 8, flexWrap: "wrap" }}>
          <button onClick={() => { setSwapSelectedIdx(null); if (gameIsLive) { if (gridHasInvalidRows()) return; syncGridToPlan(); setScreen("game"); } else { setScreen("setup"); } }}
            style={{ background: "#334155", border: "1px solid #475569", color: "#e2e8f0", padding: "6px 14px", borderRadius: 6, cursor: "pointer", fontSize: "0.85rem" }}>
            ← Back
          </button>
          <button onClick={() => {
            if (!editableGrid) return;
            if (!window.confirm("Clear the entire rotation grid?")) return;
            setEditableGrid(editableGrid.map(row => row.map(() => false)));
          }}
            style={{ background: "#334155", border: "1px solid #475569", color: "#e2e8f0", padding: "6px 14px", borderRadius: 6, cursor: "pointer", fontSize: "0.85rem" }}>
            Clear All
          </button>
          <button onClick={() => setGridPaintMode(p => !p)}
            style={{ background: gridPaintMode ? "#2563eb" : "#334155", border: `1px solid ${gridPaintMode ? "#3b82f6" : "#475569"}`, color: "#e2e8f0", padding: "6px 14px", borderRadius: 6, cursor: "pointer", fontSize: "0.85rem" }}>
            Paint: {gridPaintMode ? "ON" : "OFF"}
          </button>
        </div>
        {/* Controls — Row 2: Templates */}
        <div style={{ display: "flex", justifyContent: "center", gap: 8, marginBottom: 16, flexWrap: "wrap" }}>
          <button onClick={() => { setShowSaveDialog(true); setShowLoadDialog(false); }}
            style={{ background: "#065f46", border: "1px solid #059669", color: "#6ee7b7", padding: "6px 14px", borderRadius: 6, cursor: "pointer", fontSize: "0.85rem", fontWeight: 600 }}>
            💾 Save Template
          </button>
          <button onClick={() => { setShowLoadDialog(true); setShowSaveDialog(false); }}
            style={{ background: "#1e3a8a", border: "1px solid #3b82f6", color: "#93c5fd", padding: "6px 14px", borderRadius: 6, cursor: "pointer", fontSize: "0.85rem", fontWeight: 600 }}>
            📂 Load Template
          </button>
          {/* File-backup buttons: durable storage that survives PWA reinstall / origin change. */}
          <button onClick={exportTemplates}
            title="Save a backup file of all templates (pick anywhere — iCloud Drive, OneDrive, etc.)"
            style={{ background: "#3f3f46", border: "1px solid #71717a", color: "#e4e4e7", padding: "6px 14px", borderRadius: 6, cursor: "pointer", fontSize: "0.85rem", fontWeight: 600 }}>
            ⬇ Backup
          </button>
          <button onClick={triggerImport}
            title="Restore templates from a backup file"
            style={{ background: "#3f3f46", border: "1px solid #71717a", color: "#e4e4e7", padding: "6px 14px", borderRadius: 6, cursor: "pointer", fontSize: "0.85rem", fontWeight: 600 }}>
            ⬆ Restore
          </button>
          <input
            ref={fileImportRef}
            type="file"
            accept="application/json,.json"
            style={{ display: "none" }}
            onChange={e => { const f = e.target.files?.[0]; if (f) importTemplatesFromFile(f); }}
          />
          {(() => {
            const matching = getMatchingTemplates();
            if (matching.length === 0) return null;
            return (
              <span style={{ fontSize: "0.75rem", color: "#64748b", alignSelf: "center" }}>
                {matching.length} saved for {gridPlayerOrder.length}p
              </span>
            );
          })()}
        </div>
        {/* Timeout controls */}
        <div style={{ display: "flex", justifyContent: "center", gap: 8, marginBottom: 16, flexWrap: "wrap", alignItems: "center" }}>
          <button onClick={() => setTimeoutRemindersOn(p => !p)}
            style={{ background: timeoutRemindersOn ? "#92400e" : "#334155", border: `1px solid ${timeoutRemindersOn ? "#f59e0b" : "#475569"}`,
              color: timeoutRemindersOn ? "#fbbf24" : "#94a3b8", padding: "6px 14px", borderRadius: 6, cursor: "pointer", fontSize: "0.85rem", fontWeight: 600 }}>
            ⏱ Timeouts: {timeoutRemindersOn ? "ON" : "OFF"}
          </button>
          {plannedTimeouts.size > 0 && (
            <span style={{ fontSize: "0.75rem", color: "#f59e0b" }}>
              {plannedTimeouts.size} planned — tap minute labels to add/remove
            </span>
          )}
          {plannedTimeouts.size === 0 && timeoutRemindersOn && (
            <span style={{ fontSize: "0.75rem", color: "#64748b" }}>
              Tap a minute label on the left to plan a timeout
            </span>
          )}
          {plannedTimeouts.size > 0 && (
            <button onClick={() => setPlannedTimeouts(new Set())}
              style={{ background: "#334155", border: "1px solid #475569", color: "#94a3b8", padding: "4px 10px", borderRadius: 6, cursor: "pointer", fontSize: "0.75rem" }}>
              Clear all
            </button>
          )}
        </div>

        {/* Save Template Dialog */}
        {showSaveDialog && (
          <div style={{ background: "#1e293b", border: "1px solid #334155", borderRadius: 12, padding: 16, marginBottom: 16 }}>
            <div style={{ color: "#e2e8f0", fontSize: 14, fontWeight: 700, marginBottom: 10 }}>Save Rotation Template</div>
            <div style={{ color: "#94a3b8", fontSize: 12, marginBottom: 10 }}>
              {gridPlayerOrder.length} players • {halfMins * 2} min game
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <input
                type="text"
                value={templateNameInput}
                onChange={e => setTemplateNameInput(e.target.value)}
                onKeyDown={e => { if (e.key === "Enter" && templateNameInput.trim()) saveTemplate(templateNameInput); }}
                placeholder="e.g. Standard 8-Player"
                autoFocus
                style={{ flex: 1, padding: "8px 12px", borderRadius: 8, border: "1px solid #475569", background: "#0f172a", color: "#e2e8f0", fontSize: 14, outline: "none" }}
              />
              <button onClick={() => { if (templateNameInput.trim()) saveTemplate(templateNameInput); }}
                disabled={!templateNameInput.trim()}
                style={{ padding: "8px 16px", borderRadius: 8, border: "none", cursor: templateNameInput.trim() ? "pointer" : "not-allowed",
                  background: templateNameInput.trim() ? "#059669" : "#334155", color: "#fff", fontSize: 14, fontWeight: 700 }}>
                Save
              </button>
              <button onClick={() => { setShowSaveDialog(false); setTemplateNameInput(""); }}
                style={{ padding: "8px 12px", borderRadius: 8, border: "1px solid #475569", background: "#334155", color: "#94a3b8", cursor: "pointer", fontSize: 14 }}>
                ✕
              </button>
            </div>
            {/* Show existing templates with same name warning */}
            {templateNameInput.trim() && (() => { const sig = gridPlayerOrder.map(p => p.jersey).sort((a, b) => a - b).join("-"); return savedTemplates.some(t => t.name === templateNameInput.trim() && t.playerCount === gridPlayerOrder.length && t.attendanceSignature === sig); })() && (
              <div style={{ color: "#fbbf24", fontSize: 11, marginTop: 6 }}>
                ⚠ A template with this name exists for this exact roster — saving will replace it
              </div>
            )}
          </div>
        )}

        {/* Load Template Dialog */}
        {showLoadDialog && (
          <div style={{ background: "#1e293b", border: "1px solid #334155", borderRadius: 12, padding: 16, marginBottom: 16 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
              <div style={{ color: "#e2e8f0", fontSize: 14, fontWeight: 700 }}>Load Template</div>
              <button onClick={() => setShowLoadDialog(false)}
                style={{ padding: "4px 10px", borderRadius: 6, border: "1px solid #475569", background: "#334155", color: "#94a3b8", cursor: "pointer", fontSize: 12 }}>
                ✕
              </button>
            </div>
            {/* Matching templates (same player count) */}
            {(() => {
              const matching = getMatchingTemplates();
              const others = savedTemplates.filter(t => t.playerCount !== gridPlayerOrder.length);
              return (
                <>
                  {matching.length > 0 && (
                    <div style={{ marginBottom: others.length > 0 ? 12 : 0 }}>
                      <div style={{ color: "#4ade80", fontSize: 11, fontWeight: 700, marginBottom: 6 }}>
                        ✓ {gridPlayerOrder.length}-PLAYER TEMPLATES
                      </div>
                      {matching.map(t => (
                        <div key={t.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 10px", borderRadius: 8, background: "#0f172a", border: "1px solid #334155", marginBottom: 4, cursor: "pointer" }}
                          onClick={() => loadTemplate(t)}>
                          <div style={{ flex: 1 }}>
                            <div style={{ color: "#e2e8f0", fontSize: 13, fontWeight: 600 }}>{t.name}</div>
                            <div style={{ color: "#64748b", fontSize: 10 }}>{t.playerCount}p • {t.halfMins * 2}m</div>
                          </div>
                          <button onClick={e => { e.stopPropagation(); if (window.confirm(`Delete "${t.name}"?`)) deleteTemplate(t.id); }}
                            style={{ padding: "4px 8px", borderRadius: 4, border: "1px solid #7f1d1d", background: "transparent", color: "#f87171", cursor: "pointer", fontSize: 11 }}>
                            ✕
                          </button>
                        </div>
                      ))}
                    </div>
                  )}
                  {others.length > 0 && (
                    <div>
                      <div style={{ color: "#64748b", fontSize: 11, fontWeight: 700, marginBottom: 6 }}>
                        OTHER TEMPLATES
                      </div>
                      {others.map(t => (
                        <div key={t.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 10px", borderRadius: 8, background: "#0f172a", border: "1px solid #1e293b", marginBottom: 4, opacity: 0.6 }}>
                          <div style={{ flex: 1 }}>
                            <div style={{ color: "#94a3b8", fontSize: 13 }}>{t.name}</div>
                            <div style={{ color: "#475569", fontSize: 10 }}>{t.playerCount}p • {t.halfMins * 2}m</div>
                          </div>
                          <button onClick={e => { e.stopPropagation(); if (window.confirm(`Delete "${t.name}"?`)) deleteTemplate(t.id); }}
                            style={{ padding: "4px 8px", borderRadius: 4, border: "1px solid #7f1d1d", background: "transparent", color: "#f87171", cursor: "pointer", fontSize: 11 }}>
                            ✕
                          </button>
                        </div>
                      ))}
                    </div>
                  )}
                  {matching.length === 0 && others.length === 0 && (
                    <div style={{ color: "#64748b", fontSize: 13, textAlign: "center", padding: "12px 0" }}>
                      No saved templates yet. Paint a rotation and save it.
                    </div>
                  )}
                </>
              );
            })()}
          </div>
        )}

        {/* Toast notification */}
        {templateToast && (
          <div style={{
            position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)",
            background: "#065f46", border: "1px solid #059669", color: "#6ee7b7",
            padding: "10px 20px", borderRadius: 10, fontSize: 14, fontWeight: 600,
            zIndex: 200, boxShadow: "0 4px 12px rgba(0,0,0,0.4)",
          }}>
            {templateToast}
          </div>
        )}

        {/* Grid */}
        {editableGrid && gridPlayerOrder.length > 0 && (() => {
          const totalMins = halfMins * 2;
          const players = gridPlayerOrder;
          const grid = editableGrid;
          // Prefer live adjusted targets (post foul-out / injury redistribution)
          // and fall back to the plan's original targets so the grid display
          // matches what the game screen shows the coach.
          const target = { ...(rotationPlan ? rotationPlan.targetMinutes : {}), ...adjustedTargetMins };

          // Compute per-player totals
          const playerTotals = players.map((p, pIdx) => {
            let total = 0;
            for (let m = 0; m < totalMins; m++) { if (grid[m] && grid[m][pIdx]) total++; }
            return total;
          });

          // Compute per-row court count
          const rowCounts = [];
          for (let m = 0; m < totalMins; m++) {
            rowCounts[m] = grid[m] ? grid[m].filter(Boolean).length : 0;
          }
