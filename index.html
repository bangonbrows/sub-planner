// Minimum skill coverage required on court at all times
// Skills: Scoring, BallHandle, Passing, Interior, Perimeter
const SKILL_MINIMUMS = [
  { skill: "Scoring",    min: 1 },
  { skill: "BallHandle", min: 1 },
  { skill: "Passing",    min: 1 },
  { skill: "Interior",   min: 1 },
  { skill: "Perimeter",  min: 1 },
];

// Short labels + colours for skill badges shown on player cards.
const SKILL_BADGE = {
  Scoring:    { label: "S", color: "#f59e0b" },
  BallHandle: { label: "B", color: "#3b82f6" },
  Passing:    { label: "P", color: "#8b5cf6" },
  Interior:   { label: "R", color: "#ef4444" },
  Perimeter:  { label: "D", color: "#10b981" },
};

function meetsSkillRequirements(lineup) {
  return SKILL_MINIMUMS.every(({ skill, min }) =>
    lineup.filter(p => p.skills.includes(skill)).length >= min
  );
}

// Return the three lowest-rated jerseys from a player pool. The rotation rule:
// no more than 2 of them on court at once (soft — the sub pickers fall back to
// allowing 3 when skill minimums demand it, or when fairness demands it).
function weakestThreeJerseys(players) {
  const sorted = [...players].sort((a, b) => a.rating - b.rating);
  return sorted.slice(0, Math.min(3, sorted.length)).map(p => p.jersey);
}

// True if all three weakest jerseys appear in the lineup (more than 2 on court).
function violatesWeakestThree(lineup, weakest3) {
  if (weakest3.length < 3) return false;
  const setOn = new Set(lineup.map(p => p.jersey));
  return weakest3.every(j => setOn.has(j));
}

// True if the weakest-3 distribution is imbalanced: either all 3 on court
// (too many weak) OR all 3 on bench (too many strong / all weak sitting
// together). A healthy rotation keeps 1 or 2 of the weakest-3 on court at
// all times.
function violatesWeakestBalance(lineup, weakest3) {
  if (weakest3.length < 3) return false;
  const setOn = new Set(lineup.map(p => p.jersey));
  const onCount = weakest3.filter(j => setOn.has(j)).length;
  return onCount === 3 || onCount === 0;
}

// ── Cadence-first rotation engine ───────────────────────────────────────────
// Fairness subs fire ONLY at scheduled rotation windows. Mandatory triggers
// (stint cap, skill violation, all-3-weakest-on-court) stay live every second.
// 0-weakest-on-court is handled at windows only (not mandatory).
// Window cadence scales inversely with bench size: fewer bench = more
// frequent but simpler (1-for-1) subs; more bench = less frequent but
// bundled (2-3 swap) subs. Total coaching load stays roughly constant.
const START_BLOCK_SECS   = 4 * 60; // H1: first 4 min — starters locked, no subs
const CLOSE_BLOCK_SECS   = 4 * 60; // last 4 min of game — starter-restore subs
// Closer cleanup threshold is now computed dynamically inside getWindowSchedule()
// based on config.minStintSecs so that fairness windows too close to the closer
// block are cancelled — preventing players from being subbed in only to be
// immediately pulled out by the closer restore.

// Returns cadence, bundle cap, stint caps, and elastic window bounds for a
// given roster size. This is the foundation of the entire rotation system.
function getRotationConfig(rosterSize) {
  const benchCount = Math.max(0, rosterSize - 5);
  if (benchCount <= 1) return {
    benchCount,
    cadenceSecs: 135,              // 2:15 normal cadence
    firstCycleCadenceSecs: 105,    // 1:45 faster first cycle (everyone gets 1 rest)
    firstCycleCount: 5,            // first 5 windows use fast cadence
    bundleCap: 1,                  // 1 swap per window
    hardStintCapSecs: 11 * 60,     // relaxed — only 1 bench player
    minStintSecs: 90,              // min time on court before pulling
    windowOpenEarlySecs: 15,
    windowSoftLateSecs: 30,
    windowHardLateSecs: 60,
  };
  if (benchCount === 2) return {
    benchCount,
    cadenceSecs: 150,              // 2:30
    firstCycleCadenceSecs: 150,
    firstCycleCount: 0,
    bundleCap: 2,
    hardStintCapSecs: 10 * 60,
    minStintSecs: 2 * 60,
    windowOpenEarlySecs: 20,
    windowSoftLateSecs: 45,
    windowHardLateSecs: 75,
  };
  if (benchCount === 3) return {
    benchCount,
    cadenceSecs: 180,              // 3:00
    firstCycleCadenceSecs: 180,
    firstCycleCount: 0,
    bundleCap: 2,
    hardStintCapSecs: 9 * 60,
    minStintSecs: 150,             // 2:30
    windowOpenEarlySecs: 25,
    windowSoftLateSecs: 60,
    windowHardLateSecs: 90,
  };
  // benchCount >= 4
  return {
    benchCount,
    cadenceSecs: 210,              // 3:30
    firstCycleCadenceSecs: 210,
    firstCycleCount: 0,
    bundleCap: 3,                  // max 3 live swaps (4 only at halftime)
    hardStintCapSecs: 8 * 60,
    minStintSecs: 3 * 60,
    windowOpenEarlySecs: 30,
    windowSoftLateSecs: 75,
    windowHardLateSecs: 120,
  };
}

// Generate rotation window schedule for the full game. Returns an array of
// window objects with timing bounds. Fairness rotation happens ONLY at these
// windows. The closer-restore is the final window.
function getWindowSchedule(rosterSize, halfMins, startBlockSecs, closeBlockSecs) {
  const config = getRotationConfig(rosterSize);
  const totalSecs = halfMins * 2 * 60;
  const halfSecs = halfMins * 60;
  const closeStart = totalSecs - closeBlockSecs;
  // Cancel fairness windows that fall within one minimum stint of the closer
  // block — otherwise players get subbed in then immediately pulled back out.
  const cleanUpThreshold = closeStart - config.minStintSecs;
  const windows = [];

  // ── H1 windows: after start lock, before halftime ──
  // Cancel windows within one minimum stint of halftime to avoid pointless
  // revolving-door subs right before the break.
  const h1CleanUpThreshold = halfSecs - config.minStintSecs;
  let t = startBlockSecs;
  let count = 0;
  while (t < h1CleanUpThreshold) {
    windows.push({
      targetSecs: t,
      openSecs: t - config.windowOpenEarlySecs,
      softLateSecs: t + config.windowSoftLateSecs,
      hardLateSecs: t + config.windowHardLateSecs,
      half: 1,
      isFirstCycle: count < config.firstCycleCount,
    });
    const cad = (count < config.firstCycleCount)
      ? config.firstCycleCadenceSecs
      : config.cadenceSecs;
    t += cad;
    count++;
  }

  // ── H2 windows: after halftime, before closer ──
  const firstH2Cad = (config.firstCycleCount > 0)
    ? config.firstCycleCadenceSecs
    : config.cadenceSecs;
  t = halfSecs + firstH2Cad;
  count = 0;
  while (t < cleanUpThreshold) {
    windows.push({
      targetSecs: t,
      openSecs: t - config.windowOpenEarlySecs,
      softLateSecs: t + config.windowSoftLateSecs,
      hardLateSecs: t + config.windowHardLateSecs,
      half: 2,
      isFirstCycle: count < config.firstCycleCount,
    });
    const cad = (count < config.firstCycleCount)
      ? config.firstCycleCadenceSecs
      : config.cadenceSecs;
    t += cad;
    count++;
  }

  // ── Closer-restore window ──
  windows.push({
    targetSecs: closeStart,
    openSecs: closeStart - 30,
    softLateSecs: closeStart + 30,
    hardLateSecs: closeStart + 60,
    half: 2,
    isCloser: true,
  });

  return windows;
}

function fmt(secs) {
  const m = Math.floor(Math.abs(secs) / 60);
  const s = Math.abs(secs) % 60;
  return `${m}:${s.toString().padStart(2, "0")}`;
}

function pickStarting5(players) {
  const byRating = [...players].sort((a, b) => b.rating - a.rating);
  let on = byRating.slice(0, 5);
  let off = byRating.slice(5);

  // For each skill requirement, keep swapping in bench players until minimum is met
  for (const { skill, min } of SKILL_MINIMUMS) {
    let count = on.filter(p => p.skills.includes(skill)).length;
    while (count < min) {
      const candidate = [...off]
        .filter(p => p.skills.includes(skill))
        .sort((a, b) => b.rating - a.rating)[0];
      if (!candidate) break;
      // Swap out the lowest-rated on-court player who doesn't have this skill
      const out = [...on]
        .filter(p => !p.skills.includes(skill))
        .sort((a, b) => a.rating - b.rating)[0];
      if (!out) break;
      on  = on.filter(p => p.jersey !== out.jersey).concat([candidate]);
      off = off.filter(p => p.jersey !== candidate.jersey).concat([out]);
      count++;
    }
  }

  return on;
}

// ── V3 PLAN-FIRST ROTATION GENERATOR ──────────────────────────────────────
// Replaces the reactive cadence engine. Generates a full rotation grid before
// tip-off. The live engine just follows the plan; reactive logic is demoted
// to emergency-only (injury, foul-out, fewer than 5).

const PLAN_MODES = {
  balanced:    { fairnessWeight: 100, roleWeight: 30, devBoost: 0 },
  competitive: { fairnessWeight: 50,  roleWeight: 90, devBoost: -20 },
  development: { fairnessWeight: 110, roleWeight: 15, devBoost: 25 },
};

// Hard rules: lineup MUST satisfy these or the block is illegal
function satisfiesHardRules(lineup) {
  const has = skill => lineup.some(p => p.skills.includes(skill));
  return has("BallHandle") && has("Passing");
}

// Soft rules: prefer but can bend. Returns array of warning strings.
function checkSoftRules(lineup) {
  const warnings = [];
  if (!lineup.some(p => p.skills.includes("Scoring"))) warnings.push("No scorer");
  if (!lineup.some(p => p.skills.includes("Interior"))) warnings.push("No interior");
  if (!lineup.some(p => p.skills.includes("Perimeter"))) warnings.push("No perimeter D");
  return warnings;
}

// Assign target minutes per player based on roster size and mode.
// Returns { jersey: targetMins }. Uses clean block-compatible numbers.
function assignTargetMinutes(players, starters, mode, halfMins) {
  const n = players.length;
  const totalCourtMins = 5 * halfMins * 2;
  const starterSet = new Set(starters.map(p => p.jersey));

  if (n <= 5) {
    return Object.fromEntries(players.map(p => [p.jersey, halfMins * 2]));
  }

  // Calculate high/low targets that divide cleanly into 2-min blocks
  // totalCourtMins = highCount * highTarget + lowCount * lowTarget
  // highCount + lowCount = n, all on court = 5 per minute
  const slotsPerPlayer = totalCourtMins / n; // e.g. 22.22 for 9 players
  const highTarget = Math.ceil(slotsPerPlayer / 2) * 2; // round up to even
  const lowTarget = highTarget - 2; // always 2 less (one block difference)

  // How many players get the high target?
  // highCount * highTarget + (n - highCount) * lowTarget = totalCourtMins
  // highCount * (highTarget - lowTarget) = totalCourtMins - n * lowTarget
  const highCount = Math.round((totalCourtMins - n * lowTarget) / (highTarget - lowTarget));
  const lowCount = n - highCount;

  // Decide who gets high vs low based on mode
  const sorted = [...players].sort((a, b) => {
    const aStarter = starterSet.has(a.jersey) ? 1 : 0;
    const bStarter = starterSet.has(b.jersey) ? 1 : 0;
    if (mode === "competitive") {
      return (b.rating + bStarter * 2) - (a.rating + aStarter * 2);
    } else if (mode === "development") {
      // Development players get boosted
      const aDev = a.rating <= 2.5 ? 5 : 0;
      const bDev = b.rating <= 2.5 ? 5 : 0;
      return (b.rating + bStarter + bDev) - (a.rating + aStarter + aDev);
    }
    // Balanced: starters get high target
    return (bStarter * 10 + b.rating) - (aStarter * 10 + a.rating);
  });

  const targets = {};
  sorted.forEach((p, i) => {
    targets[p.jersey] = i < highCount ? highTarget : lowTarget;
  });
  return targets;
}

// Build the segment timeline: array of { id, half, startSecs, endSecs, locked }
function buildSegments(rosterSize, halfMins) {
  const segments = [];
  const halfSecs = halfMins * 60;
  const blockSecs = 120; // 2-min internal granularity

  for (let h = 1; h <= 2; h++) {
    const baseOffset = (h - 1) * halfSecs;
    let t = 0;
    while (t < halfSecs) {
      const startSecs = baseOffset + t;
      const endSecs = baseOffset + Math.min(t + blockSecs, halfSecs);
      const isStart = t < START_BLOCK_SECS;
      const isClose = (halfSecs - t) <= CLOSE_BLOCK_SECS && h === 2;
      const isH1Close = t >= (halfSecs - CLOSE_BLOCK_SECS) && h === 1;
      segments.push({
        id: `H${h}-${String(Math.floor(t/60)).padStart(2,"0")}-${String(Math.floor(Math.min(t+blockSecs,halfSecs)/60)).padStart(2,"0")}`,
        half: h,
        startSecs,
        endSecs,
        durationSecs: endSecs - startSecs,
        locked: isStart || isClose || isH1Close,
        lockReason: isStart ? "start-block" : (isClose || isH1Close) ? "close-block" : null,
        onCourt: [],
        warnings: [],
      });
      t += blockSecs;
    }
  }
  return segments;
}

// Generate all C(n, 5) combinations of 5 players from roster
function combinations(arr, k) {
  if (k === 0) return [[]];
  if (arr.length < k) return [];
  const results = [];
  function _combine(start, combo) {
    if (combo.length === k) { results.push([...combo]); return; }
    for (let i = start; i <= arr.length - (k - combo.length); i++) {
      combo.push(arr[i]);
      _combine(i + 1, combo);
      combo.pop();
    }
  }
  _combine(0, []);
  return results;
}

// Score a candidate lineup for a segment during plan generation.
function scoreLineup(lineup, segment, plan, targetMinutes, minutesUsed, mode, prevLineup, starterSet) {
  const weights = PLAN_MODES[mode] || PLAN_MODES.balanced;
  let score = 0;

  // Fairness: prefer players who are furthest below their remaining target
  for (const p of lineup) {
    const remaining = (targetMinutes[p.jersey] || 0) - (minutesUsed[p.jersey] || 0);
    score += remaining * weights.fairnessWeight;
  }

  // Role weight
  if (mode === "competitive") {
    score += lineup.reduce((s, p) => s + p.rating, 0) * weights.roleWeight;
  }
  if (mode === "development") {
    const devCount = lineup.filter(p => p.rating <= 2.5).length;
    score += devCount * weights.devBoost;
  }

  // Stint continuity: penalise heavily to discourage excessive stoppages
  // These must outweigh fairness pulls (fairnessWeight * remaining) to keep lineups stable
  if (prevLineup && prevLineup.length === 5) {
    const prevSet = new Set(prevLineup.map(p => p.jersey));
    const changes = lineup.filter(p => !prevSet.has(p.jersey)).length;
    if (changes === 0) score += 100;  // stability = fewer stoppages = good
    if (changes > 0) score -= 200;   // base stoppage cost per change event
    if (changes >= 3) score -= 300;  // heavy penalty for 3+ swaps at once
    if (changes >= 4) score -= 500;  // extreme penalty for 4+ swaps at once
  }

  // Max consecutive blocks: penalise if any player has been on for many blocks straight
  // (checked via minutesUsed growth — rough proxy)

  // Soft skill bonus
  const softWarnings = checkSoftRules(lineup);
  score += (3 - softWarnings.length) * 10;

  // Starter anchor bonus: prefer at least 1 starter in non-locked blocks
  const starterCount = lineup.filter(p => starterSet.has(p.jersey)).length;
  if (starterCount >= 1) score += 15;

  return score;
}

// ── MAIN PLAN GENERATOR ─────────────────────────────────────────────────
function generateRotationPlan(players, starters, halfMins, mode = "balanced") {
  const n = players.length;
  if (n === 0) return null;
  if (n <= 5) {
    const seg = buildSegments(n, halfMins);
    seg.forEach(s => { s.onCourt = players.map(p => p.jersey); s.locked = true; });
    return {
      mode,
      starters: players.map(p => p.jersey),
      targetMinutes: Object.fromEntries(players.map(p => [p.jersey, halfMins * 2])),
      segments: seg,
      validation: { valid: true, spreadMins: 0, stoppages: 0, warnings: [] },
    };
  }

  const starterSet = new Set(starters.map(p => p.jersey));
  const targetMinutes = assignTargetMinutes(players, starters, mode, halfMins);
  const segments = buildSegments(n, halfMins);
  const minutesUsed = {};
  players.forEach(p => { minutesUsed[p.jersey] = 0; });

  // For 6 players: carousel mode
  if (n === 6) {
    return generateCarouselPlan(players, starters, halfMins, mode, targetMinutes, segments);
  }

  // Pre-compute all legal lineups (C(n,5), filter by hard rules)
  const allLineups = combinations(players, 5).filter(satisfiesHardRules);

  // Step 1: Lock bookend blocks with starters
  const starterLineup = starters.slice(0, 5);
  const starterJerseys = starterLineup.map(p => p.jersey);
  for (const seg of segments) {
    if (seg.locked) {
      seg.onCourt = starterJerseys;
      const dur = seg.durationSecs / 60;
      for (const j of starterJerseys) minutesUsed[j] = (minutesUsed[j] || 0) + dur;
    }
  }

  // Step 2: Greedy fill for unlocked segments
  let prevLineup = starterLineup;
  for (const seg of segments) {
    if (seg.locked) {
      prevLineup = players.filter(p => seg.onCourt.includes(p.jersey));
      continue;
    }

    let bestLineup = null;
    let bestScore = -Infinity;
    for (const lineup of allLineups) {
      const s = scoreLineup(lineup, seg, segments, targetMinutes, minutesUsed, mode, prevLineup, starterSet);
      if (s > bestScore) { bestScore = s; bestLineup = lineup; }
    }

    if (bestLineup) {
      seg.onCourt = bestLineup.map(p => p.jersey);
      seg.warnings = checkSoftRules(bestLineup);
      const dur = seg.durationSecs / 60;
      for (const p of bestLineup) minutesUsed[p.jersey] = (minutesUsed[p.jersey] || 0) + dur;
      prevLineup = bestLineup;
    } else {
      // Fallback: use previous lineup
      seg.onCourt = prevLineup.map(p => p.jersey);
      const dur = seg.durationSecs / 60;
      for (const p of prevLineup) minutesUsed[p.jersey] = (minutesUsed[p.jersey] || 0) + dur;
    }
  }

  // Step 3: Repair pass — swap over/under players to reduce spread
  for (let iter = 0; iter < 200; iter++) {
    let worstOver = null, worstOverDelta = 0;
    let worstUnder = null, worstUnderDelta = 0;
    for (const p of players) {
      const delta = (minutesUsed[p.jersey] || 0) - (targetMinutes[p.jersey] || 0);
      if (delta > worstOverDelta) { worstOver = p; worstOverDelta = delta; }
      if (delta < worstUnderDelta) { worstUnder = p; worstUnderDelta = delta; }
    }
    if (!worstOver || !worstUnder) break;
    if (worstOverDelta - worstUnderDelta <= 2) break; // spread is acceptable

    // Find a segment where we can swap worstOver for worstUnder
    let swapped = false;
    for (const seg of segments) {
      if (seg.locked) continue;
      const has = seg.onCourt.includes(worstOver.jersey);
      const missing = !seg.onCourt.includes(worstUnder.jersey);
      if (!has || !missing) continue;
      // Try the swap
      const newLineup = seg.onCourt.map(j => j === worstOver.jersey ? worstUnder.jersey : j);
      const newPlayers = newLineup.map(j => players.find(p => p.jersey === j));
      if (!satisfiesHardRules(newPlayers)) continue;
      // Apply swap
      const dur = seg.durationSecs / 60;
      minutesUsed[worstOver.jersey] -= dur;
      minutesUsed[worstUnder.jersey] += dur;
      seg.onCourt = newLineup;
      seg.warnings = checkSoftRules(newPlayers);
      swapped = true;
      break;
    }
    if (!swapped) break;
  }

  // Step 4: Validate
  const totals = {};
  players.forEach(p => { totals[p.jersey] = 0; });
  for (const seg of segments) {
    const dur = seg.durationSecs / 60;
    for (const j of seg.onCourt) totals[j] = (totals[j] || 0) + dur;
  }
  const vals = Object.values(totals);
  const spread = Math.round((Math.max(...vals) - Math.min(...vals)) * 10) / 10;
  // Count stoppages (lineup changes between consecutive segments)
  let stoppages = 0;
  for (let i = 1; i < segments.length; i++) {
    if (segments[i].half !== segments[i-1].half) continue; // halftime doesn't count
    const prev = new Set(segments[i-1].onCourt);
    const changes = segments[i].onCourt.filter(j => !prev.has(j)).length;
    if (changes > 0) stoppages++;
  }

  const warnings = [];
  for (const seg of segments) {
    if (seg.warnings.length > 0) warnings.push({ segId: seg.id, warnings: seg.warnings });
  }

  return {
    mode,
    starters: starterJerseys,
    targetMinutes,
    actualMinutes: totals,
    segments,
    validation: { valid: true, spreadMins: spread, stoppages, warnings },
  };
}

// 6-player carousel: one bench player rotates every 2 minutes
function generateCarouselPlan(players, starters, halfMins, mode, targetMinutes, segments) {
  const starterJerseys = starters.map(p => p.jersey);
  const benchPlayer = players.find(p => !starterJerseys.includes(p.jersey));
  if (!benchPlayer) {
    // All 6 are starters somehow — just play everyone
    segments.forEach(s => { s.onCourt = players.slice(0, 5).map(p => p.jersey); });
    return { mode, starters: starterJerseys, targetMinutes,
      actualMinutes: Object.fromEntries(players.map(p => [p.jersey, halfMins * 2])),
      segments, validation: { valid: true, spreadMins: 0, stoppages: 0, warnings: [] } };
  }

  // Build rest order: weakest sits first, strongest sits last
  const restOrder = [...players].sort((a, b) => a.rating - b.rating).map(p => p.jersey);

  // Lock bookend blocks with starters
  const bookendSegs = segments.filter(s => s.locked);
  const middleSegs = segments.filter(s => !s.locked);
  bookendSegs.forEach(s => { s.onCourt = starterJerseys; });

  // Carousel through middle segments
  let restIdx = 0;
  for (const seg of middleSegs) {
    const resting = restOrder[restIdx % restOrder.length];
    seg.onCourt = players.filter(p => p.jersey !== resting).map(p => p.jersey).slice(0, 5);
    restIdx++;
  }

  // Calculate actuals
  const totals = {};
  players.forEach(p => { totals[p.jersey] = 0; });
  for (const seg of segments) {
    const dur = seg.durationSecs / 60;
    for (const j of seg.onCourt) totals[j] = (totals[j] || 0) + dur;
  }
  const vals = Object.values(totals);
  const spread = Math.round((Math.max(...vals) - Math.min(...vals)) * 10) / 10;
  let stoppages = 0;
  for (let i = 1; i < segments.length; i++) {
    if (segments[i].half !== segments[i-1].half) continue;
    const prev = new Set(segments[i-1].onCourt);
    if (segments[i].onCourt.some(j => !prev.has(j))) stoppages++;
  }

  return {
    mode, starters: starterJerseys, targetMinutes, actualMinutes: totals, segments,
    validation: { valid: true, spreadMins: spread, stoppages, warnings: [] },
  };
}

// ── REROUTE: rebuild future plan after mid-game changes ─────────────────
function reroutePlan(currentPlan, gameSecs, activePlayers, actualMinutesPlayed, reason, halfMins, actualOnCourt, targetMinutesOverride) {
  const totalGameSecs = halfMins * 2 * 60;
  const segments = currentPlan.segments;

  // Freeze completed segments + capture partial past for the currently-playing segment.
  // Use <= for the playingSeg lookup so a segment that starts exactly at gameSecs
  // (e.g. the boundary segment created by syncGridToPlan at halfSecs - CLOSE_BLOCK_SECS)
  // is still recognised as the active segment instead of being dropped from the timeline.
  const frozen = segments.filter(s => s.endSecs <= gameSecs).map(s => ({ ...s }));
  const playingSeg = segments.find(s => s.startSecs <= gameSecs && s.endSecs > gameSecs);
  // Only push a frozen partial when there's actual elapsed time inside this segment.
  // (When startSecs === gameSecs, no time has elapsed yet — the segment is fully ahead
  // of us and will be handled by the gap-fix / futureFresh path below.)
  if (playingSeg && playingSeg.startSecs < gameSecs) {
    frozen.push({ ...playingSeg, endSecs: gameSecs, durationSecs: gameSecs - playingSeg.startSecs });
  }
  // Use >= so boundary segments (startSecs === gameSecs) are not lost
  const future = segments.filter(s => s.startSecs >= gameSecs);

  // If no future segments, nothing to do
  if (future.length === 0 && !playingSeg) return currentPlan;

  // Snap to next 2-min boundary for clean regeneration
  const nextBoundary = Math.ceil(gameSecs / 120) * 120;

  // Gap fix: if playingSeg extends past nextBoundary (merged segments can be > 2 min),
  // inject its remainder into future so the solver covers the full timeline.
  if (playingSeg && playingSeg.endSecs > nextBoundary) {
    const alreadyCovers = future.some(s => s.startSecs >= nextBoundary && s.startSecs < playingSeg.endSecs);
    if (!alreadyCovers) {
      future.push({
        ...playingSeg,
        id: `rem-${nextBoundary}`,
        startSecs: nextBoundary,
        endSecs: playingSeg.endSecs,
        durationSecs: playingSeg.endSecs - nextBoundary,
        onCourt: [...playingSeg.onCourt],
        warnings: [],
      });
      future.sort((a, b) => a.startSecs - b.startSecs);
    }
  }

  const futureFresh = future.filter(s => s.startSecs >= nextBoundary).map(s => ({ ...s, onCourt: [...s.onCourt], warnings: [...(s.warnings || [])] }));

  // Build transition segment from ACTUAL on-court lineup, not old plan segment.
  // This ensures the injured/fouled-out player is never in the transition.
  const activeJerseySet = new Set(activePlayers.map(p => p.jersey));
  const transitionOnCourt = actualOnCourt
    ? actualOnCourt.filter(j => activeJerseySet.has(j))
    : (segments.find(s => s.startSecs <= gameSecs && s.endSecs > gameSecs)?.onCourt || []).filter(j => activeJerseySet.has(j));
  const transition = nextBoundary > gameSecs ? {
    id: `transition-${gameSecs}`,
    half: gameSecs < halfMins * 60 ? 1 : 2,
    startSecs: gameSecs,
    endSecs: nextBoundary,
    durationSecs: nextBoundary - gameSecs,
    onCourt: transitionOnCourt,
    locked: true,
    lockReason: "actual-transition",
    warnings: [],
  } : null;

  // Calculate remaining targets
  const remainingCourtSecs = 5 * (totalGameSecs - gameSecs);
  const remainingCourtMins = remainingCourtSecs / 60;
  const remainingTargets = {};
  for (const p of activePlayers) {
    const played = actualMinutesPlayed[p.jersey] || 0;
    const original = (targetMinutesOverride && targetMinutesOverride[p.jersey] != null)
      ? targetMinutesOverride[p.jersey]
      : currentPlan.targetMinutes?.[p.jersey];
    if (original != null) {
      remainingTargets[p.jersey] = Math.max(0, original - played);
    } else {
      // Late arrival: proportional share of remaining
      remainingTargets[p.jersey] = remainingCourtMins / activePlayers.length;
    }
  }

  // Rebuild future segments
  const starterSet = new Set(currentPlan.starters);
  const futureStarters = activePlayers.filter(p => starterSet.has(p.jersey));
  // For future locked (close) blocks, use available starters or best available
  const closers = futureStarters.length >= 5
    ? futureStarters.slice(0, 5)
    : [...futureStarters, ...activePlayers.filter(p => !starterSet.has(p.jersey))].slice(0, 5);

  // Handle fewer than 5 active players — everyone plays every future minute
  if (activePlayers.length < 5) {
    const allJerseys = activePlayers.map(p => p.jersey);
    for (const seg of futureFresh) {
      seg.onCourt = allJerseys;
      seg.warnings = [`Only ${activePlayers.length} active players`];
    }
    const totals = {};
    activePlayers.forEach(p => { totals[p.jersey] = actualMinutesPlayed[p.jersey] || 0; });
    const projSegs = [...(transition ? [transition] : []), ...futureFresh];
    for (const seg of projSegs) {
      const dur = seg.durationSecs / 60;
      for (const j of seg.onCourt) totals[j] = (totals[j] || 0) + dur;
    }
    return {
      ...currentPlan,
      segments: [...frozen, ...(transition ? [transition] : []), ...futureFresh],
      actualMinutes: totals,
      rerouteReason: reason,
      rerouteAtSecs: gameSecs,
    };
  }

  // Exactly 5 active players — they all play every future minute
  if (activePlayers.length === 5) {
    const allJerseys = activePlayers.map(p => p.jersey);
    for (const seg of futureFresh) {
      seg.onCourt = allJerseys;
      seg.warnings = [];
    }
    const totals = {};
    activePlayers.forEach(p => { totals[p.jersey] = actualMinutesPlayed[p.jersey] || 0; });
    const projSegs = [...(transition ? [transition] : []), ...futureFresh];
    for (const seg of projSegs) {
      const dur = seg.durationSecs / 60;
      for (const j of seg.onCourt) totals[j] = (totals[j] || 0) + dur;
    }
    return {
      ...currentPlan,
      segments: [...frozen, ...(transition ? [transition] : []), ...futureFresh],
      actualMinutes: totals,
      rerouteReason: reason,
      rerouteAtSecs: gameSecs,
    };
  }

  let allLineups = combinations(activePlayers, 5).filter(satisfiesHardRules);

  // Fallback: if no hard-legal lineup exists (e.g. key ball-handler + passer both out),
  // use all combinations without hard rules and attach a warning
  let noHardLegalLineup = false;
  if (allLineups.length === 0) {
    allLineups = combinations(activePlayers, 5);
    noHardLegalLineup = true;
  }
  // If still empty (fewer than 5 active players), build best-effort single lineup
  if (allLineups.length === 0) {
    const fallback = activePlayers.slice(0, Math.min(5, activePlayers.length));
    const totals = {};
    activePlayers.forEach(p => { totals[p.jersey] = actualMinutesPlayed[p.jersey] || 0; });
    for (const seg of futureFresh) {
      seg.onCourt = fallback.map(p => p.jersey);
      seg.warnings = ["Fewer than 5 active players"];
      const dur = seg.durationSecs / 60;
      for (const j of seg.onCourt) totals[j] = (totals[j] || 0) + dur;
    }
    return {
      ...currentPlan,
      segments: [...frozen, ...(transition ? [transition] : []), ...futureFresh],
      actualMinutes: totals,
      rerouteReason: reason + " — fewer than 5 active players",
      rerouteAtSecs: gameSecs,
    };
  }

  const minutesUsed = {};
  activePlayers.forEach(p => { minutesUsed[p.jersey] = 0; });

  // Seed solver with transition segment time so it doesn't over-assign court players
  if (transition) {
    const tDur = transition.durationSecs / 60;
    for (const j of transition.onCourt) {
      minutesUsed[j] = (minutesUsed[j] || 0) + tDur;
    }
  }

  // Seed prevLineup from transition or last frozen segment so continuity
  // penalty is enforced across the reroute boundary (prevents mass line changes).
  let prevLineup = null;
  if (transition) {
    prevLineup = activePlayers.filter(p => transition.onCourt.includes(p.jersey));
  } else if (frozen.length > 0) {
    prevLineup = activePlayers.filter(p => frozen[frozen.length - 1].onCourt.includes(p.jersey));
  }
  for (const seg of futureFresh) {
    if (seg.locked && (seg.lockReason === "close-block" || seg.lockReason === "start-block")) {
      // Preserve bookend lineup: closers for close-block, starters for start-block
      const bookendPlayers = seg.lockReason === "close-block" ? closers : futureStarters.length >= 5 ? futureStarters.slice(0, 5) : closers;
      if (bookendPlayers.length > 0) {
        seg.onCourt = bookendPlayers.map(p => p.jersey);
      }
      const dur = seg.durationSecs / 60;
      for (const j of seg.onCourt) minutesUsed[j] = (minutesUsed[j] || 0) + dur;
      prevLineup = bookendPlayers.length > 0 ? bookendPlayers : prevLineup;
      continue;
    }

    let bestLineup = null;
    let bestScore = -Infinity;
    for (const lineup of allLineups) {
      let score = 0;
      for (const p of lineup) {
        score += ((remainingTargets[p.jersey] || 0) - (minutesUsed[p.jersey] || 0)) * 100;
      }
      if (prevLineup) {
        const prevSet = new Set(prevLineup.map(p => p.jersey));
        const changes = lineup.filter(p => !prevSet.has(p.jersey)).length;
        if (changes === 0) score += 100;
        if (changes > 0) score -= 200;
        if (changes >= 3) score -= 300;
        if (changes >= 4) score -= 500;
      }
      if (score > bestScore) { bestScore = score; bestLineup = lineup; }
    }

    if (bestLineup) {
      seg.onCourt = bestLineup.map(p => p.jersey);
      seg.warnings = checkSoftRules(bestLineup);
      if (noHardLegalLineup) {
        seg.warnings = [...(seg.warnings || []), "No BallHandle + Passing lineup available — using best effort"];
      }
      const dur = seg.durationSecs / 60;
      for (const p of bestLineup) minutesUsed[p.jersey] = (minutesUsed[p.jersey] || 0) + dur;
      prevLineup = bestLineup;
    }
    // Unlock previously locked non-close segments for flexibility
    if (seg.locked && seg.lockReason !== "close-block" && seg.lockReason !== "start-block") seg.locked = false;
  }

  // Repair pass
  for (let iter = 0; iter < 100; iter++) {
    let worstOver = null, worstOverDelta = 0;
    let worstUnder = null, worstUnderDelta = 0;
    for (const p of activePlayers) {
      const delta = (minutesUsed[p.jersey] || 0) - (remainingTargets[p.jersey] || 0);
      if (delta > worstOverDelta) { worstOver = p; worstOverDelta = delta; }
      if (delta < worstUnderDelta) { worstUnder = p; worstUnderDelta = delta; }
    }
    if (!worstOver || !worstUnder || worstOverDelta - worstUnderDelta <= 2) break;
    let swapped = false;
    for (const seg of futureFresh) {
      if (seg.locked) continue;
      if (!seg.onCourt.includes(worstOver.jersey) || seg.onCourt.includes(worstUnder.jersey)) continue;
      const newLineup = seg.onCourt.map(j => j === worstOver.jersey ? worstUnder.jersey : j);
      const newPlayers = newLineup.map(j => activePlayers.find(p => p.jersey === j));
      if (!satisfiesHardRules(newPlayers)) continue;
      const dur = seg.durationSecs / 60;
      minutesUsed[worstOver.jersey] -= dur;
      minutesUsed[worstUnder.jersey] += dur;
      seg.onCourt = newLineup;
      seg.warnings = checkSoftRules(newPlayers);
      swapped = true;
      break;
    }
    if (!swapped) break;
  }

  // Recalc actual totals — include transition segment so projections are accurate
  const totals = {};
  activePlayers.forEach(p => { totals[p.jersey] = actualMinutesPlayed[p.jersey] || 0; });
  const projectedSegs = [...(transition ? [transition] : []), ...futureFresh];
  for (const seg of projectedSegs) {
    const dur = seg.durationSecs / 60;
    for (const j of seg.onCourt) totals[j] = (totals[j] || 0) + dur;
  }

  return {
    ...currentPlan,
    segments: [...frozen, ...(transition ? [transition] : []), ...futureFresh],
    actualMinutes: totals,
    rerouteReason: reason,
    rerouteAtSecs: gameSecs,
  };
}

// Legacy wrapper so existing code still works during transition
function generatePlan(players, halfMins, manualStarting5 = null) {
  const starters = manualStarting5 || pickStarting5(players);
  const plan = generateRotationPlan(players, starters, halfMins, "balanced");
  if (!plan) return { starting: [], h1Events: [], h2Events: [], targetMins: {} };
  return {
    starting: players.filter(p => plan.starters.includes(p.jersey)),
    h1Events: [],
    h2Events: [],
    targetMins: Object.fromEntries(
      Object.entries(plan.targetMinutes).map(([j, m]) => [j, Math.round(m * 10) / 10])
    ),
  };
}

function App() {
  const [screen, setScreen] = useState("setup");
  const [halfMins, setHalfMins] = useState(20);
  const [selected, setSelected] = useState(new Set(PLAYERS_DB.map(p => p.jersey)));
  const [starters, setStarters] = useState(new Set());
  const [plan, setPlan] = useState(null);
  const [planMode, setPlanMode] = useState("balanced"); // balanced | competitive | development
  const [rotationPlan, setRotationPlan] = useState(null); // V3 plan-first rotation grid
  const [rerouteBanner, setRerouteBanner] = useState(null); // auto-dismiss reroute notification
  const rerouteBannerTimer = useRef(null);

  // Editable grid state — grid[minuteIdx][playerIdx] = true/false
  // Initialized from rotationPlan segments when plan screen opens
  const [editableGrid, setEditableGrid] = useState(null);
  const [gridPaintMode, setGridPaintMode] = useState(true);
  const gridPainting = useRef(false);
  const gridPaintValue = useRef(true);
  const gridTableRef = useRef(null);
  const gridTouchMoveRef = useRef(null);
  // Attach touchmove as non-passive so preventDefault works on mobile
  // Only re-bind when the grid actually mounts/unmounts (screen change or grid init)
  const gridMounted = editableGrid !== null && screen === "plan";
  useEffect(() => {
    if (!gridMounted) return;
    const node = gridTableRef.current;
    if (!node) return;
    const handler = (e) => { if (gridTouchMoveRef.current) gridTouchMoveRef.current(e); };
    node.addEventListener("touchmove", handler, { passive: false });
    return () => node.removeEventListener("touchmove", handler);
  }, [gridMounted]);
  // Stable player ordering for grid columns (set when grid is initialized)
  const [gridPlayerOrder, setGridPlayerOrder] = useState([]);
  // Column swap: first tap selects, second tap swaps
  const [swapSelectedIdx, setSwapSelectedIdx] = useState(null);

  // Planned timeouts — set of game minutes where coach wants a timeout reminder
  const [plannedTimeouts, setPlannedTimeouts] = useState(new Set());
  const [timeoutRemindersOn, setTimeoutRemindersOn] = useState(true);
  const [dismissedTimeouts, setDismissedTimeouts] = useState(new Set());

  // ── ROTATION TEMPLATES ──────────────────────────────────────────────────────
  // Stored in localStorage. Each template: { name, playerCount, halfMins, grid (2D bool array) }
  const TEMPLATES_KEY = "coachk_rotation_templates";
  // Sanitize templates from localStorage to prevent corrupt data
  function sanitizeTemplates(raw) {
    if (!Array.isArray(raw)) return [];
    return raw.filter(t =>
      t &&
      typeof t.name === "string" &&
      Number.isFinite(t.playerCount) &&
      Array.isArray(t.grid) &&
      t.grid.every(row => Array.isArray(row))
    );
  }
  const [savedTemplates, setSavedTemplates] = useState(() => {
    try {
      const raw = localStorage.getItem(TEMPLATES_KEY);
      return raw ? sanitizeTemplates(JSON.parse(raw)) : [];
    } catch { return []; }
  });
  const [templateNameInput, setTemplateNameInput] = useState("");
  const [showSaveDialog, setShowSaveDialog] = useState(false);
  const [showLoadDialog, setShowLoadDialog] = useState(false);
  const [templateToast, setTemplateToast] = useState(null);

  function persistTemplates(templates) {
    setSavedTemplates(templates);
    try { localStorage.setItem(TEMPLATES_KEY, JSON.stringify(templates)); } catch {}
  }

  function saveTemplate(name) {
    if (!editableGrid || gridPlayerOrder.length === 0 || !name.trim()) return;
    const playerCount = gridPlayerOrder.length;
    const entry = {
      id: Date.now(),
      name: name.trim(),
      playerCount,
      halfMins,
      grid: editableGrid,
      playerOrder: gridPlayerOrder.map(p => p.jersey),
      attendanceSignature: gridPlayerOrder.map(p => p.jersey).sort((a, b) => a - b).join("-"),
      createdAt: new Date().toISOString(),
    };
    // Replace if same name + playerCount + attendanceSignature exists, otherwise add
    const existing = savedTemplates.filter(t => !(t.name === entry.name && t.playerCount === playerCount && t.attendanceSignature === entry.attendanceSignature));
    persistTemplates([...existing, entry]);
    setShowSaveDialog(false);
    setTemplateNameInput("");
    showToast(`Saved "${entry.name}" (${playerCount} players)`);
  }

  function loadTemplate(template) {
    if (!template || !template.grid) return;
    const totalMins = halfMins * 2;
    const playerCount = gridPlayerOrder.length;

    // If template has a saved playerOrder, remap columns to match current gridPlayerOrder
    let grid = template.grid;
    if (Array.isArray(template.playerOrder) && template.playerOrder.length > 0) {
      const templateOrder = template.playerOrder; // jersey array from when template was saved
      const currentOrder = gridPlayerOrder.map(p => p.jersey);
      // Build mapping: templateColIdx -> currentColIdx
      const colMap = templateOrder.map(tj => currentOrder.indexOf(tj));
      grid = grid.map(row => {
        const newRow = new Array(playerCount).fill(false);
        for (let ti = 0; ti < templateOrder.length; ti++) {
          const ci = colMap[ti];
          if (ci >= 0 && ci < playerCount && ti < row.length) {
            newRow[ci] = row[ti];
          }
        }
        return newRow;
      });
    }

    // Template grid might be for different halfMins — scale if needed
    if (grid.length !== totalMins) {
      const scaled = [];
      for (let m = 0; m < totalMins; m++) {
        scaled[m] = m < grid.length ? grid[m].slice(0, playerCount) : new Array(playerCount).fill(false);
      }
      grid = scaled;
    }
    // If player count differs, pad/truncate columns
    if (grid[0] && grid[0].length !== playerCount) {
      grid = grid.map(row => {
        const newRow = new Array(playerCount).fill(false);
        for (let i = 0; i < Math.min(row.length, playerCount); i++) newRow[i] = row[i];
        return newRow;
      });
    }
    setEditableGrid(grid);
    setShowLoadDialog(false);
    showToast(`Loaded "${template.name}"`);
  }

  function deleteTemplate(id) {
    persistTemplates(savedTemplates.filter(t => t.id !== id));
    showToast("Template deleted");
  }

  // ── TEMPLATE BACKUP: export / import as JSON file ──────────────────────────
  // Solves the localStorage-loss problem: PWA reinstall, browser-data clear,
  // and origin change all wipe localStorage. Exporting to a file (which the
  // phone's file picker can place anywhere — iCloud Drive, OneDrive, Google
  // Drive, Files) gives the coach a durable backup that survives anything.
  const fileImportRef = useRef(null);

  function exportTemplates() {
    if (savedTemplates.length === 0) {
      showToast("No templates to back up");
      return;
    }
    const payload = {
      app: "coachk-subplanner",
      kind: "templates",
      schemaVersion: 1,
      exportedAt: new Date().toISOString(),
      templates: savedTemplates,
    };
    try {
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      const d = new Date();
      const stamp = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
      a.href = url;
      a.download = `subplanner-templates-${stamp}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      // Defer URL revoke so the download has a chance to start on slower browsers
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      showToast(`Backed up ${savedTemplates.length} template${savedTemplates.length === 1 ? "" : "s"}`);
    } catch (e) {
      showToast("Backup failed — try again");
    }
  }

  function importTemplatesFromFile(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const text = e.target.result;
        const parsed = JSON.parse(text);
        // Accept either the wrapped payload format OR a bare templates array,
        // so older / hand-edited backups still import cleanly.
        const incomingRaw = Array.isArray(parsed)
          ? parsed
          : Array.isArray(parsed?.templates) ? parsed.templates : null;
        if (!incomingRaw) {
          showToast("File doesn't look like a templates backup");
          return;
        }
        const incoming = sanitizeTemplates(incomingRaw);
        if (incoming.length === 0) {
          showToast("No valid templates found in file");
          return;
        }
        // Merge with existing: dedupe by name+playerCount+attendanceSignature
        // (same key the save flow uses). Incoming wins on conflict so a fresh
        // restore overwrites any matching local entry.
        const incomingKeys = new Set(
          incoming.map(t => `${t.name}|${t.playerCount}|${t.attendanceSignature || ""}`)
        );
        const kept = savedTemplates.filter(t =>
          !incomingKeys.has(`${t.name}|${t.playerCount}|${t.attendanceSignature || ""}`)
        );
        const merged = [...kept, ...incoming];
        persistTemplates(merged);
        const replaced = savedTemplates.length - kept.length;
        const added = incoming.length - replaced;
        const parts = [];
        if (added > 0) parts.push(`${added} added`);
        if (replaced > 0) parts.push(`${replaced} replaced`);
        showToast(`Restored: ${parts.join(", ") || `${incoming.length} templates`}`);
      } catch (err) {
        showToast("Couldn't read file — is it a valid backup?");
      }
    };
    reader.onerror = () => showToast("Failed to read file");
    reader.readAsText(file);
  }

          const next = { ...prev };
          onCourt.forEach(j => {
            next[j] = Math.max(0, (next[j] || 0) - overFlush);
          });
          return next;
        });
        setStintStart(prev => {
          const next = { ...prev };
          onCourt.forEach(j => { next[j] = clamped; });
          return next;
        });
      } else if (clamped < prevSecs) {
        // General rewind (not from full-time): if the clock is moved back past
        // a player's stintStart, snap that stintStart down to the new clock so
        // gameSecs - stintStart never goes negative (which would corrupt
        // accumulated minutes when that player is later subbed out / fouled
        // out / used in a reroute calculation).
        setStintStart(prev => {
          let changed = false;
          const next = { ...prev };
          Object.keys(next).forEach(j => {
            if (next[j] != null && next[j] > clamped) {
              next[j] = clamped;
              changed = true;
            }
          });
          return changed ? next : prev;
        });
      }
      return clamped;
    });
    if (running) {
      clockBaseRef.current = { wallMs: Date.now(), secs: clamped };
    }
  };
  // Delta-based clock adjustment — avoids stale closure when rapid-tapping ±10s.
  // Uses functional updater so each tap sees the result of the previous one.
  const adjustClock = (delta) => {
    setGameSecs(prevSecs => {
      const lower = halftimeDone ? halfMins * 60 : 0;
      const clamped = Math.max(lower, Math.min(totalGameSecs, prevSecs + delta));
      // Full-time rewind correction (same logic as setClockSecs)
      if (prevSecs >= totalGameSecs && clamped < totalGameSecs && onCourt.length > 0) {
        const overFlush = totalGameSecs - clamped;
        setAccumulated(prev => {
          const next = { ...prev };
          onCourt.forEach(j => { next[j] = Math.max(0, (next[j] || 0) - overFlush); });
          return next;
        });
        setStintStart(prev => {
          const next = { ...prev };
          onCourt.forEach(j => { next[j] = clamped; });
          return next;
        });
      } else if (clamped < prevSecs) {
        // General rewind: snap any stintStart that now sits in the future down
        // to the new clock so subsequent stint-duration math stays non-negative.
        // (Without this, rewinding -10s across a recent sub corrupts accumulated
        //  minutes when the sub-in player is later subbed/fouled out.)
        setStintStart(prev => {
          let changed = false;
          const next = { ...prev };
          Object.keys(next).forEach(j => {
            if (next[j] != null && next[j] > clamped) {
              next[j] = clamped;
              changed = true;
            }
          });
          return changed ? next : prev;
        });
      }
      if (running) {
        clockBaseRef.current = { wallMs: Date.now(), secs: clamped };
      }
      return clamped;
    });
  };
  const half = gameSecs < halfMins * 60 ? 1 : 2;
  const timeInHalf = half === 1 ? gameSecs : gameSecs - halfMins * 60;
  const gameOver = gameSecs >= totalGameSecs;

  const unavailableJerseys = useMemo(() => new Set([...fouledOut, ...injured]), [fouledOut, injured]);
  const activeWeakest3 = useMemo(
    () => weakestThreeJerseys(available.filter(p => !unavailableJerseys.has(p.jersey))),
    [available, unavailableJerseys]
  );

  function togglePlayer(jersey) {
    setSelected(prev => {
      const next = new Set(prev);
      next.has(jersey) ? next.delete(jersey) : next.add(jersey);
      return next;
    });
  }

  function handlePickStarters() {
    setStarters(new Set());
    setScreen("start5");
  }

  function toggleStarter(jersey) {
    setStarters(prev => {
      const next = new Set(prev);
      if (next.has(jersey)) { next.delete(jersey); return next; }
      if (next.size >= 5) return prev;
      next.add(jersey);
      return next;
    });
  }

  // Build editable grid from rotation plan segments.
  // Grid is per-minute granularity (each row = 1 game minute).
  // grid[minuteIdx][playerIdx] = boolean (on court).
  function buildEditableGridFromPlan(rp, players) {
    // Guard against malformed plan data
    if (!rp?.segments || !Array.isArray(rp.segments) || !Array.isArray(rp.starters)) {
      return { grid: [], order: players };
    }
    const totalMins = halfMins * 2;
    const grid = [];
    // Sort players: starters first by rating desc, then bench by rating desc
    const order = [...players].sort((a, b) => {
      const aS = rp.starters.includes(a.jersey) ? 0 : 1;
      const bS = rp.starters.includes(b.jersey) ? 0 : 1;
      if (aS !== bS) return aS - bS;
      return b.rating - a.rating;
    });
    for (let m = 0; m < totalMins; m++) {
      const gameSec = m * 60; // start of this minute
      // Find which segment covers this minute
      const seg = rp.segments.find(s => gameSec >= s.startSecs && gameSec < s.endSecs);
      const onCourt = seg ? new Set(seg.onCourt) : new Set();
      grid[m] = order.map(p => onCourt.has(p.jersey));
    }
    return { grid, order };
  }

  // Sync editable grid back into rotationPlan segments.
  // Generates 1-minute segments from the grid, then merges adjacent identical rows
  // into larger segments. This preserves minute-level edits instead of only reading
  // the first minute of each old segment.
  // Returns the synced plan (also sets state) so callers can use it synchronously.
  function syncGridToPlan() {
    if (!editableGrid || !rotationPlan || gridPlayerOrder.length === 0) return null;
    const rp = { ...rotationPlan };
    const totalMins = halfMins * 2;
    const isLive = screen === "game" || (gameSecs > 0 && !gameOver);
    // During live games, preserve completed segments unchanged
    const currentMinBoundary = isLive ? Math.floor(gameSecs / 60) * 60 : 0;

    // Build fresh 1-minute segments from grid, then merge adjacent identical lineups
    // During live games, only rebuild from current minute onward
    const rawSegs = [];
    for (let m = 0; m < Math.min(editableGrid.length, totalMins); m++) {
      if (isLive && m * 60 < currentMinBoundary) continue; // skip completed minutes
      const row = editableGrid[m];
      const onCourt = gridPlayerOrder
        .filter((p, idx) => row[idx])
        .map(p => p.jersey);
      const h = m < halfMins ? 1 : 2;
      rawSegs.push({ startSecs: m * 60, endSecs: (m + 1) * 60, onCourt, half: h });
    }

    // Merge adjacent segments with identical lineups within the same half,
    // but never merge across structural boundaries (start-block, close-block edges)
    const halfSecs = halfMins * 60;
    const boundaries = new Set([
      0, START_BLOCK_SECS,
      halfSecs - CLOSE_BLOCK_SECS, halfSecs,
      halfSecs + START_BLOCK_SECS,
      totalMins * 60 - CLOSE_BLOCK_SECS,
    ]);
    const merged = [];
    for (const seg of rawSegs) {
      const prev = merged[merged.length - 1];
      const crossesBoundary = boundaries.has(seg.startSecs);
      if (prev && !crossesBoundary && prev.half === seg.half &&
          prev.onCourt.length === seg.onCourt.length &&
          prev.onCourt.every((j, i) => j === seg.onCourt[i])) {
        prev.endSecs = seg.endSecs;
        prev.durationSecs = prev.endSecs - prev.startSecs;
      } else {
        merged.push({
          id: `grid-${seg.half}-${seg.startSecs}`,
          half: seg.half,
          startSecs: seg.startSecs,
          endSecs: seg.endSecs,
          durationSecs: seg.endSecs - seg.startSecs,
          onCourt: seg.onCourt,
          locked: seg.startSecs < 4 * 60
            || (seg.startSecs >= (halfMins - 4) * 60 && seg.startSecs < halfMins * 60)
            || (seg.startSecs >= halfMins * 60 && seg.startSecs < (halfMins + 4) * 60)
            || seg.startSecs >= (totalMins - 4) * 60,
          lockReason: (seg.startSecs < 4 * 60 || (seg.startSecs >= halfMins * 60 && seg.startSecs < (halfMins + 4) * 60))
            ? "start-block"
            : ((seg.startSecs >= (halfMins - 4) * 60 && seg.startSecs < halfMins * 60) || seg.startSecs >= (totalMins - 4) * 60)
              ? "close-block"
              : undefined,
          warnings: [],
        });
      }
    }

    // During live games, prepend frozen completed segments from original plan
    if (isLive && currentMinBoundary > 0) {
      const frozenSegs = rotationPlan.segments.filter(s => s.endSecs <= currentMinBoundary);
      // Salvage the partially-completed segment spanning the boundary
      const playingSeg = rotationPlan.segments.find(s => s.startSecs < currentMinBoundary && s.endSecs > currentMinBoundary);
      if (playingSeg) {
        frozenSegs.push({
          ...playingSeg,
          endSecs: currentMinBoundary,
          durationSecs: currentMinBoundary - playingSeg.startSecs,
        });
      }
      rp.segments = [...frozenSegs, ...merged];
    } else {
      rp.segments = merged;
    }
    // Recalc validation from final assembled segments (frozen + merged)
    const totals = {};
    gridPlayerOrder.forEach(p => { totals[p.jersey] = 0; });
    for (const seg of rp.segments) {
      const dur = seg.durationSecs / 60;
      for (const j of seg.onCourt) totals[j] = (totals[j] || 0) + dur;
    }
    const vals = Object.values(totals);
    const spread = vals.length > 0 ? Math.round((Math.max(...vals) - Math.min(...vals)) * 10) / 10 : 0;
    let stoppages = 0;
    for (let i = 1; i < rp.segments.length; i++) {
      if (rp.segments[i].half !== rp.segments[i-1].half) continue;
      const prev = new Set(rp.segments[i-1].onCourt);
      if (rp.segments[i].onCourt.some(j => !prev.has(j))) stoppages++;
    }
    rp.actualMinutes = totals;
    rp.validation = { ...rp.validation, spreadMins: spread, stoppages };
    setRotationPlan(rp);
    // Force plan executor to re-evaluate against the new plan
    if (isLive) {
      setLastExecutedSegId(null);
      setDelayedSegId(null);
      setPlanDelayUntilSecs(null);
      setPendingSub(null);
    }
    // Also update adjusted target display — but NOT mid-game, where injury/foul
    // adjustments would be clobbered by the original plan targets
    if (!isLive) {
      setAdjustedTargetMins(prev => {
        const next = { ...prev };
        gridPlayerOrder.forEach(p => { next[p.jersey] = rp.targetMinutes[p.jersey]; });
        return next;
      });
    }
    return rp;
  }

  function handleGeneratePlan() {
    const manualStarting5 = available.filter(p => starters.has(p.jersey));
    // Generate V3 rotation plan (needed for targets, starters info, etc.)
    const rp = generateRotationPlan(available, manualStarting5, halfMins, planMode);
    setRotationPlan(rp);

    // Build player order (starters first by rating, bench by rating)
    const order = [...available].sort((a, b) => {
      const aS = rp.starters.includes(a.jersey) ? 0 : 1;
      const bS = rp.starters.includes(b.jersey) ? 0 : 1;
      if (aS !== bS) return aS - bS;
      return b.rating - a.rating;
    });
    setGridPlayerOrder(order);

    // Check for saved template matching this exact roster (attendance signature)
    const sig = order.map(p => p.jersey).sort((a, b) => a - b).join("-");
    const matching = savedTemplates.filter(t => {
      if (t.playerCount !== available.length) return false;
      if (!t.attendanceSignature) return false; // reject legacy templates
      if (t.attendanceSignature !== sig) return false;
      return true;
    });
    if (matching.length > 0) {
      // Auto-load the most recent matching template
      const best = matching[matching.length - 1];
      const totalMins = halfMins * 2;
      let grid = best.grid;
      // If template has playerOrder, remap columns to match current order
      if (Array.isArray(best.playerOrder) && best.playerOrder.length > 0) {
        const currentOrder = order.map(p => p.jersey);
        const colMap = best.playerOrder.map(tj => currentOrder.indexOf(tj));
        grid = grid.map(row => {
          const newRow = new Array(available.length).fill(false);
          for (let ti = 0; ti < best.playerOrder.length; ti++) {
            const ci = colMap[ti];
            if (ci >= 0 && ci < available.length && ti < row.length) {
              newRow[ci] = row[ti];
            }
          }
          return newRow;
        });
      }
      // Scale rows if halfMins differs
      if (grid.length !== totalMins) {
        const scaled = [];
        for (let m = 0; m < totalMins; m++) {
          scaled[m] = m < grid.length ? grid[m].slice(0, available.length) : new Array(available.length).fill(false);
        }
        grid = scaled;
      }
      if (grid[0] && grid[0].length !== available.length) {
        grid = grid.map(row => {
          const newRow = new Array(available.length).fill(false);
          for (let i = 0; i < Math.min(row.length, available.length); i++) newRow[i] = row[i];
          return newRow;
        });
      }
      setEditableGrid(grid);
      showToast(`Loaded "${best.name}" template`);
    } else if (rp && rp.segments) {
      // No template — fall back to algorithm-generated grid
      const { grid } = buildEditableGridFromPlan(rp, available);
      setEditableGrid(grid);
    }

    // Legacy plan for backwards compat (rotationPlan is the single source of truth)
    const newPlan = generatePlan(available, halfMins, manualStarting5);
    setPlan(newPlan);
    setAdjustedTargetMins(rp ? { ...Object.fromEntries(
      Object.entries(rp.targetMinutes).map(([j, m]) => [j, Math.round(m * 10) / 10])
    )} : { ...newPlan.targetMins });
    setScreen("plan");
  }

  // Returns true if grid has invalid rows, shows alert. Used by start + mid-game back.
  // During live games with fewer than 5 active players (injuries/foul-outs), allows short-handed rows.
  // During live games, only validates from current minute onward (completed rows are history).
  function gridHasInvalidRows() {
    if (!editableGrid) return false;
    const isLive = screen === "game" || (gameSecs > 0 && !gameOver);
    const activeCount = isLive
      ? Math.min(5, available.length - fouledOut.size - injured.size)
      : 5;
    const requiredCount = isLive ? Math.max(0, activeCount) : 5;
    // During live games, skip already-completed minutes — they're history
    const startRow = isLive ? Math.floor(gameSecs / 60) : 0;
    const invalidRows = editableGrid
      .map((row, idx) => ({ idx, count: row.filter(Boolean).length }))
      .filter(r => r.idx >= startRow && r.count !== requiredCount);
    if (invalidRows.length > 0) {
      alert(
        `Every minute must have exactly ${requiredCount} player${requiredCount !== 1 ? "s" : ""}.\n\n` +
        invalidRows.slice(0, 8)
          .map(r => `Minute ${r.idx + 1}: ${r.count}/${requiredCount}`)
          .join("\n")
      );
      return true;
    }
    return false;
  }

  function handleStartGame() {
    // Validate grid: every row must have exactly 5 players
    if (gridHasInvalidRows()) return;
    // Sync editable grid back into rotationPlan before starting
    const syncedPlan = syncGridToPlan();
    // Use synced plan's first segment lineup if available, fallback to plan.starting
    let courtJerseys;
    const firstSeg = syncedPlan?.segments?.[0] || rotationPlan?.segments?.[0];
    if (firstSeg && firstSeg.onCourt && firstSeg.onCourt.length === 5) {
      courtJerseys = firstSeg.onCourt;
    } else {
      courtJerseys = plan.starting.map(p => p.jersey);
    }
    const acc = {}, stint = {};
    const off = {};
    available.forEach(p => {
      acc[p.jersey] = 0;
      if (courtJerseys.includes(p.jersey)) stint[p.jersey] = 0;
      else off[p.jersey] = 0; // bench-sitting since tip-off
    });
    setOnCourt(courtJerseys);
    setAccumulated(acc);
    setStintStart(stint);
    setOffSince(off);
    setGameSecs(0);
    setRunning(false);
    setHalftimeDone(false);
    setShowHalftime(false);
    setFouledOut(new Set());
    setInjured(new Set());
    setFouls({});
    setActiveMenu(null);
    setBenchMenu(null);
    setReplacingJersey(null);
    // Use V3 plan targets if available, fallback to reactive engine targets
    const targetSource = syncedPlan?.targetMinutes || rotationPlan?.targetMinutes || plan?.targetMins || {};
    setAdjustedTargetMins({ ...targetSource });
    setSubLog([]);
    setLastSubTime(-120);
    setPendingSub(null);
    setHandledWindows(new Set());
    setShortHandedDismissedAt(null); // prevent leak from previous game
    setLastExecutedSegId(null);      // prevent stale executor skip
    setDelayedSegId(null);
    setPlanDelayUntilSecs(null);
    // Seed carousel: bench players have already "rested" relative to starters,
    // so mark them to prevent the first-cycle carousel from pulling them right
    // back off after they enter (especially critical for 6-player / 1-bench).
    const initialBench = available
      .filter(p => !courtJerseys.includes(p.jersey))
      .map(p => p.jersey);
    setRestedThisHalf(new Set(initialBench));
    setScoreUs(0); setScoreOpponent(0);
    setTimeoutsUs(0); setTimeoutsOpponent(0);
    setUndoStack([]);
    setShowWhySub(false);
    setDismissedTimeouts(new Set());
    setScreen("game");
  }

  // Shared H2 lineup computation — used by both the halftime overlay preview
  // and handleStartSecondHalf so the coach sees the actual lineup before tapping.
  function computeSecondHalfLineup() {
    const now = halfMins * 60;
    const unavail = jersey => fouledOut.has(jersey) || injured.has(jersey);

    // Compute end-of-H1 court time per player inline (no state flush needed).
    const endOfH1Court = (jersey) =>
      (accumulated[jersey] || 0) +
      (stintStart[jersey] !== undefined ? now - stintStart[jersey] : 0);
    const underBy = (jersey) => -endOfH1Court(jersey);

    const pool = available
      .filter(p => !unavail(p.jersey))
      .sort((a, b) => underBy(b.jersey) - underBy(a.jersey));

    let courtObjs = pool.slice(0, 5);
    let courtJerseys = courtObjs.map(p => p.jersey);

    // Skill top-up
    for (const { skill, min } of SKILL_MINIMUMS) {
      while (courtObjs.filter(p => p.skills.includes(skill)).length < min) {
        const bench = pool.filter(p => !courtJerseys.includes(p.jersey));
        const candidate = bench.find(p => p.skills.includes(skill));
        if (!candidate) break;
        const outP = [...courtObjs]
          .filter(p => !p.skills.includes(skill))
          .sort((a, b) => underBy(a.jersey) - underBy(b.jersey))[0];
        if (!outP) break;
        courtObjs = courtObjs.filter(p => p.jersey !== outP.jersey).concat([candidate]);
        courtJerseys = courtObjs.map(p => p.jersey);
      }
    }

    // Weakest-three balance
    const activeForWeak = available.filter(p => !unavail(p.jersey));
    const weakest3 = weakestThreeJerseys(activeForWeak);
    const H2_UNDER_PACE_EXEMPT_SECS = 2 * 60;
    // Fair share: each player should have played this much court time by halftime
    const fairShareAtHalf = pool.length > 0 ? (5 * now) / pool.length : 0;
    const underPace = (jersey) => fairShareAtHalf - endOfH1Court(jersey);

    // Symmetric rule: if 0 of weakest-3 on court, swap one in
    if (weakest3.length === 3) {
      const setOnH2 = new Set(courtJerseys);
      const weakOnCount = weakest3.filter(j => setOnH2.has(j)).length;
      if (weakOnCount === 0) {
        const weakBench = pool
          .filter(p => weakest3.includes(p.jersey) && !courtJerseys.includes(p.jersey))
          .sort((a, b) => underBy(b.jersey) - underBy(a.jersey));
        for (const swapIn of weakBench) {
          const strongOn = [...courtObjs]
            .filter(p => !weakest3.includes(p.jersey))
            .sort((a, b) => underBy(a.jersey) - underBy(b.jersey));
          let placed = false;
          for (const swapOut of strongOn) {
            const newOn = courtObjs.filter(p => p.jersey !== swapOut.jersey).concat([swapIn]);
            if (meetsSkillRequirements(newOn)) {
              courtObjs = newOn;
              courtJerseys = courtObjs.map(p => p.jersey);
              placed = true;
              break;
            }
          }
          if (placed) break;
        }
      }
    }

    // If all 3 weakest on court, swap least-under-pace one out (unless exemption applies)
    if (violatesWeakestThree(courtObjs, weakest3)) {
      const trioOnCourt = courtObjs
        .filter(p => weakest3.includes(p.jersey))
        .sort((a, b) => underBy(a.jersey) - underBy(b.jersey));
      const anyTrioUnder = trioOnCourt.some(p => underPace(p.jersey) >= H2_UNDER_PACE_EXEMPT_SECS);
      if (!anyTrioUnder) {
        const swapOut = trioOnCourt[0];
        const bench = pool.filter(p => !courtJerseys.includes(p.jersey) && !weakest3.includes(p.jersey));
        const swapIn = bench.find(cand => {
          const newOn = courtObjs.filter(p => p.jersey !== swapOut.jersey).concat([cand]);
          return meetsSkillRequirements(newOn);
        });
        if (swapIn) {
          courtObjs = courtObjs.filter(p => p.jersey !== swapOut.jersey).concat([swapIn]);
          courtJerseys = courtObjs.map(p => p.jersey);
        }
      }
    }

    return { courtObjs, courtJerseys };
  }

  function handleStartSecondHalf() {
    withActionLock(() => {
    pushUndo("Start 2nd half");
    const now = halfMins * 60;
    const unavail = jersey => fouledOut.has(jersey) || injured.has(jersey);

    // Compute flushed accumulated into a local variable BEFORE async setState
    // so reroute math (below) uses correct H1 totals, not stale closure values
    const flushedAccumulated = { ...accumulated };
    Object.keys(stintStart).forEach(j => {
      flushedAccumulated[j] = (flushedAccumulated[j] || 0) + (now - (stintStart[j] ?? now));
    });
    setAccumulated(flushedAccumulated);

    // Use plan's H2 starting lineup if available
    let courtJerseys;
    if (rotationPlan && rotationPlan.segments) {
      const h2Start = rotationPlan.segments.find(s => s.half === 2);
      if (h2Start && h2Start.onCourt) {
        courtJerseys = h2Start.onCourt.filter(j => !unavail(j));
        // If injuries/fouls reduced the H2 lineup, backfill from bench
        if (courtJerseys.length < 5) {
          const activeBench = available.filter(p =>
            !courtJerseys.includes(p.jersey) && !unavail(p.jersey));
          for (const p of activeBench) {
            if (courtJerseys.length >= 5) break;
            courtJerseys.push(p.jersey);
          }
        }
      } else {
        courtJerseys = computeSecondHalfLineup().courtJerseys;
      }
    } else {
      courtJerseys = computeSecondHalfLineup().courtJerseys;
    }

    const stint = {};
    courtJerseys.forEach(j => { stint[j] = now; });
    const off = {};
    available.forEach(p => {
      if (!courtJerseys.includes(p.jersey) && !unavail(p.jersey)) off[p.jersey] = now;
    });
    setStintStart(stint);
    setOffSince(off);
    setOnCourt(courtJerseys);
    setGameSecs(now);
    setHalftimeDone(true);
    setShowHalftime(false);
    setRunning(false);
    setLastSubTime(now); // H2 grace: engine sees "just subbed" → waits before firing
    setPendingSub(null);
    setHandledWindows(new Set());
    // Seed carousel for H2: bench players start as "rested"
    const h2Bench = available
      .filter(p => !courtJerseys.includes(p.jersey) && !unavail(p.jersey))
      .map(p => p.jersey);
    setRestedThisHalf(new Set(h2Bench));
    // If any player was injured/fouled-out during halftime, reroute to update H2 plan
    if (rotationPlan && (fouledOut.size > 0 || injured.size > 0)) {
      const activePlayers = available.filter(p => !unavail(p.jersey));
      const actualMins = {};
      for (const p of available) {
        actualMins[p.jersey] = (flushedAccumulated[p.jersey] || 0) / 60;
      }
      const newPlan = reroutePlan(rotationPlan, now, activePlayers, actualMins, "H2 roster update", halfMins, courtJerseys, adjustedTargetMins);
      setRotationPlan(newPlan);
      setLastExecutedSegId(null);
    }
    }); // withActionLock
  }

  function courtTime(jersey) {
    const base = accumulated[jersey] || 0;
    // Clamp the live stint at 0 — adjustClock/setClockSecs already snap stintStart
    // on rewind, but this is belt-and-suspenders against any other path that could
    // leave stintStart > gameSecs.
    if (stintStart[jersey] !== undefined) return base + Math.max(0, gameSecs - stintStart[jersey]);
    return base;
  }

  // Window absorption: after a confirmed sub, consume any upcoming rotation
  // window within absorbSecs so the engine doesn't fire again immediately.
  function markNearbyWindowHandled(absorbSecs = 90) {
    const rosterForCadence = available.length - fouledOut.size - injured.size;
    if (rosterForCadence <= 5) return;
    const schedule = getWindowSchedule(rosterForCadence, halfMins, START_BLOCK_SECS, CLOSE_BLOCK_SECS);
    const nearby = schedule.filter(w =>
      !w.isCloser &&
      !handledWindows.has(wKey(rosterForCadence, w.targetSecs)) &&
      gameSecs >= w.openSecs - absorbSecs &&
      gameSecs <= w.hardLateSecs
    );
    if (nearby.length > 0) {
      setHandledWindows(prev => {
        const next = new Set(prev);
        for (const w of nearby) next.add(wKey(rosterForCadence, w.targetSecs));
        return next;
      });
    }
  }

  function doSubs(subList) {
    // Double-tap guard: validate each sub against current court state
    const courtSet = new Set(onCourt);
    const safeSubs = [];
    for (const sub of subList) {
      if (!courtSet.has(sub.outJersey)) continue; // already off
      if (courtSet.has(sub.inJersey)) continue;   // already on
      if (unavailableJerseys.has(sub.inJersey)) continue; // injured/fouled out since suggestion
      courtSet.delete(sub.outJersey);
      courtSet.add(sub.inJersey);
      safeSubs.push(sub);
    }
    if (safeSubs.length === 0) return [];
    subList = safeSubs;

    const now = gameSecs;
    setAccumulated(prev => {
      const next = { ...prev };
      subList.forEach(({ outJersey }) => {
        next[outJersey] = (next[outJersey] || 0) + (now - (stintStart[outJersey] ?? now));
      });
      return next;
    });
    setStintStart(prev => {
      const next = { ...prev };
      subList.forEach(({ outJersey, inJersey }) => {
        delete next[outJersey];
        next[inJersey] = now;
      });
      return next;
    });
    setOnCourt(prev => {
      let next = [...prev];
      subList.forEach(({ outJersey, inJersey }) => {
        next = next.filter(j => j !== outJersey).concat([inJersey]);
      });
      return next;
    });
    // Track bench-stint start for departing players; clear for arriving.
    setOffSince(prev => {
      const next = { ...prev };
      subList.forEach(({ outJersey, inJersey }) => {
        next[outJersey] = now;
        delete next[inJersey];
      });
      return next;
    });
    setActiveMenu(null);
    setBenchMenu(null);
    // Track which players have rested this half (for 6-player carousel)
    setRestedThisHalf(prev => {
      const next = new Set(prev);
      subList.forEach(({ outJersey }) => next.add(outJersey));
      return next;
    });
    // Rule engine: sub resets cooldown, clears pending suggestion.
    // Bigger bundles buy more quiet time (120s for 2+, 90s for singles).
    setLastSubTime(now);
    setShortHandedDismissedAt(null); // clear short-handed grace on real sub
    markNearbyWindowHandled(subList.length >= 2 ? 120 : 90);
    setPendingSub(null);
    // Log the sub
    const logEntry = {
      time: gameSecs,
      half,
      timeInHalf,
      subs: subList.map(({ outJersey, inJersey }) => ({
        out: pObj(outJersey), in: pObj(inJersey),
      })),
    };
    setSubLog(prev => [...prev, logEntry]);
    return subList; // return applied sub list (not just count) for accurate post-sub court calculation
  }

  // (Legacy redistributeMinutes helper removed — markFouledOut / markInjured
  //  now handle their own redistribution inline, and record the info needed for
  //  time-aware clawback on Undo / Return.)

  // ── REROUTE: recalculate plan when roster changes mid-game ──────────────────
  // triggerReroute accepts explicit roster overrides to avoid stale React state.
  // opts.removeJersey / opts.removeJerseys: jerseys to exclude even if not yet in injured/fouledOut state
  // opts.addJersey: jersey to include even if still in injured/fouledOut state (returning player)
  // opts.currentOnCourt: explicit on-court lineup to use for transition segment
  function triggerReroute(reason, opts = {}) {
    if (!rotationPlan) return;
    const removeSet = new Set(opts.removeJerseys || []);
    if (opts.removeJersey != null) removeSet.add(opts.removeJersey);
    const addSet = new Set();
    if (opts.addJersey != null) addSet.add(opts.addJersey);

    const activePlayers = available.filter(p => {
      if (removeSet.has(p.jersey)) return false;
      if (addSet.has(p.jersey)) return true;
      return !fouledOut.has(p.jersey) && !injured.has(p.jersey);
    });
    // Build actual minutes played so far
    const actualMins = {};
    for (const p of available) {
      const base = accumulated[p.jersey] || 0;
      const stint = stintStart[p.jersey] != null ? gameSecs - stintStart[p.jersey] : 0;
      actualMins[p.jersey] = (base + stint) / 60;
    }
    // Pass current on-court lineup for accurate transition segment
    const actualOnCourt = opts.currentOnCourt || onCourt;
    const targetOverride = opts.targetMinutesOverride || adjustedTargetMins;
    const newPlan = reroutePlan(rotationPlan, gameSecs, activePlayers, actualMins, reason, halfMins, actualOnCourt, targetOverride);
    setRotationPlan(newPlan);
    setLastExecutedSegId(null); // force re-evaluation at next tick
    setPendingSub(null);        // clear stale pre-reroute suggestion
    setDelayedSegId(null);
    setPlanDelayUntilSecs(null);
    // Show auto-dismissing banner (clear previous timer to avoid race condition)
    if (rerouteBannerTimer.current) clearTimeout(rerouteBannerTimer.current);
    setRerouteBanner(reason);
    rerouteBannerTimer.current = setTimeout(() => {
      setRerouteBanner(null);
      rerouteBannerTimer.current = null;
    }, 5000);
  }


  // Mark player fouled out. Same minutes model as injury: take remaining target
  // and split it across active teammates, freeze player's target at played time,
  // and store a fouloutInfo record so Undo can do a time-aware partial clawback.
  function _doFoulOut(jersey, { skipUndo = false } = {}) {
    if (fouledOut.has(jersey) || injured.has(jersey)) return;
    if (!skipUndo) pushUndo("Foul out #" + jersey);
    setActiveMenu(null);
    setBenchMenu(null);
    // Ensure foul count shows 5 even when called from manual Foul Out button
    setFouls(prev => ({ ...prev, [jersey]: Math.max(prev[jersey] || 0, 5) }));

    const wasOnCourt = onCourt.includes(jersey);
    const now = gameSecs;
    const playedSecs = (accumulated[jersey] || 0) +
      (wasOnCourt ? (now - (stintStart[jersey] ?? now)) : 0);
    const baseTargetMins =
      adjustedTargetMins[jersey] ??
      plan?.targetMins?.[jersey] ?? 0;
    const remainingMins = Math.max(0, baseTargetMins - playedSecs / 60);

    // Active others = available roster, minus this jersey, minus anyone already out
    const others = available
      .map(p => p.jersey)
      .filter(j => j !== jersey && !fouledOut.has(j) && !injured.has(j));

    // Compute next targets LOCALLY to avoid stale closure in triggerReroute
    let nextTargets = { ...(plan?.targetMins || {}), ...adjustedTargetMins };
    if (remainingMins > 0 && others.length > 0) {
      const perOtherMins = remainingMins / others.length;
      nextTargets[jersey] = playedSecs / 60;
      others.forEach(j => { nextTargets[j] = (nextTargets[j] || 0) + perOtherMins; });
      setAdjustedTargetMins(nextTargets);
      setFouloutInfo(prev => ({
        ...prev,
        [jersey]: { startSecs: now, remainingMins, perOtherMins, others },
      }));
    } else {
      setAdjustedTargetMins(nextTargets);
      setFouloutInfo(prev => ({
        ...prev,
        [jersey]: { startSecs: now, remainingMins: 0, perOtherMins: 0, others: [] },
      }));
    }

    setFouledOut(prev => new Set([...prev, jersey]));
    setOffSince(prev => { const n = { ...prev }; delete n[jersey]; return n; });
    // Clear any stale pending sub — lineup has changed
    setPendingSub(null);
    setDelayedSegId(null);
    setPlanDelayUntilSecs(null);

    if (wasOnCourt) {
      setOnCourt(prev => prev.filter(j => j !== jersey));
      setAccumulated(prev => ({
        ...prev,
        [jersey]: (prev[jersey] || 0) + (now - (stintStart[jersey] ?? now)),
      }));
      setStintStart(prev => { const n = { ...prev }; delete n[jersey]; return n; });
      setReplacingJersey(jersey);
    }
    // Reroute plan — pass locally computed targets to avoid stale closure
    const p = pObj(jersey);
    triggerReroute(`#${jersey} ${p?.name || ""} fouled out`, {
      removeJersey: jersey,
      currentOnCourt: wasOnCourt ? onCourt.filter(j => j !== jersey) : onCourt,
      targetMinutesOverride: nextTargets,
    });
  }
  // Public wrapper — action-locked for UI button calls
  function markFouledOut(jersey, { skipUndo = false } = {}) {
    withActionLock(() => _doFoulOut(jersey, { skipUndo }));
  }

  // Mark player injured.
  // Minutes model: take the injured player's REMAINING target minutes and split
  // them evenly across players who are still active (not injured, not fouled out,
  // not this one). Record the redistribution so we can partially reverse it when
  // / if the player returns.
  function markInjured(jersey) {
    if (injured.has(jersey) || fouledOut.has(jersey)) return;
    withActionLock(() => {
    pushUndo("Injury #" + jersey);
    setActiveMenu(null);
    setBenchMenu(null);

    // Bank played seconds up to now if they were on court
    const wasOnCourt = onCourt.includes(jersey);
    const now = gameSecs;
    const playedSecs = (accumulated[jersey] || 0) +
      (wasOnCourt ? (now - (stintStart[jersey] ?? now)) : 0);

    // Figure out remaining target minutes to redistribute
    const baseTargetMins =
      adjustedTargetMins[jersey] ??
      plan?.targetMins?.[jersey] ?? 0;
    const remainingMins = Math.max(0, baseTargetMins - playedSecs / 60);

    // Other players who will absorb the minutes — active roster minus this jersey
    // and minus anyone already out
    const others = available
      .map(p => p.jersey)
      .filter(j => j !== jersey && !fouledOut.has(j) && !injured.has(j));

    // Compute next targets LOCALLY to avoid stale closure in triggerReroute
    let nextTargets = { ...(plan?.targetMins || {}), ...adjustedTargetMins };
    if (remainingMins > 0 && others.length > 0) {
      const perOtherMins = remainingMins / others.length;
      nextTargets[jersey] = playedSecs / 60;
      others.forEach(j => { nextTargets[j] = (nextTargets[j] || 0) + perOtherMins; });
      setAdjustedTargetMins(nextTargets);
      setInjuryInfo(prev => ({
        ...prev,
        [jersey]: { startSecs: now, remainingMins, perOtherMins, others },
      }));
    } else {
      setAdjustedTargetMins(nextTargets);
      setInjuryInfo(prev => ({
        ...prev,
        [jersey]: { startSecs: now, remainingMins: 0, perOtherMins: 0, others: [] },
      }));
    }

    setInjured(prev => new Set([...prev, jersey]));
    setOffSince(prev => { const n = { ...prev }; delete n[jersey]; return n; });
    // Clear any stale pending sub — lineup has changed
    setPendingSub(null);
    setDelayedSegId(null);
    setPlanDelayUntilSecs(null);

    if (wasOnCourt) {
      setOnCourt(prev => prev.filter(j => j !== jersey));
      setAccumulated(prev => ({
        ...prev,
        [jersey]: (prev[jersey] || 0) + (now - (stintStart[jersey] ?? now)),
